name: Build Kings APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Generate Android project
        run: |
          set -euxo pipefail
          mkdir -p app/src/main/java/com/auroranem/kings app/src/main/assets app/src/main/res/values app/src/main/res/drawable
          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name='KingsOfTheTwoRivers'
          include ':app'
          EOF
          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF
          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.auroranem.kings'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.auroranem.kings'
                  minSdk 23
                  targetSdk 35
                  versionCode 29
                  versionName '3.3'
              }
          }
          EOF
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:theme="@style/AppTheme" android:label="Kings of the Two Rivers" android:icon="@drawable/ic_launcher" android:allowBackup="false" android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:configChanges="orientation|screenSize|keyboardHidden" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>

          EOF
          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:fontFamily">serif</item>
                  <item name="android:colorAccent">#7b4f25</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#3f2917</item>
                  <item name="android:navigationBarColor">#3f2917</item>
              </style>
          </resources>
          EOF
          cat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#3f2917" android:pathData="M8,8h92a8,8 0,0 1,8 8v76a8,8 0,0 1,-8 8H8a8,8 0,0 1,-8 -8V16a8,8 0,0 1,8 -8z"/>
              <path android:strokeColor="#d7b354" android:strokeWidth="4" android:fillColor="#00000000" android:pathData="M10,10h88a6,6 0,0 1,6 6v76a6,6 0,0 1,-6 6H10a6,6 0,0 1,-6 -6V16a6,6 0,0 1,6 -6z"/>
              <path android:strokeColor="#67a9d9" android:strokeWidth="10" android:strokeLineCap="round" android:fillColor="#00000000" android:pathData="M25,14 C35,24 24,36 35,49 C45,61 31,73 43,91"/>
              <path android:strokeColor="#67a9d9" android:strokeWidth="10" android:strokeLineCap="round" android:fillColor="#00000000" android:pathData="M83,14 C72,29 88,41 74,55 C61,68 82,78 69,94"/>
              <path android:fillColor="#d7b354" android:pathData="M30,72h48v12h-48z M36,58h36v14h-36z M43,45h22v13h-22z M54,27l14,18h-28z"/>
              <path android:strokeColor="#5b3a17" android:strokeWidth="2" android:fillColor="#00000000" android:pathData="M30,72h48v12h-48z M36,58h36v14h-36z M43,45h22v13h-22z M54,27l14,18h-28z"/>
          </vector>
          EOF
          cat > app/src/main/java/com/auroranem/kings/MainActivity.java <<'EOF'
          package com.auroranem.kings;

          import android.app.Activity;
          import android.os.Bundle;
          import android.content.pm.ActivityInfo;
          import android.graphics.Color;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;
              @Override public void onCreate(Bundle b) {
                  super.onCreate(b);
                  getWindow().setStatusBarColor(Color.rgb(63,41,23));
                  getWindow().setNavigationBarColor(Color.rgb(63,41,23));
                  webView = new WebView(this);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setBuiltInZoomControls(false);
                  s.setDisplayZoomControls(false);
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setWebViewClient(new WebViewClient());
                  webView.addJavascriptInterface(new AndroidBridge(), "AndroidBridge");
                  setContentView(webView);
                  webView.loadUrl("file:///android_asset/index.html");
              }
              public class AndroidBridge {
                  @JavascriptInterface public void setOrientation(final String mode) {
                      runOnUiThread(new Runnable() {
                          @Override public void run() {
                              if ("landscape".equals(mode) || "sensorLandscape".equals(mode)) {
                                  // Force an immediate landscape rotation, then allow either landscape direction.
                                  setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);
                                  webView.postDelayed(new Runnable() { @Override public void run() {
                                      setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);
                                  }}, 650);
                              } else if ("portrait".equals(mode) || "sensorPortrait".equals(mode)) {
                                  // Force an immediate portrait return, then allow either portrait direction.
                                  setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);
                                  webView.postDelayed(new Runnable() { @Override public void run() {
                                      setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_PORTRAIT);
                                  }}, 650);
                              } else {
                                  setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_UNSPECIFIED);
                              }
                          }
                      });
                  }
              }
              @Override public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }

          EOF
          cat > app/src/main/assets/index.html <<'EOF'
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
          <title>Kings of the Two Rivers</title>
          <style>
            :root{--bg:#efe1bc;--ink:#21160e;--panel:#fff6df;--line:#8d6d3e;--accent:#765126;--gold:#d7b354;--display:'Papyrus','Herculanum','Copperplate','Cinzel Decorative','Trajan Pro','Palatino Linotype','Book Antiqua','Georgia',serif;--head:'Copperplate','Cinzel','Cormorant Garamond','Palatino Linotype','Book Antiqua','Georgia',serif;--body:'Palatino Linotype','Book Antiqua','Georgia','Times New Roman',serif;}
            html,body{margin:0;height:100%;font-family:var(--body);background:radial-gradient(circle at 50% -20%,#fff4d4 0,#ead6a9 55%,#d6bc83 100%);color:var(--ink);letter-spacing:.01em}
            body{display:flex;flex-direction:column;overflow:hidden}
            header{padding:calc(5px + env(safe-area-inset-top,0px)) 10px 5px;background:linear-gradient(180deg,#604022,#3f2917);color:#fff;box-shadow:0 3px 8px #0006;border-bottom:2px solid #c9a75c;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
            header h1{font-size:19px;margin:0;font-family:var(--display);letter-spacing:.06em;font-weight:900;font-variant:small-caps;text-shadow:0 2px 0 #2a1608,0 3px 5px #000a;line-height:1.05} header .small{font-size:15px;opacity:.95;line-height:1;font-family:var(--display);letter-spacing:.08em;color:#f1d891;white-space:nowrap;text-shadow:0 1px 2px #000a}
            #setup{padding:12px;overflow:auto;flex:1}.card{background:linear-gradient(180deg,#fff9e8,#fff0cc);border:1px solid #d2bb83;border-radius:14px;padding:12px;margin:10px 0;box-shadow:0 2px 6px #0002}
            .card h2{font-size:18px;margin:0 0 8px;color:#4b301c;font-family:var(--display);letter-spacing:.05em;font-variant:small-caps;text-shadow:0 1px 0 #fff7}.card p{margin:4px 0 8px}.note{font-size:12px;line-height:1.45}.muted{opacity:.78}.tiny{font-size:11px;line-height:1.3}
            label{display:block;margin:9px 0 4px;font-weight:900;letter-spacing:.045em;font-family:var(--head);font-variant:small-caps} select,button,input{font-family:var(--body);font-size:16px} select{width:100%;padding:8px;border-radius:9px;border:1px solid #b69a62;background:#fffdf6;color:#22170e}
            button{border:1px solid #4e3218;border-radius:10px;padding:9px 12px;background:linear-gradient(180deg,#8a5c2d,#6b431f);color:#fff;font-family:var(--head);font-weight:900;font-variant:small-caps;box-shadow:0 2px 4px #0004;letter-spacing:.045em;text-shadow:0 1px 1px #0008}button.secondary{background:linear-gradient(180deg,#59627c,#3d455a)}button.danger{background:linear-gradient(180deg,#a24339,#7f2b27)}
            .check{display:grid;grid-template-columns:32px 1fr;gap:8px;align-items:start;margin:10px 0;padding:8px;border:1px solid #ead9aa;border-radius:10px;background:#fffdf4}.check input{width:24px;height:24px}.check b{display:block;font-family:var(--head);font-size:14px}.check span{font-size:12px;line-height:1.25;opacity:.84}
            .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.wide{grid-column:1/3}
            #game{display:none;flex:1;min-height:0;flex-direction:column}#topbar{padding:3px 7px;background:linear-gradient(180deg,#fff8e6,#f6e8c2);border-bottom:1px solid #d2bb83;font-family:var(--head);font-size:10.5px;line-height:1.16;max-height:42px;overflow:auto;font-variant:small-caps;letter-spacing:.018em}#hudButtons{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:3px 6px;background:#f6e8c2;border-bottom:1px solid #d2bb83}#hudButtons button{font-size:10.2px;padding:3px 4px;border-radius:8px;min-width:0}
            #canvasWrap{position:relative;flex:1;min-height:0;background:#d7c18a;display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{touch-action:manipulation;max-width:100%;max-height:100%}
            #legend{padding:3px 7px;background:#fdf2cf;border-top:1px solid #d2bb83;border-bottom:1px solid #d2bb83;font-family:var(--head);font-size:10.5px;line-height:1.18;max-height:48px;overflow:auto;font-variant:small-caps;letter-spacing:.018em}#legend.collapsed,#log.collapsed{display:none}#controls.collapsed{display:none}
            #eventBox{padding:4px 8px;background:linear-gradient(180deg,#fff2cb,#f8e2a7);border-bottom:1px solid #d2bb83;font-family:var(--head);font-size:11.5px;line-height:1.25;min-height:18px;color:#4a3018;font-weight:850;font-variant:small-caps;letter-spacing:.022em}
            .pill{display:inline-block;margin:2px 3px 2px 0;padding:2px 7px;border-radius:999px;border:1px solid #ad9358;background:#fffaf0;white-space:nowrap}.sw{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:-1px;margin-right:3px}.sig{font-weight:900;font-size:13px;margin-right:2px;font-family:var(--head)}.ownerShape{display:inline-block;width:15px;height:15px;line-height:15px;text-align:center;margin-right:4px;font-size:11px;font-weight:900;text-shadow:0 1px 0 #fff8}.leaderHint{font-family:var(--head);font-weight:800}
            #controls{background:linear-gradient(180deg,#fff8e6,#f7ebc7);border-top:1px solid #d2bb83;padding:4px 6px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px}#controls select{font-size:12px;padding:5px}#controls button{font-size:12.5px;padding:6px}
            #recyclePanel{display:none;grid-template-columns:repeat(4,1fr);gap:4px;align-items:end;background:#fffdf4;border:1px solid #ead9aa;border-radius:8px;padding:4px}.recSlot{display:flex;flex-direction:column;font-size:10px;font-weight:700}.recSlot input{width:100%;box-sizing:border-box;padding:4px;border-radius:7px;border:1px solid #b69a62;background:#fffaf0}#recyclePanel.active{display:grid}
            #supportDrawer{display:none;position:fixed;left:10px;right:10px;bottom:10px;z-index:40;background:linear-gradient(180deg,rgba(255,248,226,.98),rgba(247,225,174,.98));border:2px solid #7b4f25;border-radius:14px;padding:9px 10px;box-shadow:0 7px 22px #0008;font-family:var(--head);font-size:13px;max-height:34vh;overflow:auto}.supportBtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}#supportDrawer input[type=range]{width:100%;accent-color:#7b4f25}#supportText{font-weight:900;color:#4b301c;font-family:var(--display);font-variant:small-caps;letter-spacing:.04em}#supportHint,#supportValue{font-family:var(--head);font-variant:small-caps;letter-spacing:.025em}
            #warOrderDrawer{display:none;position:fixed;left:10px;right:10px;bottom:10px;z-index:39;background:linear-gradient(180deg,rgba(255,248,226,.98),rgba(244,217,154,.98));border:2px solid #7b4f25;border-radius:14px;padding:9px 10px;box-shadow:0 7px 22px #0008;font-family:var(--head);font-size:13px;max-height:34vh;overflow:auto}#warOrderText{font-weight:900;color:#4b301c;font-family:var(--display);font-variant:small-caps;letter-spacing:.04em;margin-bottom:6px}.warOrderBtns{display:grid;grid-template-columns:1fr;gap:6px}.warOrderBtns button{font-size:13px;padding:8px;text-align:left}
            #log{height:68px;overflow:auto;background:#21180f;color:#f8eac4;font:11px/1.25 'Georgia','Times New Roman',serif;padding:5px 7px;white-space:pre-wrap;letter-spacing:.012em;border-top:1px solid #6b512b}#log:before{content:'Recent actions';display:block;color:#d9bd74;font-family:var(--head);font-variant:small-caps;font-weight:900;margin-bottom:2px}
            body.horiz header{display:none}body.horiz #game{display:grid!important;grid-template-columns:minmax(0,1fr) clamp(230px,29vw,350px);grid-template-rows:auto auto auto auto auto minmax(46px,1fr);height:100%;min-height:0;overflow:hidden}body.horiz #topbar{grid-column:1/3;grid-row:1;max-height:26px;padding:2px 6px;font-size:9.8px;line-height:1.08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}body.horiz #topbar br{display:none}body.horiz #hudButtons{grid-column:1/3;grid-row:2;padding:2px 5px}body.horiz #hudButtons button{font-size:9.8px;padding:2px 3px}body.horiz #canvasWrap{grid-column:1;grid-row:3/7;min-height:0;align-self:stretch;justify-self:stretch;display:flex;align-items:center;justify-content:center;padding:2px}body.horiz #legend{grid-column:2;grid-row:3;max-height:88px;overflow:auto;border-top:0}body.horiz #eventBox{grid-column:2;grid-row:4;min-height:18px;font-size:10.5px;padding:3px 6px}body.horiz #controls{grid-column:2;grid-row:5;align-self:start;max-height:38vh;overflow:auto;border-left:1px solid #d2bb83;border-top:0;grid-template-columns:1fr 1fr;padding:3px 5px;gap:3px}body.horiz #controls select{font-size:11px;padding:4px}body.horiz #controls button{width:auto;min-width:0;font-size:11.2px;padding:5px 4px}body.horiz #log{grid-column:2;grid-row:6;height:auto;min-height:46px;overflow:auto;border-left:1px solid #6b512b}body.horiz canvas{max-width:100%;max-height:100%;display:block}

            #playerStrip{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:3px 6px;background:#ead7a4;border-bottom:1px solid #d2bb83;font-family:var(--head);font-size:10px;line-height:1.1;font-variant:small-caps}.playerChip{border:1px solid #af9256;border-radius:8px;background:#fff8e7;padding:3px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.playerChip.active{background:#fff0b6;border-color:#6a451f;box-shadow:0 0 0 2px #e2b84a55 inset}.vpMini{font-size:9px;opacity:.85}.aiHidden{opacity:.78}
            #phaseBadge{display:block;background:linear-gradient(180deg,#3d2715,#2a1a0d);color:#fff4cf;border-top:1px solid #d9bd74;border-bottom:1px solid #7c5b2c;padding:3px 8px;font:900 10.5px/1.1 var(--head);font-variant:small-caps;letter-spacing:.035em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 1px 3px #0005}#phaseBadge.hidden{display:none}
            #previewBox{padding:4px 7px;background:#fffbe8;border-bottom:1px solid #d2bb83;font-family:var(--head);font-size:10.6px;line-height:1.2;color:#4a3018;font-variant:small-caps;letter-spacing:.02em;max-height:42px;overflow:auto}.quickRow{grid-column:1/3;display:grid;grid-template-columns:1fr 1fr;gap:4px}.quickRow button{font-size:11px;padding:5px 4px}.settingsMini{grid-column:1/3;display:grid;grid-template-columns:1fr 1fr;gap:4px;background:#fffdf4;border:1px solid #ead9aa;border-radius:8px;padding:4px;font-size:10px;line-height:1.1}.settingsMini label{display:flex;align-items:center;gap:4px;margin:0;font-size:10px;font-family:var(--body);font-variant:normal;letter-spacing:0}.settingsMini input{width:14px;height:14px}.zoomBar{grid-column:1/3;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}.zoomBar button{font-size:11px;padding:5px 4px}
            #canvasWrap.zoomed{overflow:auto;justify-content:flex-start;align-items:flex-start}#canvasWrap.zoomed canvas{max-width:none;max-height:none}.conflictCompare{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:5px 0;font-family:var(--body);font-size:12px}.conflictSide{border:1px solid #c8aa68;border-radius:8px;background:#fff9e8;padding:5px}.conflictSide b{font-family:var(--head);font-variant:small-caps}.impactNote{font-size:10px;color:#6b4a1e;margin-top:2px}
            body.horiz #playerStrip{grid-column:1/3;grid-row:3;padding:2px 5px;font-size:9.3px}body.horiz #canvasWrap{grid-row:4/8}body.horiz #legend{grid-row:4}body.horiz #eventBox{grid-row:5}body.horiz #previewBox{grid-column:2;grid-row:6;max-height:44px;font-size:9.8px;padding:3px 6px}body.horiz #controls{grid-row:7}body.horiz #log{grid-row:8}body.horiz #game{grid-template-rows:auto auto auto auto auto auto auto minmax(46px,1fr)}


            /* v26 landscape usability overrides: no board overlays, no status-bar collision, larger board. */
            body.horiz{background:#d9c18a;}
            body.horiz #game{display:grid!important;grid-template-columns:minmax(0,1fr) clamp(236px,27vw,338px);grid-template-rows:auto auto auto auto auto minmax(0,1fr);height:100%;min-height:0;overflow:hidden;box-sizing:border-box;padding-top:calc(18px + env(safe-area-inset-top,0px));padding-right:calc(4px + env(safe-area-inset-right,0px));padding-bottom:calc(4px + env(safe-area-inset-bottom,0px));padding-left:calc(4px + env(safe-area-inset-left,0px));}
            body.horiz #canvasWrap{grid-column:1;grid-row:1/7;min-height:0;align-self:stretch;justify-self:stretch;display:flex;align-items:center;justify-content:center;padding:1px;background:#d7c18a;}
            body.horiz #topbar{grid-column:2;grid-row:1;max-height:34px;padding:2px 5px;font-size:9px;line-height:1.05;white-space:normal;overflow:hidden;text-overflow:clip;border-left:1px solid #d2bb83;}
            body.horiz #topbar br{display:none}
            body.horiz #hudButtons{grid-column:2;grid-row:2;grid-template-columns:repeat(3,1fr);gap:3px;padding:2px 4px;border-left:1px solid #d2bb83;}
            body.horiz #hudButtons button{font-size:9px;padding:3px 2px;border-radius:7px;}
            body.horiz #playerStrip{grid-column:2;grid-row:3;display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:2px 4px;font-size:8.9px;line-height:1;border-left:1px solid #d2bb83;}
            body.horiz .playerChip{padding:2px 3px;border-radius:6px;}
            body.horiz .vpMini{display:none!important;}
            body.horiz #legend{grid-column:2;grid-row:4;max-height:64px;overflow:auto;border-top:0;border-left:1px solid #d2bb83;font-size:9.2px;line-height:1.08;padding:2px 5px;}
            body.horiz #eventBox{grid-column:2;grid-row:5;min-height:16px;max-height:42px;overflow:auto;font-size:9.6px;line-height:1.1;padding:3px 5px;border-left:1px solid #d2bb83;}
            body.horiz #previewBox{grid-column:2;grid-row:6;max-height:36px;font-size:9.2px;line-height:1.08;padding:3px 5px;border-left:1px solid #d2bb83;}
            body.horiz #controls{grid-column:2;grid-row:7;align-self:start;max-height:31vh;overflow:auto;border-left:1px solid #d2bb83;border-top:0;grid-template-columns:1fr 1fr;padding:3px 4px;gap:3px;}
            body.horiz #controls select{font-size:10px;padding:3px;}
            body.horiz #controls button{width:auto;min-width:0;font-size:10px;padding:4px 3px;}
            body.horiz #log{grid-column:2;grid-row:8;height:auto;min-height:42px;overflow:auto;border-left:1px solid #6b512b;font-size:10px;line-height:1.12;padding:4px 5px;}
            body.horiz #phaseBadge{display:none!important;}
            body.horiz canvas{max-width:100%;max-height:100%;display:block;}
          
            /* v27 board-size and orientation usability overrides */
            body:not(.horiz) #topbar{max-height:34px;padding:2px 6px;font-size:10px;line-height:1.08}
            body:not(.horiz) #hudButtons{grid-template-columns:repeat(7,1fr);gap:3px;padding:2px 5px}
            body:not(.horiz) #hudButtons button{font-size:9.4px;padding:3px 2px;border-radius:7px}
            body:not(.horiz) #playerStrip{padding:2px 5px;font-size:9.2px;line-height:1;gap:2px}
            body:not(.horiz) .playerChip{padding:2px 3px;border-radius:6px}
            body:not(.horiz) #phaseBadge{font-size:9.8px;padding:2px 7px}
