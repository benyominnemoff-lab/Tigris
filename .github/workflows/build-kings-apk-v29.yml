          <body>
          <header><h1>Kings of the Two Rivers</h1><div class="small">✦ 𒀭 ✦</div></header>
          <section id="setup">
            <div class="card">
              <h2>Players and AI</h2>
              <label for="aiCount">Automated opponents</label>
              <select id="aiCount"><option>1</option><option>2</option><option selected>3</option></select>
              <label for="aiLevel">Automated opponent level</label>
              <select id="aiLevel"><option value="easy">Easy — mostly legal point-scoring moves</option><option value="regular" selected>Regular — avoids helping opponents</option><option value="hard">Hard — balances colours and attacks only when favoured</option></select>
            </div>
            <div class="card">
              <h2>Board and separate rule toggles</h2>
              <label for="boardSide">Board layout</label>
              <select id="boardSide"><option value="standard" selected>Standard board — 10 Shedu start temples, 4 outlined</option><option value="advanced">Advanced board — 14 Shedu start temples, 6 outlined</option></select>
              <div class="check"><input id="ruleBuildings" type="checkbox"><div><b>Civilisation buildings</b><span>Palace, Library, Granary, and Market Hall as a separate advanced-rule module.</span></div></div>
              <div class="check"><input id="ruleEnglish" type="checkbox"><div><b>English variant</b><span>Conflict support is restricted so extra tiles must be able to change the result.</span></div></div>
              <div class="check"><input id="ruleWonder" type="checkbox"><div><b>Wonder variant</b><span>Allows the five-tile cross wonder and the king's end-turn wild point.</span></div></div>
              <div class="check"><input id="showCoords" type="checkbox"><div><b>Show board coordinates</b><span>Adds A1–P11 helper labels for easier move tracking.</span></div></div>
              <div class="check"><input id="confirmImpact" type="checkbox" checked><div><b>Confirm impactful moves</b><span>Ask before wars, catastrophes, monument/wonder choices, and other big board-changing moves. Routine placements stay quick.</span></div></div>
              <button onclick="startGame()">Start game</button>
            </div>
            <div class="card">
              <h2>Continue saved match</h2>
              <label for="saveSelect">Saved positions</label>
              <select id="saveSelect"><option>No saved matches found</option></select>
              <div id="saveDetails" class="note tiny">Saved matches show timestamp, optional name, board side, variants, AI level, turn, and actions remaining.</div>
              <div class="row"><button class="secondary" onclick="populateSaveSelect()">Refresh saves</button><button onclick="continueSavedMatch()">Continue selected match</button><button class="danger" onclick="clearAllSavedMatches()">Clear all saved matches</button></div>
            </div>
            <div class="card note"><b>Quick help:</b> tap a square to inspect it. Use the in-game tabs for Actions, Info, History, and Menu. Leader frame shape identifies the player; inner colour identifies the leader sphere.</div>
          </section>
          <section id="game">
            <div id="topbar"></div>
            <div id="hudButtons"><button data-panel="controls" onclick="setActivePanel('controls')">Actions</button><button data-panel="legend" onclick="setActivePanel('legend')">Info</button><button data-panel="log" onclick="setActivePanel('log')">History</button><button data-panel="menuPanel" onclick="setActivePanel('menuPanel')">Menu</button><button onclick="centerBoard()">Board</button><button id="layoutBtn" onclick="toggleGameLayout()">Horizontal</button></div>
            <div id="playerStrip"></div>
            <div id="phaseBadge"></div><div id="canvasWrap"><canvas id="board" width="1280" height="880"></canvas></div>
            <div id="legend"></div>
            <div id="eventBox">AI and conflict events will appear here.</div>
            <div id="previewBox">Select a space and action to see a rules preview.</div>
            <div id="controls">
              <div id="actionContext" class="panelIntro">Normal action phase. Choose an action or use a quick suggestion.</div>
              <div id="quickActions" class="quickRow"></div>
              <select id="action" onchange="refreshEligibilityMessage()"><option value="tile">Place civilisation tile</option><option value="leader">Place/move leader</option><option value="withdraw">Withdraw selected leader</option><option value="cat">Play catastrophe tile</option><option value="recycleCustom">Recycle chosen tile mix</option><option value="replaceColor">Recycle all tiles of chosen colour</option><option value="replaceAll">Recycle entire hand</option></select>
              <select id="color" onchange="refreshEligibilityMessage()"><option value="0">Black: settlement tile / king leader / bricks VP</option><option value="1">Red: temple tile / priest leader / amulets VP</option><option value="2">Blue: farm tile / farmer leader / crops VP</option><option value="3">Green: market tile / trader leader / goods VP</option></select>
              <div id="recyclePanel" class="wide"><div class="recSlot"><span>Black</span><input id="rec0" type="number" min="0" max="6" value="0"></div><div class="recSlot"><span>Red</span><input id="rec1" type="number" min="0" max="6" value="0"></div><div class="recSlot"><span>Blue</span><input id="rec2" type="number" min="0" max="6" value="0"></div><div class="recSlot"><span>Green</span><input id="rec3" type="number" min="0" max="6" value="0"></div></div>
              <div class="settingsMini"><label><input id="uiConfirm" type="checkbox" onchange="setUiOption('confirmImpact',this.checked)">Confirm big moves</label><label><input id="uiLegal" type="checkbox" onchange="setUiOption('showLegal',this.checked)">Legal-space glow</label><label><input id="uiShedu" type="checkbox" onchange="setUiOption('showShedu',this.checked)">Shedu ribbons</label><label><input id="uiPhase" type="checkbox" onchange="setUiOption('showPhase',this.checked)">Turn badge</label></div>
              <div class="zoomBar"><button class="secondary" onclick="zoomBoard(1.2)">Zoom +</button><button class="secondary" onclick="zoomBoard(1/1.2)">Zoom −</button><button class="secondary" onclick="resetBoardZoom()">Fit board</button></div>
              <button onclick="doHumanAction()">Do selected action</button><button class="secondary" onclick="finishHumanTurn()">Finish turn</button>
            </div>
            <div id="menuPanel" class="collapsed">
              <div class="menuNote" id="incomePreviewBox">End-turn income preview will appear here.</div>
              <button class="secondary" onclick="zoomBoard(1.2)">Zoom board +</button><button class="secondary" onclick="zoomBoard(1/1.2)">Zoom board −</button>
              <button class="secondary" onclick="resetBoardZoom()">Fit board</button><button class="secondary" onclick="undoLastAction()">Undo last action</button>
              <button onclick="saveGame()">Save position</button><button class="danger" onclick="if(confirm('Start over? Unsaved progress since your last save will be lost.')) location.reload()">New game</button>
              <div class="settingsMini wide"><label><input id="uiConfirm2" type="checkbox" onchange="setUiOption('confirmImpact',this.checked)">Confirm big moves</label><label><input id="uiLegal2" type="checkbox" onchange="setUiOption('showLegal',this.checked)">Legal-space glow</label><label><input id="uiShedu2" type="checkbox" onchange="setUiOption('showShedu',this.checked)">Shedu ribbons</label><label><input id="uiPhase2" type="checkbox" onchange="setUiOption('showPhase',this.checked)">Turn strip</label></div>
              <div class="menuNote">Phase reminders: resolve any revolt/war or choice sheet first. End-turn scoring happens before refill and game-end checks. Destructive actions and early turn end can be confirmed in settings.</div>
            </div>
            <div id="warOrderDrawer"><div id="warOrderText"></div><div id="warOrderButtons" class="warOrderBtns"></div></div>
            <div id="supportDrawer"><div id="supportText"></div><div id="supportBattle" class="conflictCompare"></div><div id="supportHint" class="tiny"></div><input id="supportRange" type="range" min="0" max="0" value="0" oninput="updateSupportReadout()"><div id="supportValue" class="tiny"></div><div class="supportBtns"><button onclick="commitSupportChoice()">Commit support</button><button class="secondary" onclick="commitSupportChoice(0)">Commit none</button></div></div>
            <div id="log"></div>
          </section>
          <script>
          'use strict';
          const W=16,H=11, BLACK=0, RED=1, BLUE=2, GREEN=3;
          const CNAME=['Black','Red','Blue','Green'];
          const SHORT=['Bk','Rd','Bu','Gn'];
          const TILE=['settlement','temple','farm','market'];
          const TILE_SHORT=['Set','Tmp','Frm','Mkt'];
          const LEADER=['king','priest','farmer','trader'];
          const LEADER_SHORT=['King','Priest','Farmer','Trader'];
          const VP=['bricks','amulets','crops','goods'];
          const HEX=['#1f1f1f','#b74336','#2d88c4','#2e9655'];
          const TEXTHEX=['#ffffff','#ffffff','#ffffff','#ffffff'];
          const DYNASTY=['You','Bull AI','Pot AI','Lion AI'];
          const SIGIL=['YOU','BULL','POT','LION'];
          const MARK=['I','II','III','IV'];
          const OWNER_SYMBOL=['●','■','◆','⬢'];
          const OWNER_FRAME=['circle','square','diamond','hex'];
          const OWNER_FRAME_NAME=['round frame','square frame','diamond frame','hex frame'];
          const PLAYER_BAND=['#f6dc3c','#c95a4a','#5887d4','#5bb56c'];
          const MARK_FILL=['#fff6a5','#ffffff','#ffffff','#ffffff'];
          const BUILDING=['Palace','Library','Granary','Market Hall'];
          const MONUMENTS=[[BLUE,RED],[GREEN,BLACK],[BLUE,BLACK],[GREEN,BLUE],[RED,GREEN],[RED,BLACK]];
          const BOARD={
           standard:{
            shedu:[[10,0],[1,1],[15,1],[5,2],[13,4],[8,6],[1,7],[14,8],[5,9],[10,10]],
            special:[[1,1],[15,1],[1,7],[14,8]],
            river:[[4,0],[5,0],[6,0],[7,0],[8,0],[12,0],[4,1],[12,1],[3,2],[4,2],[12,2],[13,2],[0,3],[1,3],[2,3],[3,3],[13,3],[14,3],[15,3],[14,4],[15,4],[14,5],[0,6],[1,6],[2,6],[3,6],[12,6],[13,6],[14,6],[4,7],[5,7],[6,7],[12,7],[6,8],[7,8],[8,8],[9,8],[10,8],[11,8],[12,8]]
           },
           advanced:{
            shedu:[[4,0],[9,0],[14,1],[1,2],[6,3],[11,3],[3,5],[15,5],[0,7],[7,7],[12,7],[4,9],[9,10],[14,10]],
            special:[[1,2],[15,5],[0,7],[4,9],[9,10],[14,10]],
            river:[[2,0],[3,0],[15,0],[2,1],[3,1],[15,1],[2,2],[3,2],[15,2],[2,3],[13,3],[14,3],[15,3],[2,4],[12,4],[2,5],[12,5],[2,6],[3,6],[12,6],[13,6],[4,7],[5,7],[13,7],[5,8],[6,8],[13,8],[6,9],[7,9],[8,9],[9,9],[10,9],[11,9],[12,9],[13,9],[6,10]]
           }
          };
          let G=null, selected={x:0,y:0}, statusFlash='Ready.', aiBusy=false, pendingSupport=null, pendingWarOrder=null, activePanel='controls', preActionSnapshot=null;
          const AI_PACE={plan:780,between:960,end:760};
          function key(x,y){return x+','+y} function inside(x,y){return x>=0&&x<W&&y>=0&&y<H}
          function eachCell(fn){for(let y=0;y<H;y++)for(let x=0;x<W;x++)fn(G.board[y][x],x,y)}
          function cell(x,y){return G.board[y][x]} function neighbors(x,y){return [[x+1,y],[x-1,y],[x,y+1],[x,y-1]].filter(p=>inside(p[0],p[1]));}
          function emptyCell(c){return !c.cat&&c.tile===null&&!c.face&&!c.wonder&&!c.leader&&!c.mon}
          function hasNode(c){return c.cat?false:!!(c.tile!==null||c.face||c.wonder||c.leader||c.mon)}
          function faceTemple(c){return c.tile===RED&&!c.face&&!c.wonder&&!c.cat}
          function colourChip(i,txt){return '<span class="colorChip c'+i+'">'+esc(txt)+'</span>';}
          function handText(p){return CNAME.map((n,i)=>colourChip(i,SHORT[i]+' '+G.players[p].hand[i])).join(' ')}
          function vpText(p){return G.players[p].vp.map((v,i)=>colourChip(i,SHORT[i]+' '+v)).join(' ')}
          function yourOffBoardLeaders(){let on=[false,false,false,false]; eachCell(c=>{if(c.leader&&c.leader.p===0)on[c.leader.color]=true;}); let off=[]; for(let i=0;i<4;i++)if(!on[i])off.push(colourChip(i,LEADER_SHORT[i])); return off.length?off.join(' '):'<span class="okChip">all leaders on board</span>';}
          function colorizeText(s){let t=esc(s); for(let i=0;i<4;i++){let names=[CNAME[i],TILE[i],TILE_SHORT[i],LEADER[i],LEADER_SHORT[i],VP[i],SHORT[i]]; for(const w of names){let re=new RegExp('\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi'); t=t.replace(re,m=>'<span class="inlineColor c'+i+'">'+m+'</span>');}} return t;}
          function log(s){G.log.unshift(s); if(G.log.length>160)G.log.length=160; let el=document.getElementById('log'); if(el)el.innerHTML=historyHTML();}
          function flash(s){statusFlash=s; let box=document.getElementById('eventBox'); if(box) box.textContent=s;}
          const SAVE_KEY='kingsTwoRiversSavedMatchesV1';
          function esc(s){return String(s).replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));}
          function playerTurnOffset(p){if(!G||!G.players)return p; let st=Number.isFinite(G.startTurn)?G.startTurn:0; return (p-st+G.players.length)%G.players.length;}
          function playerMark(p){return MARK[playerTurnOffset(p)]||String(playerTurnOffset(p)+1);}
          function playerSubject(p){return G&&G.players[p]?G.players[p].name:'Player';}
          function verbFor(p,base,third){return playerSubject(p)==='You'?base:third;}
          function playerDoes(p,base,third){return playerSubject(p)+' '+verbFor(p,base,third);}
          function turnOrderText(){if(!G||!G.players)return ''; let st=Number.isFinite(G.startTurn)?G.startTurn:0, rows=[]; for(let i=0;i<G.players.length;i++){let p=(st+i)%G.players.length; rows.push((i+1)+'. '+playerMark(p)+' — '+G.players[p].name);} return rows.join('\n');}
          function optionSummaryFor(g){return (g.settings.advanced?'Advanced board':'Standard board')+'; '+(g.settings.buildings?'Buildings on':'Buildings off')+'; '+(g.settings.english?'English variant on':'English variant off')+'; '+(g.settings.wonder?'Wonder on':'Wonder off')+'; AI '+g.aiLevel;}
          function saveSummary(g){let turnName=(g.players&&g.players[g.turn])?g.players[g.turn].name:'Unknown'; return optionSummaryFor(g)+'; Turn: '+turnName+'; Actions left: '+g.actions;}
          function getSaves(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||'[]').filter(x=>x&&x.id&&x.g);}catch(e){return [];}}
          function setSaves(saves){localStorage.setItem(SAVE_KEY,JSON.stringify(saves.slice(0,60)));}
          function clearAllSavedMatches(){let saves=getSaves(); if(!saves.length){alert('No saved matches to clear.'); return;} if(!confirm('Delete all saved match positions from this device? This cannot be undone.'))return; localStorage.removeItem(SAVE_KEY); populateSaveSelect(); alert('All saved matches cleared.');}
          function formatSaveTitle(s){let d=new Date(s.ts), stamp=isNaN(d)?s.ts:d.toLocaleString(); return stamp+(s.name?' — '+s.name:'')+' — '+s.summary;}
          function populateSaveSelect(){let sel=document.getElementById('saveSelect'), det=document.getElementById('saveDetails'); if(!sel)return; let saves=getSaves(); sel.innerHTML=''; if(!saves.length){sel.innerHTML='<option value="">No saved matches found</option>'; if(det)det.textContent='No saved match positions are stored on this device yet.'; return;} saves.forEach((s,i)=>{let opt=document.createElement('option'); opt.value=s.id; opt.textContent=formatSaveTitle(s); sel.appendChild(opt);}); if(det)det.textContent=formatSaveTitle(saves[0]); sel.onchange=()=>{let s=getSaves().find(x=>x.id===sel.value); if(det)det.textContent=s?formatSaveTitle(s):'No saved match selected.';};}
          function continueSavedMatch(){let sel=document.getElementById('saveSelect'); if(!sel||!sel.value){alert('No saved match selected.'); return;} let s=getSaves().find(x=>x.id===sel.value); if(!s){alert('Saved match not found.'); populateSaveSelect(); return;} try{G=typeof s.g==='string'?JSON.parse(s.g):s.g;}catch(e){alert('Could not read that saved match.'); return;} normalizeSettings(); if(!Number.isFinite(G.startTurn))G.startTurn=G.turn||0; document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='flex'; activePanel='controls'; applyGameLayout(); setActivePanel('controls'); resizeCanvas(); render(); flash('Loaded saved match: '+(s.name||new Date(s.ts).toLocaleString())+'.'); log('CONTINUED SAVED MATCH: '+formatSaveTitle(s)); if(G.players[G.turn].ai)setTimeout(aiTurn,650);}

          function cellDescription(x,y){
           if(!G||!inside(x,y))return 'Off board.';
           let c=cell(x,y), parts=[coord(x,y)];
           parts.push(c.river?'river space':'land space');
           if(c.shedu)parts.push(c.special?'outlined Shedu start temple':'Shedu start temple');
           if(c.leader)parts.push(G.players[c.leader.p].name+' '+CNAME[c.leader.color]+' '+LEADER_SHORT[c.leader.color]+' leader');
           if(c.tile!==null&&!c.face&&!c.wonder)parts.push(CNAME[c.tile]+' '+TILE[c.tile]+' tile');
           if(c.face)parts.push('monument base');
           if(c.wonder)parts.push('wonder');
           if(c.monumentColors)parts.push(CNAME[c.monumentColors[0]]+'/'+CNAME[c.monumentColors[1]]+' monument');
           if(c.building!==null)parts.push(BUILDING[c.building]);
           if(c.cat)parts.push('catastrophe marker');
           if(c.union!==null)parts.push('unification marker');
           if(c.treasure)parts.push('treasure');
           if(parts.length===2)parts.push('empty');
           return parts.join(' · ');
          }
          function startGame(){
           const aiCount=+document.getElementById('aiCount').value;
           G={players:[],turn:0,actions:2,aiCount,aiLevel:document.getElementById('aiLevel').value,settings:{buildings:document.getElementById('ruleBuildings').checked,advanced:document.getElementById('boardSide').value==='advanced',english:document.getElementById('ruleEnglish').checked,wonder:document.getElementById('ruleWonder').checked,showCoords:document.getElementById('showCoords').checked,confirmImpact:document.getElementById('confirmImpact').checked,showLegal:true,showShedu:true,showPhase:true},bag:[30,57,36,30],board:[],log:[],over:false,buildingsOn:[null,null,null,null],monuments:MONUMENTS.map((m,i)=>({id:i,colors:m,used:false})),lastUnion:null,uiHorizontal:false,boardZoom:1};
           const def=G.settings.advanced?BOARD.advanced:BOARD.standard;
           const river=new Set(def.river.map(p=>key(p[0],p[1]))), shedu=new Set(def.shedu.map(p=>key(p[0],p[1]))), special=new Set(def.special.map(p=>key(p[0],p[1])));
           for(let y=0;y<H;y++){G.board[y]=[];for(let x=0;x<W;x++)G.board[y][x]={river:river.has(key(x,y)),shedu:shedu.has(key(x,y)),special:special.has(key(x,y)),tile:null,face:false,wonder:false,cat:false,leader:null,treasure:false,mon:null,building:null,union:null};}
           for(const [x,y] of def.shedu){let c=cell(x,y);c.tile=RED;c.treasure=true;G.bag[RED]--;}
           for(let i=0;i<1+aiCount;i++)G.players.push({name:i?DYNASTY[i]:'You',ai:i>0,vp:[0,0,0,0],treasures:0,hand:[0,0,0,0],cat:2,leaders:[null,null,null,null]});
           for(let p=0;p<G.players.length;p++)drawTo(p,6); normalizeSettings();
           G.turn=Math.floor(Math.random()*G.players.length); G.startTurn=G.turn; G.actions=2;
           document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='flex'; activePanel='controls'; applyGameLayout(); setActivePanel('controls');
           resizeCanvas(); log('Game started on '+(G.settings.advanced?'advanced':'standard')+' board with '+(G.settings.advanced?14:10)+' Shedu start temples and '+(G.settings.advanced?6:4)+' outlined Shedu spaces.'); log('Turn order:\n'+turnOrderText()); log('AI level: '+G.aiLevel+'. Enabled toggles: '+optionSummary()+'.'); render(); alert('Turn order for this match:\n\n'+turnOrderText()+'\n\nPlayer labels I–IV follow this exact order for this match.'); flash('Game ready. Starting player: '+G.players[G.turn].name+' ('+playerMark(G.turn)+'). Legend and recent action history stay visible; Shedu treasure ribbons show whether each starting treasure is still present.'); autoSave('game start'); if(G.players[G.turn].ai) setTimeout(aiTurn,650);
          }
          function drawOne(){let total=G.bag.reduce((a,b)=>a+b,0); if(total<=0){G.over=true; return -1;} let r=Math.floor(Math.random()*total); for(let i=0;i<4;i++){if(r<G.bag[i]){G.bag[i]--; return i;} r-=G.bag[i];} return -1;}
          function drawTo(p,n){while(G.players[p].hand.reduce((a,b)=>a+b,0)<n){let t=drawOne(); if(t<0){G.over=true;break;} G.players[p].hand[t]++;}}
          function canAfford(p,c){return G.players[p].hand[c]>0}
          function comps(block){let seen=new Set(), res=[]; eachCell((c,x,y)=>{let k=key(x,y); if(seen.has(k)||!hasNode(c)||k===block)return; let q=[[x,y]], comp=[], leaders=[]; seen.add(k); while(q.length){let [cx,cy]=q.pop(), cc=cell(cx,cy); comp.push([cx,cy]); if(cc.leader)leaders.push({x:cx,y:cy,p:cc.leader.p,color:cc.leader.color}); for(const [nx,ny] of neighbors(cx,cy)){let nk=key(nx,ny); if(nk===block||seen.has(nk)||!hasNode(cell(nx,ny)))continue; seen.add(nk); q.push([nx,ny]);}} res.push({cells:comp,leaders});}); return res;}
          function compAt(x,y,block){return comps(block).find(co=>co.cells.some(p=>p[0]===x&&p[1]===y));}
          function compIdMap(block){let map=new Map(); comps(block).forEach((co,i)=>co.cells.forEach(p=>map.set(key(p[0],p[1]),i))); return map;}
          function neighborKingdomCount(x,y){let cm=comps().filter(c=>c.leaders.length); let map=new Map(); cm.forEach((co,i)=>co.cells.forEach(p=>map.set(key(p[0],p[1]),i))); let s=new Set(); for(const [nx,ny] of neighbors(x,y)){let id=map.get(key(nx,ny)); if(id!==undefined)s.add(id);} return s.size;}
          function legalLeader(p,color,x,y){let c=cell(x,y); if(!emptyCell(c)||c.river)return false; let adjTemple=neighbors(x,y).some(([nx,ny])=>faceTemple(cell(nx,ny))); if(!adjTemple)return false; return neighborKingdomCount(x,y)<=1;}
          async function placeLeader(p,color,x,y){if(!legalLeader(p,color,x,y))return 'Illegal leader placement.'; let old=G.players[p].leaders[color]; if(old){cell(old.x,old.y).leader=null;} let c=cell(x,y); c.leader={p,color}; G.players[p].leaders[color]={x,y}; log(G.players[p].name+' placed '+CNAME[color]+' '+LEADER[color]+' at '+coord(x,y)+'.'); await resolveRevolt(p,color,x,y); treasureSweep(); spendAction(); return null;}
          function legalTile(p,color,x,y){let c=cell(x,y); if(!emptyCell(c))return false; if(color===BLUE?!c.river:c.river)return false; if(!canAfford(p,color))return false; return neighborKingdomCount(x,y)<=2;}
          async function placeTile(p,color,x,y){if(!legalTile(p,color,x,y))return 'Illegal tile placement.'; let unite=neighborKingdomCount(x,y)===2; let c=cell(x,y); c.tile=color; G.players[p].hand[color]--; log(G.players[p].name+' placed '+CNAME[color]+' '+TILE[color]+' at '+coord(x,y)+'.'); if(unite){c.union=p; G.lastUnion={x,y,color}; log('Unification marker placed on '+coord(x,y)+'. The linking tile gives no placement VP.'); await resolveWars(p,x,y,color); c.union=null; G.lastUnion=null; if(c.tile===color&&!c.face&&!c.wonder&&!c.cat){postConflictBuilds(p,x,y,color);} } else {awardTilePoint(p,x,y,color); postConflictBuilds(p,x,y,color);} treasureSweep(); spendAction(); return null;}
          function awardTilePoint(active,x,y,color){let co=compAt(x,y); if(!co||!co.leaders.length)return; let holder=co.leaders.find(l=>l.color===color)||co.leaders.find(l=>l.color===BLACK); if(!holder)return; let amount=1; if(G.settings.buildings && co.cells.some(([cx,cy])=>cell(cx,cy).building===color))amount=2; G.players[holder.p].vp[color]+=amount; log(G.players[holder.p].name+' gains '+amount+' '+VP[color]+'.');}
          function spendAction(){if(G.over){gameOver();return;} if(!G.players[G.turn].ai){G.actions--; if(G.actions<=0)endTurn(); else render();}}
          function endTurn(){autoSave('before end turn'); scoreEndOfTurn(G.turn); drawTo(G.turn,6); for(let p=0;p<G.players.length;p++)drawTo(p,6); if(boardTreasures()<=2||G.over){autoSave('game over'); gameOver();return;} G.turn=(G.turn+1)%G.players.length; G.actions=2; preActionSnapshot=null; log('TURN START: '+playerMark(G.turn)+' — '+G.players[G.turn].name); render(); autoSave('turn start'); if(G.players[G.turn].ai)setTimeout(aiTurn,250);}
          function boardTreasures(){let n=0; eachCell(c=>{if(c.treasure)n++;}); return n;}
          async function resolveRevolt(attacker,color,x,y){let co=compAt(x,y); if(!co)return; let rivals=co.leaders.filter(l=>l.color===color); if(rivals.length<2)return; let def=rivals.find(l=>!(l.x===x&&l.y===y)); if(!def)return; let aBase=neighbors(x,y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length; let dBase=neighbors(def.x,def.y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length; let aSup=await commit(attacker,RED,aBase,dBase,true,true); let dSup=await commit(def.p,RED,dBase,aBase+aSup,true,false); let winner=(aBase+aSup>dBase+dSup)?attacker:def.p; let loser=(winner===attacker)?def:{p:attacker,x,y,color}; G.players[winner].vp[RED]++; removeLeader(loser.x,loser.y); log('Revolt: '+G.players[winner].name+' wins and gains 1 amulet.');}
          async function resolveWars(active,ux,uy,ucolor){
           let original=compAt(ux,uy); if(!original)return;
           let originKeys=new Set(original.cells.map(([x,y])=>key(x,y)));
           let safety=0;
           while(safety++<12){
            let conflicts=[];
            for(const co of comps()){
             if(!co.cells.some(([cx,cy])=>originKeys.has(key(cx,cy))))continue;
             for(let color=0;color<4;color++){
              let ls=co.leaders.filter(l=>l.color===color);
              if(ls.length>1)conflicts.push({color,leaders:ls,co});
             }
            }
            if(!conflicts.length)break;
            let conflict=await chooseWarConflict(active,conflicts,ux,uy), color=conflict.color, ls=conflict.leaders.slice();
            let attacker=ls.find(l=>l.p===active);
            if(!attacker){attacker=ls.slice().sort((a,b)=>((a.p-active+G.players.length)%G.players.length)-((b.p-active+G.players.length)%G.players.length))[0];}
            let defender=ls.find(l=>!(l.x===attacker.x&&l.y===attacker.y));
            let block=key(ux,uy);
            let aBase=countSupport(attacker.x,attacker.y,color,block), dBase=countSupport(defender.x,defender.y,color,block);
            log('War attacker: '+G.players[attacker.p].name+'; defender: '+G.players[defender.p].name+' for '+CNAME[color]+'.');
            let aSup=await commit(attacker.p,color,aBase,dBase,false,true);
            let dSup=await commit(defender.p,color,dBase,aBase+aSup,false,false);
            let aTotal=aBase+aSup,dTotal=dBase+dSup;
            let winner=aTotal>dTotal?attacker:defender, loser=aTotal>dTotal?defender:attacker;
            let removed=removeWarLoser(loser.x,loser.y,color,block);
            G.players[winner.p].vp[color]+=1+removed;
            log('War over '+CNAME[color]+': '+G.players[winner.p].name+' wins '+(1+removed)+' '+VP[color]+'.');
           }
           let u=cell(ux,uy); if(u.union!==null)log('Unification marker removed from '+coord(ux,uy)+'. The linking tile remains.');
          }
          async function chooseWarConflict(active,conflicts,ux,uy){if(conflicts.length<=1)return conflicts[0]; if(G.players[active].ai){let choice=autoWarConflict(active,conflicts,ux,uy); flash(G.players[active].name+' chooses to resolve '+CNAME[choice.color]+' '+LEADER[choice.color]+' war first.'); log(G.players[active].name+' chooses conflict order: '+CNAME[choice.color]+' first.'); return choice;} return requestWarOrder(active,conflicts,ux,uy);}
          function autoWarConflict(active,conflicts,ux,uy){let block=key(ux,uy); let scored=conflicts.map(cf=>{let own=cf.leaders.find(l=>l.p===active), foes=cf.leaders.filter(l=>l.p!==active), score=0; if(own&&foes.length){let foe=foes[0]; score=countSupport(own.x,own.y,cf.color,block)+G.players[active].hand[cf.color]-(countSupport(foe.x,foe.y,cf.color,block)+G.players[foe.p].hand[cf.color]); score+=8;} else if(foes.length>1){let vals=foes.map(f=>G.players[f.p].vp.reduce((a,b)=>a+b,0)); score=2+(Math.max(...vals)-Math.min(...vals))/10;} return {cf,score};}); scored.sort((a,b)=>b.score-a.score); return scored[0].cf;}
          function conflictLabel(cf){return CNAME[cf.color]+' '+LEADER[cf.color]+' war: '+cf.leaders.map(l=>G.players[l.p].name+' at '+coord(l.x,l.y)).join(' vs ');}
          function requestWarOrder(active,conflicts,ux,uy){return new Promise(resolve=>{pendingWarOrder={active,conflicts,ux,uy,resolve}; let drawer=document.getElementById('warOrderDrawer'), text=document.getElementById('warOrderText'), box=document.getElementById('warOrderButtons'); text.textContent='War order: choose which like-coloured leader conflict to resolve next. You choose the order even if you are not involved; attacker is determined separately.'; box.innerHTML=''; conflicts.forEach((cf,i)=>{let b=document.createElement('button'); b.textContent=conflictLabel(cf); b.onclick=()=>pickWarConflict(i); box.appendChild(b);}); drawer.style.display='block'; flash('War order: active player chooses the next conflict to resolve.'); render();});}
          function pickWarConflict(i){if(!pendingWarOrder)return; let s=pendingWarOrder, cf=s.conflicts[i]; document.getElementById('warOrderDrawer').style.display='none'; pendingWarOrder=null; flash('Resolving '+CNAME[cf.color]+' '+LEADER[cf.color]+' war next.'); log(G.players[s.active].name+' chooses conflict order: '+CNAME[cf.color]+' next.'); s.resolve(cf);}
          function countSupport(x,y,color,block){let seen=new Set([block]), q=[[x,y]], count=0; while(q.length){let [cx,cy]=q.pop(), cc=cell(cx,cy); if(cc.tile===color&&!cc.face&&!cc.wonder)count++; for(const [nx,ny] of neighbors(cx,cy)){let k=key(nx,ny); if(seen.has(k)||!hasNode(cell(nx,ny)))continue; seen.add(k); q.push([nx,ny]);}} return count;}
          function removeWarLoser(x,y,color,block){removeLeader(x,y); let seen=new Set([block]), q=[[x,y]], victims=[]; while(q.length){let [cx,cy]=q.pop(), cc=cell(cx,cy); if(cc.tile===color&&!cc.face&&!cc.wonder&&cc.building===null){ if(color!==RED||(!cc.treasure&&!neighbors(cx,cy).some(([nx,ny])=>cell(nx,ny).leader&&cell(nx,ny).leader.color!==RED)))victims.push([cx,cy]); }
           for(const [nx,ny] of neighbors(cx,cy)){let k=key(nx,ny); if(seen.has(k)||!hasNode(cell(nx,ny)))continue; seen.add(k); q.push([nx,ny]);}}
           for(const [vx,vy] of victims){let c=cell(vx,vy); if(c.building!==null)G.buildingsOn[c.building]=null; c.tile=null; c.face=false; c.treasure=false; c.building=null; c.union=null;} afterBoardChange('war removal'); return victims.length;}
          function removeLeader(x,y){let c=cell(x,y); if(c.leader){G.players[c.leader.p].leaders[c.leader.color]=null; c.leader=null;}}
          function evictUnsupportedLeaders(){eachCell((c,x,y)=>{if(c.leader&&!neighbors(x,y).some(([nx,ny])=>faceTemple(cell(nx,ny)))){log(G.players[c.leader.p].name+' loses unsupported '+LEADER[c.leader.color]+'.'); removeLeader(x,y);}});}
          function afterBoardChange(reason){evictUnsupportedLeaders(); validateBuildingState(); if(reason)log('Board checked after '+reason+'.');}
          function validateBuildingState(){for(let i=0;i<4;i++){let pos=G.buildingsOn[i]; if(pos){let c=cell(pos.x,pos.y); if(c.building!==i||c.tile!==i||c.face||c.wonder||c.cat){c.building=null;G.buildingsOn[i]=null;log(BUILDING[i]+' returned beside the board.');}}}}
          async function commit(p,color,base,opponent,isRevolt,isAttacker){let max=G.players[p].hand[color]; let needed=isAttacker?opponent+1-base:opponent-base; if(!isAttacker&&needed<0)needed=0; let suggested=Math.max(0,Math.min(max,needed)); if(G.settings.english){ if(isAttacker && needed>max) suggested=0; if(!isAttacker && needed>max) suggested=0; }
           let n=0;
           if(!G.players[p].ai){n=await requestSupport(p,color,base,opponent,isRevolt,isAttacker,suggested,max,needed);}
           else {let level=G.aiLevel; if(level==='easy')n=Math.min(max,Math.random()<.45?1:0); else n=suggested; if(level==='hard'&&needed>0&&needed<=max)n=needed; if(G.settings.english){ if(isAttacker && base+n<=opponent)n=0; if(!isAttacker && base+n!==opponent)n=0; }}
           G.players[p].hand[color]-=n; if(n)log(playerDoes(p,'commit','commits')+' '+n+' '+CNAME[color]+'.'); else log(playerDoes(p,'commit','commits')+' no '+CNAME[color]+' support.'); return n;}
          function requestSupport(p,color,base,opponent,isRevolt,isAttacker,suggested,max,needed){
           return new Promise(resolve=>{pendingSupport={p,color,base,opponent,isRevolt,isAttacker,suggested,max,needed,resolve}; let drawer=document.getElementById('supportDrawer'), rng=document.getElementById('supportRange'); drawer.style.display='block'; rng.min=0; rng.max=max; rng.value=suggested; updateSupportReadout(); flash((isRevolt?'Revolt':'War')+' support needed: choose '+CNAME[color]+' tile support for '+G.players[p].name+'.'); render();});
          }
          function updateSupportReadout(){if(!pendingSupport)return; let n=+document.getElementById('supportRange').value, s=pendingSupport, rule=''; if(G.settings.english){ if(s.isAttacker) rule='English variant: attacker may commit 0, or enough to exceed the defender.'; else rule='English variant: defender may commit 0, or exactly enough to tie.';} else rule='Commit any number from your hand.'; document.getElementById('supportText').textContent=G.players[s.p].name+' support with '+CNAME[s.color]+' tiles.'; let battle=document.getElementById('supportBattle'); if(battle) battle.innerHTML='<div class="conflictSide"><b>'+G.players[s.p].name+'</b><br>Board support: '+s.base+'<br>Committed: '+n+'<br><b>Total: '+(s.base+n)+'</b></div><div class="conflictSide"><b>Opponent</b><br>Current strength: '+s.opponent+'<br>Defender wins ties.<br><b>Target: '+(s.isAttacker?'exceed':'tie/win')+'</b></div>'; document.getElementById('supportHint').textContent=rule; document.getElementById('supportValue').textContent='Selected support: '+n+' tile(s). Suggested: '+s.suggested+'.';}
          function commitSupportChoice(force){if(!pendingSupport)return; let s=pendingSupport, n=(force===0)?0:+document.getElementById('supportRange').value; n=Math.max(0,Math.min(s.max,n)); if(G.settings.english&&n>0){ if(s.isAttacker && s.base+n<=s.opponent){flash('Ineligible support amount: attacker must exceed the current defender strength, or commit none.'); return;} if(!s.isAttacker && s.base+n!==s.opponent){flash('Ineligible support amount: defender must commit exactly enough to tie, or commit none.'); return;} } document.getElementById('supportDrawer').style.display='none'; pendingSupport=null; flash(playerDoes(s.p,'commit','commits')+' '+n+' '+CNAME[s.color]+' support tile(s).'); s.resolve(n);}
          
          function postConflictBuilds(p,x,y,color){ if(G.settings.buildings) placeBuildingIfLine(color,x,y,p); maybeWonderOrMonument(p,x,y,color); }
          function maybeWonderOrMonument(p,x,y,color){ let crosses=findCrosses(x,y,color); if(G.settings.wonder && crosses.length && !wonderOnBoard()){let build=G.players[p].ai?G.aiLevel!=='easy':confirm('Build the wonder from this 5-tile cross?'); if(build){buildWonder(crosses[0]);return;}} let sqs=findSquares(x,y,color); if(sqs.length){let opts=G.monuments.filter(m=>!m.used&&m.colors.includes(color)); if(opts.length){let build=G.players[p].ai?true:confirm('Build a monument from the 2x2 '+CNAME[color]+' square?'); if(build){let m=opts[0]; if(!G.players[p].ai&&opts.length>1){let ans=prompt('Choose monument by number:\n'+opts.map((o,i)=>(i+1)+': '+o.colors.map(c=>CNAME[c]).join('/')).join('\n'),'1'); let idx=Math.max(0,Math.min(opts.length-1,(parseInt(ans||'1',10)||1)-1)); m=opts[idx];} buildMonument(sqs[0],m);}}}}
          function wonderOnBoard(){let found=false; eachCell(c=>{if(c.wonder)found=true;}); return found;}
          function findSquares(x,y,color){let a=[]; for(let dx=-1;dx<=0;dx++)for(let dy=-1;dy<=0;dy++){let sx=x+dx,sy=y+dy;if(sx<0||sy<0||sx>=W-1||sy>=H-1)continue; let ps=[[sx,sy],[sx+1,sy],[sx,sy+1],[sx+1,sy+1]]; if(ps.every(([cx,cy])=>{let c=cell(cx,cy); return c.tile===color&&!c.face&&!c.wonder&&!c.cat&&!c.mon;}))a.push(ps);} return a;}
          function crossAt(cx,cy,color){let ps=[[cx,cy],[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]]; if(ps.every(([x,y])=>inside(x,y)&&cell(x,y).tile===color&&!cell(x,y).face&&!cell(x,y).wonder&&!cell(x,y).cat&&!cell(x,y).mon))return ps; return null;}
          function findCrosses(x,y,color){let centers=[[x,y],[x+1,y],[x-1,y],[x,y+1],[x,y-1]], res=[]; for(const [cx,cy] of centers){let ps=crossAt(cx,cy,color); if(ps && ps.some(([px,py])=>px===x&&py===y))res.push(ps);} return res;}
          function findCross(x,y,color){let r=findCrosses(x,y,color); return r.length?r[0]:null;}
          function buildMonument(ps,m){m.used=true; let id='M'+m.id; for(const [x,y] of ps){let c=cell(x,y); c.face=true; c.mon=id; if(c.building!==null){G.buildingsOn[c.building]=null;c.building=null;}} cell(ps[0][0],ps[0][1]).monumentColors=m.colors; log('Monument built: '+m.colors.map(c=>CNAME[c]).join('/')+'.'); afterBoardChange('monument building');}
          function buildWonder(ps){for(const [x,y] of ps){let c=cell(x,y); if(c.building!==null){G.buildingsOn[c.building]=null;c.building=null;} c.tile=null;c.face=true;c.wonder=true;} log('Wonder erected. Treasures on replaced temples remain on the wonder space and can still be collected.'); afterBoardChange('wonder building');}
          function ordinal(n){return ['first','second','third','fourth','fifth','sixth','seventh','eighth','ninth','tenth'][n-1]||String(n)+'th';}
          function sortLine(arr){return arr.slice().sort((a,b)=>(a[0]-b[0])||(a[1]-b[1]));}
          function lineOrientation(arr){return arr.every(p=>p[0]===arr[0][0])?'vertical':'horizontal';}
          function linePositionName(line,i){let o=lineOrientation(line), n=line.length; if(n===3)return (o==='vertical'?['top','middle','bottom']:['left','centre','right'])[i]; return ordinal(i+1);}
          function lineSummary(line){let o=lineOrientation(line), dir=o==='vertical'?'top to bottom':'left to right'; return CNAME[cell(line[0][0],line[0][1]).tile]+' line of '+line.length+' ('+dir+'): '+line.map((pt,i)=>linePositionName(line,i)+' '+coord(pt[0],pt[1])).join(', ');}
          function buildingChoiceLine(line){let o=lineOrientation(line), dir=o==='vertical'?'top to bottom':'left to right'; return line.map((pt,i)=>(i+1)+': '+linePositionName(line,i)+' tile ('+dir+') — '+coord(pt[0],pt[1])).join('\n');}
          function placeBuildingIfLine(color,x,y,p){let candidates=[]; for(const dir of [[1,0],[0,1]]){let arr=[[x,y]]; for(const s of [-1,1]){let nx=x+dir[0]*s,ny=y+dir[1]*s; while(inside(nx,ny)&&cell(nx,ny).tile===color&&!cell(nx,ny).face&&!cell(nx,ny).wonder){arr.push([nx,ny]); nx+=dir[0]*s; ny+=dir[1]*s;}} if(arr.length>=3)candidates.push(sortLine(arr));} if(!candidates.length)return; let current=G.buildingsOn[color]; let oldLen=0; if(current){oldLen=lineLenAt(color,current.x,current.y);} candidates=candidates.filter(line=>line.length>oldLen); if(!candidates.length)return; candidates.sort((a,b)=>b.length-a.length); let best=candidates[0]; if(!G.players[p].ai){let ok=confirm('Place or move the '+BUILDING[color]+' onto a new '+CNAME[color]+' line?\n\nEligible line: '+lineSummary(best)); if(!ok)return; if(candidates.length>1){let ans=prompt('Choose which line for '+BUILDING[color]+' by number:\n'+candidates.map((line,i)=>(i+1)+': '+lineSummary(line)).join('\n'),'1'); let idx=Math.max(0,Math.min(candidates.length-1,(parseInt(ans||'1',10)||1)-1)); best=candidates[idx];}} let choice=best[0]; if(!G.players[p].ai&&best.length>1){let ans=prompt('Choose where to place '+BUILDING[color]+' by number:\n'+buildingChoiceLine(best),'1'); let idx=Math.max(0,Math.min(best.length-1,(parseInt(ans||'1',10)||1)-1)); choice=best[idx];} if(current)cell(current.x,current.y).building=null; let [bx,by]=choice; cell(bx,by).building=color; G.buildingsOn[color]={x:bx,y:by}; log(BUILDING[color]+' placed at '+coord(bx,by)+' for '+CNAME[color]+' line.');}
          function lineLenAt(color,x,y){let max=1; for(const dir of [[1,0],[0,1]]){let n=1; for(const s of [-1,1]){let nx=x+dir[0]*s,ny=y+dir[1]*s; while(inside(nx,ny)&&cell(nx,ny).tile===color&&!cell(nx,ny).face&&!cell(nx,ny).wonder){n++;nx+=dir[0]*s;ny+=dir[1]*s;}} max=Math.max(max,n);} return max;}
          function treasureSweep(){let cps=comps().filter(co=>co.leaders.length); for(const co of cps){let treasures=co.cells.filter(([x,y])=>cell(x,y).treasure); if(treasures.length<=1)continue; let trader=co.leaders.find(l=>l.color===GREEN); if(!trader)continue; let take=treasures.length-1; for(let i=0;i<take;i++){let remaining=co.cells.filter(([x,y])=>cell(x,y).treasure); let special=remaining.filter(([x,y])=>cell(x,y).special); let choices=special.length?special:remaining; let pick=chooseTreasure(trader.p,choices,special.length>0); cell(pick[0],pick[1]).treasure=false; G.players[trader.p].treasures++; log(G.players[trader.p].name+' takes a treasure from '+coord(pick[0],pick[1])+(special.length?' (special border first).':'.'));}}}
          function chooseTreasure(p,choices,forcedSpecial){choices=choices.slice().sort((a,b)=>a[1]-b[1]||a[0]-b[0]); if(G.players[p].ai||choices.length<=1)return choices[0]; let ans=prompt((forcedSpecial?'Choose a special-border treasure to take by number:\n':'Choose a treasure to take by number:\n')+choices.map((pt,i)=>(i+1)+': '+coord(pt[0],pt[1])).join('\n'),'1'); let idx=Math.max(0,Math.min(choices.length-1,(parseInt(ans||'1',10)||1)-1)); return choices[idx];}
          function playCat(p,x,y){let c=cell(x,y); let bad=playCatCheck(p,x,y); if(bad)return bad; c.cat=true; c.tile=null;c.face=false;c.leader=null;c.treasure=false;c.union=null; G.players[p].cat--; log(G.players[p].name+' plays catastrophe at '+coord(x,y)+'.'); afterBoardChange('catastrophe'); spendAction(); return null;}
          function replaceTiles(p,color,all){let n=0; if(all){n=G.players[p].hand.reduce((a,b)=>a+b,0); G.players[p].hand=[0,0,0,0];} else {n=G.players[p].hand[color]; G.players[p].hand[color]=0;} drawTo(p,6); log(G.players[p].name+' recycles '+n+' tile(s).'); spendAction(); return null;}
          function getRecycleCounts(){return [0,1,2,3].map(i=>Math.max(0,parseInt((document.getElementById('rec'+i)||{}).value||'0',10)||0));}
          function replaceCustom(p,counts){let total=counts.reduce((a,b)=>a+b,0); if(total<=0)return 'Choose at least one tile to recycle.'; if(total>6)return 'You can recycle at most six tiles.'; for(let i=0;i<4;i++){if(counts[i]>G.players[p].hand[i])return 'You do not have that many '+CNAME[i]+' tiles.';} for(let i=0;i<4;i++)G.players[p].hand[i]-=counts[i]; drawTo(p,6); log(G.players[p].name+' recycles '+counts.map((n,i)=>n?CNAME[i]+' '+n:null).filter(Boolean).join(', ')+'.'); spendAction(); return null;}
          function syncRecycleInputs(){if(!G||!document.getElementById('rec0'))return; let panel=document.getElementById('recyclePanel'); if(panel){panel.classList.toggle('active', document.getElementById('action').value==='recycleCustom');} for(let i=0;i<4;i++){let el=document.getElementById('rec'+i), max=G.players[0].hand[i]; el.max=max; if(+el.value>max)el.value=max;}}
          function replaceCustomAi(p,counts){let err=replaceCustom(p,counts); if(err)log('AI recycle skipped: '+err); else log('AI plan: '+G.players[p].name+' recycled weak/surplus tiles.');}
          
          async function doHumanAction(){if(G.over||G.players[G.turn].ai||pendingSupport||pendingWarOrder)return; preActionSnapshot=JSON.stringify(G); let p=G.turn, a=action.value, color=+document.getElementById('color').value, x=selected.x, y=selected.y; let imp=impactfulMoveText(a,color,x,y); if(G.settings.confirmImpact&&imp&&!confirm('Confirm impactful move:\n\n'+imp+'\n\nContinue?')){flash('Move cancelled.');return;} let err=null; if(a==='tile')err=await placeTile(p,color,x,y); else if(a==='leader')err=await placeLeader(p,color,x,y); else if(a==='withdraw'){let c=cell(x,y); if(c.leader&&c.leader.p===p){removeLeader(x,y); log('You withdrew a leader.'); spendAction();} else err='Select one of your leaders.';} else if(a==='cat')err=playCat(p,x,y); else if(a==='recycleCustom')err=replaceCustom(p,getRecycleCounts()); else if(a==='replaceColor')err=replaceTiles(p,color,false); else if(a==='replaceAll')err=replaceTiles(p,color,true); if(err){preActionSnapshot=null; flash(err+' '+eligibilityText());} render(); autoSave('after action');}
          function hardRecommendations(p,limit=4){let old=G.aiLevel; G.aiLevel='hard'; let moves=[]; for(let c=0;c<4;c++){ if(G.players[p].hand[c]>0){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalTile(p,c,x,y)){let v=evaluateTile(p,c,x,y); if(v>-30)moves.push({t:'tile',c,x,y,v});}} for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalLeader(p,c,x,y)){let v=evaluateLeader(p,c,x,y); if(v>-30)moves.push({t:'leader',c,x,y,v});} } if(G.players[p].cat>0){eachCell((cc,x,y)=>{let v=evaluateCat(p,x,y); if(v!==null&&v>3)moves.push({t:'cat',x,y,v});});} let rp=recyclePlan(p); if(rp.score>2.75)moves.push({t:'recycle',counts:rp.counts,v:rp.score}); G.aiLevel=old; moves.sort((a,b)=>b.v-a.v); return moves.slice(0,limit).map((m,i)=>(i+1)+'. '+moveLabel(m));}
          function finishHumanTurn(){if(pendingSupport||pendingWarOrder){flash('Resolve the current war/support choice first.');return;} if(!G.players[G.turn].ai){ if(G.actions>0){let recs=hardRecommendations(G.turn,5); let checklist=endTurnChecklist(); let msg='End-turn checklist:\n'+checklist+'\n\nYou still have '+G.actions+' action'+(G.actions===1?'':'s')+' available. Strong options include:\n\n'+(recs.length?recs.join('\n'):'No clearly useful action found; recycling tiles may still be worth considering.')+'\n\nTap OK only if you explicitly do not care and want to end the turn anyway. Tap Cancel to keep playing.'; if(!confirm(msg)){flash('Turn not ended. Choose an action or tap Finish turn again and confirm.'); return;} log('You explicitly chose to end the turn with '+G.actions+' unused action'+(G.actions===1?'':'s')+'.'); } endTurn();}}
          function aiTurn(){if(G.over||!G.players[G.turn].ai||aiBusy)return; let p=G.turn; aiBusy=true; flash(G.players[p].name+' is thinking…'); runAiStep(p,0);}
          function runAiStep(p,step){ if(G.over||G.turn!==p){aiBusy=false; return;} if(step>=2){flash(G.players[p].name+' ends the turn.'); aiBusy=false; setTimeout(()=>endTurn(),AI_PACE.end); return;} let move=chooseAiMove(p); if(!move){move={t:'recycle',counts:recyclePlan(p).counts,v:0};} if(move.x!==undefined)selected={x:move.x,y:move.y}; render(); let dest=(move.x!==undefined&&move.y!==undefined)?(' at '+coord(move.x,move.y)):''; flash(G.players[p].name+' is considering '+moveLabel(move)+dest+'.'); setTimeout(async()=>{ flash(G.players[p].name+' executes '+moveLabel(move)+dest+'.'); if(move.t==='tile')await placeTileAi(p,move.c,move.x,move.y); else if(move.t==='leader')await placeLeaderAi(p,move.c,move.x,move.y); else if(move.t==='cat')playCatAi(p,move.x,move.y); else if(move.t==='recycle')replaceCustomAi(p,move.counts); render(); setTimeout(()=>runAiStep(p,step+1),AI_PACE.between); },AI_PACE.plan); }
          function moveLabel(m){if(!m)return 'none'; if(m.t==='tile')return 'place '+CNAME[m.c]+' '+TILE[m.c]+' at '+coord(m.x,m.y); if(m.t==='leader')return 'place '+CNAME[m.c]+' '+LEADER[m.c]+' at '+coord(m.x,m.y); if(m.t==='cat')return 'catastrophe at '+coord(m.x,m.y); if(m.t==='recycle')return 'recycle '+m.counts.map((n,i)=>n?CNAME[i]+' '+n:null).filter(Boolean).join(', '); return m.t;}
          function chooseAiMove(p){
           let moves=[];
           for(let c=0;c<4;c++){
            if(G.players[p].hand[c]>0){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalTile(p,c,x,y)){let v=evaluateTile(p,c,x,y); if(v>-30)moves.push({t:'tile',c,x,y,v});}}
            for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalLeader(p,c,x,y)){let v=evaluateLeader(p,c,x,y); if(v>-30)moves.push({t:'leader',c,x,y,v});}
           }
           if(G.players[p].cat>0){
            eachCell((cc,x,y)=>{let v=evaluateCat(p,x,y); if(v!==null && v>(G.aiLevel==='easy'?8:3))moves.push({t:'cat',x,y,v});});
           }
           let rp=recyclePlan(p); if(rp.score>(G.aiLevel==='easy'?8:2.75))moves.push({t:'recycle',counts:rp.counts,v:rp.score});
           if(!moves.length)return null;
           moves.sort((a,b)=>b.v-a.v);
           if(G.aiLevel==='easy'){
            let scoring=moves.filter(m=>m.v>2); let pool=scoring.length?scoring:moves; return pool[Math.floor(Math.random()*Math.min(pool.length,10))];
           }
           if(G.aiLevel==='regular'){
            let cutoff=moves[0].v-2.25; let pool=moves.filter(m=>m.v>=cutoff).slice(0,8); return pool[Math.floor(Math.random()*pool.length)];
           }
           return moves[0];
          }
          function evaluateTile(p,c,x,y){
           let v=0, pl=G.players[p], need=colourNeed(p,c); let beforeUnite=neighborKingdomCount(x,y)===2;
           if(beforeUnite)v+=G.aiLevel==='hard'?1.0:0.4;
           let tmp=cell(x,y); tmp.tile=c; let co=compAt(x,y); let holder=null;
           if(co){
            holder=co.leaders.find(l=>l.color===c)||co.leaders.find(l=>l.color===BLACK);
            if(holder&&holder.p===p)v+=7+need; else if(holder&&holder.p!==p)v-=10;
            if(co.leaders.some(l=>l.p===p&&l.color===GREEN)&&co.cells.some(([cx,cy])=>cell(cx,cy).treasure))v+=3;
            if(co.leaders.some(l=>l.p===p))v+=Math.min(2.5,co.cells.length/10);
            if(beforeUnite){let cf=warForecast(p,c,x,y); v+=cf;}
           }
           if(findSquares(x,y,c).length)v+=G.settings.buildings?5.5:4.5;
           if(G.settings.wonder&&findCross(x,y,c))v+=6.5;
           if(G.settings.buildings&&lineCandidateGain(c,x,y)>0)v+=2.5;
           if(!co||!co.leaders.length)v-=2.0;
           tmp.tile=null;
           return v + Math.random()*0.25;
          }
          function evaluateLeader(p,c,x,y){
           let v=1.2+colourNeed(p,c), old=G.players[p].leaders[c], oldCell=null;
           if(old){oldCell=cell(old.x,old.y); oldCell.leader=null; v-=0.8;}
           let tmp=cell(x,y); tmp.leader={p,color:c}; let co=compAt(x,y);
           if(co){
            let treasures=co.cells.filter(([cx,cy])=>cell(cx,cy).treasure).length;
            if(c===GREEN)v+=treasures*4.5; else v+=treasures*0.8;
