          function revoltForecast(p,c,x,y){let co=compAt(x,y); if(!co)return 0; let def=co.leaders.find(l=>l.color===c&&l.p!==p); if(!def)return 0; let aBase=neighbors(x,y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length, dBase=neighbors(def.x,def.y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length; let aMax=aBase+G.players[p].hand[RED], dMax=dBase+G.players[def.p].hand[RED]; if(aBase>dMax)return 5; if(aMax<=dBase)return -12; return aMax>dMax?2.5:-2;}
          function warForecast(p,c,x,y){let co=compAt(x,y); if(!co)return 0; let score=0; for(let col=0;col<4;col++){let ls=co.leaders.filter(l=>l.color===col); if(ls.length<2)continue; let own=ls.find(l=>l.p===p), enemy=ls.find(l=>l.p!==p); if(!own||!enemy){score-=2;continue;} let block=key(x,y), ownStr=countSupport(own.x,own.y,col,block)+G.players[p].hand[col], enStr=countSupport(enemy.x,enemy.y,col,block)+G.players[enemy.p].hand[col]; score += ownStr>enStr?3.5:-8;} return score;}
          function evaluateCat(p,x,y){let c=cell(x,y); if(c.leader||c.mon||c.wonder||c.treasure||c.building!==null||G.players[p].cat<=0)return null; if(c.tile===null&&!c.face)return null; let co=compAt(x,y), score=0; if(!co)return null; let own=co.leaders.filter(l=>l.p===p).length, enemy=co.leaders.filter(l=>l.p!==p).length; score+=(enemy-own)*2; if(c.tile===RED){for(const [nx,ny] of neighbors(x,y)){let l=cell(nx,ny).leader; if(!l)continue; let otherTemple=neighbors(nx,ny).some(([tx,ty])=>!(tx===x&&ty===y)&&faceTemple(cell(tx,ty))); if(!otherTemple)score += l.p===p?-20:12;}} if(c.tile!==null){let enemySame=co.leaders.some(l=>l.p!==p&&l.color===c.tile), ownSame=co.leaders.some(l=>l.p===p&&l.color===c.tile); if(enemySame)score+=3; if(ownSame)score-=4;} let before=comps().length; let old={tile:c.tile,face:c.face,cat:c.cat}; c.cat=true;c.tile=null;c.face=false; let after=comps().length; c.cat=old.cat;c.tile=old.tile;c.face=old.face; if(after>before&&enemy>own)score+=3; return score+Math.random()*0.2;}
          function recyclePlan(p){let h=G.players[p].hand, v=G.players[p].vp, min=Math.min(...v), counts=[0,0,0,0], score=0; for(let c=0;c<4;c++){let surplus=Math.max(0,h[c]-2), ahead=Math.max(0,v[c]-min-1); let legal=0; for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalTile(p,c,x,y)&&evaluateTile(p,c,x,y)>1)legal++; if((surplus||ahead)&&legal<2){counts[c]=Math.min(h[c],Math.max(1,Math.min(3,surplus+Math.floor(ahead/2)))); score+=counts[c]*(1.2+ahead*.25);} } let total=counts.reduce((a,b)=>a+b,0); if(total===0){let worst=h.indexOf(Math.max(...h)); if(h[worst]>2){counts[worst]=1; score=1.5;}} return {counts,score};}
          
