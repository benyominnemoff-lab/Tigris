ct,body.horiz #controls button{font-size:10px!important;padding:4px 3px!important}body.horiz .panelIntro{display:none!important}body.horiz #legend{font-size:10px!important;line-height:1.16!important}body.horiz #log{font-size:9.8px!important;line-height:1.16!important}.turnGroup{background:rgba(255,248,226,.13)!important}.turnLine{line-height:1.28!important}body.horiz #phaseBadge,body.horiz #playerStrip,body.horiz #previewBox{display:none!important}body.horiz canvas{max-width:100%!important;max-height:100%!important}

