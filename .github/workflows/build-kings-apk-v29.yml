          }
          function drawBoardBase(ctx,cw,ch){
           eachCell((c,x,y)=>{let px=x*cw,py=y*ch; ctx.fillStyle=c.river?'#7db8d7':'#d9b56c'; ctx.fillRect(px,py,cw,ch); if(c.river){ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(px+cw*.08,py+ch*.08,cw*.84,ch*.84);} if(c.shedu){ctx.fillStyle='rgba(250,238,190,.35)';ctx.fillRect(px+cw*.12,py+ch*.12,cw*.76,ch*.76);} if(c.special){ctx.strokeStyle='#ffe483';ctx.lineWidth=7;ctx.strokeRect(px+6,py+6,cw-12,ch-12);ctx.strokeStyle='#8a5b10';ctx.lineWidth=2.5;ctx.strokeRect(px+12,py+12,cw-24,ch-24);} ctx.strokeStyle='rgba(84,63,32,.65)';ctx.lineWidth=1.5;ctx.strokeRect(px,py,cw,ch); if(G.settings.showCoords){ctx.fillStyle='rgba(40,28,15,.55)';ctx.fillRect(px+3,py+3,Math.min(cw*.42,34),Math.min(ch*.20,18)); ctx.fillStyle='#fff5cf';ctx.font='900 '+(ch*.13)+'px Georgia';ctx.fillText(coord(x,y),px+6,py+Math.min(ch*.16,16));} });
           ctx.strokeStyle='rgba(20,92,132,.55)';ctx.lineWidth=Math.min(cw,ch)*.28;ctx.lineCap='round';
           eachCell((c,x,y)=>{if(!c.river)return; let cx=x*cw+cw/2,cy=y*ch+ch/2; for(const [nx,ny] of neighbors(x,y)){if(nx<x||ny<y)continue; if(cell(nx,ny).river){ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(nx*cw+cw/2,ny*ch+ch/2);ctx.stroke();}}});
          }
          function drawEligibilityOverlay(ctx,cw,ch){if(!G||!G.settings.showLegal||G.players[G.turn].ai||pendingSupport||pendingWarOrder)return; let a=document.getElementById('action').value; if(!['tile','leader','cat','withdraw'].includes(a))return; eachCell((c,x,y)=>{let px=x*cw,py=y*ch; if(isEligibleForCurrentAction(x,y)){ctx.fillStyle='rgba(65,170,70,.22)';ctx.fillRect(px+3,py+3,cw-6,ch-6);} }); if(!isEligibleForCurrentAction(selected.x,selected.y)){ctx.fillStyle='rgba(190,45,35,.22)';ctx.fillRect(selected.x*cw+3,selected.y*ch+3,cw-6,ch-6);}}
          function drawRoundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
          function drawSheduSiteLabel(ctx,c,px,py,cw,ch){
           ctx.save();
           ctx.fillStyle='rgba(85,60,31,.68)'; ctx.font='900 '+(ch*.17)+'px Georgia'; ctx.fillText(c.special?'Shedu★':'Shedu',px+cw*.08,py+ch*.30);
           ctx.restore();
          }
          function drawTreasureStateMarker(ctx,c,px,py,cw,ch){
           // Every Shedu starting treasure site gets the same status ribbon regardless of whether the temple is still face-up, has become a monument/wonder base, or is gone.
           // Gold means the treasure is still physically on that site; grey means that starting-site treasure has already been taken/removed.
           if(!c.treasure && !c.shedu)return;
           let isHere=!!c.treasure, isShedu=!!c.shedu;
           ctx.save();
           let w=isShedu?cw*.70:cw*.50, h=isShedu?ch*.21:ch*.20, x=px+cw*.15, y=py+ch*.72;
           if(c.face||c.wonder||c.mon){w=cw*.74;h=ch*.23;x=px+cw*.13;y=py+ch*.64;}
           ctx.fillStyle=isHere?'#f7d75a':'rgba(231,224,202,.88)';
           ctx.strokeStyle=isHere?'#5d3d08':'#6d6252'; ctx.lineWidth=isHere?3:2;
           drawRoundRect(ctx,x,y,w,h,7); ctx.fill(); ctx.stroke();
           ctx.fillStyle=isHere?'#4b3006':'#5a5146';
           ctx.textAlign='center';
           ctx.font='900 '+(isShedu?ch*.078:ch*.105)+'px Georgia';
           ctx.fillText(isHere?'TREASURE':'TAKEN',x+w/2,y+h*.62);
           if(isShedu){ctx.font='900 '+(ch*.062)+'px Georgia'; ctx.fillText('START SITE',x+w/2,y+h*.92);}
           ctx.textAlign='left'; ctx.restore();
          }
          function drawCellContents(ctx,c,x,y,cw,ch){let px=x*cw,py=y*ch;
           if(c.shedu&&G.settings.showShedu){drawSheduSiteLabel(ctx,c,px,py,cw,ch);}
           if(c.cat){ctx.fillStyle='#704126';drawRoundRect(ctx,px+8,py+8,cw-16,ch-16,8);ctx.fill();ctx.strokeStyle='#f6dfb0';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(px+cw*.30,py+ch*.30);ctx.lineTo(px+cw*.70,py+ch*.70);ctx.moveTo(px+cw*.70,py+ch*.30);ctx.lineTo(px+cw*.30,py+ch*.70);ctx.stroke();}
           if(c.face||c.wonder){ctx.fillStyle=c.wonder?'#cdbb82':'#9a8c73';drawRoundRect(ctx,px+9,py+9,cw-18,ch-18,8);ctx.fill();ctx.fillStyle='#3e3421';ctx.font='900 '+(ch*.16)+'px Georgia';ctx.fillText(c.wonder?'Wonder':'Monument base',px+cw*.11,py+ch*.55);}
           if(c.tile!==null&&!c.face&&!c.wonder){ctx.fillStyle=HEX[c.tile];drawRoundRect(ctx,px+10,py+10,cw-20,ch-20,9);ctx.fill();ctx.strokeStyle='#fff8';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=TEXTHEX[c.tile];ctx.font='900 '+(ch*.19)+'px Georgia';ctx.textAlign='center';ctx.fillText(TILE_SHORT[c.tile],px+cw*.50,py+ch*.55);ctx.textAlign='left';}
           if(c.union!==null){ctx.fillStyle='rgba(255,250,210,.92)';drawRoundRect(ctx,px+cw*.18,py+ch*.33,cw*.64,ch*.28,6);ctx.fill();ctx.strokeStyle='#5f3b16';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#4a2b10';ctx.font='900 '+(ch*.105)+'px Georgia';ctx.textAlign='center';ctx.fillText('UNIFY',px+cw*.50,py+ch*.51);ctx.textAlign='left';}
           if(c.monumentColors){ctx.fillStyle=HEX[c.monumentColors[0]];drawRoundRect(ctx,px+cw*.16,py+ch*.14,cw*.32,ch*.72,7);ctx.fill();ctx.fillStyle=HEX[c.monumentColors[1]];drawRoundRect(ctx,px+cw*.50,py+ch*.14,cw*.32,ch*.72,7);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(px+cw*.16,py+ch*.14,cw*.66,ch*.72);}
           if(c.building!==null){ctx.fillStyle='#fffbe8';drawRoundRect(ctx,px+cw*.55,py+ch*.07,cw*.40,ch*.22,5);ctx.fill();ctx.strokeStyle='#5c4322';ctx.stroke();ctx.fillStyle='#2b2117';ctx.font='900 '+(ch*.12)+'px Georgia';ctx.fillText(BUILDING[c.building].split(' ')[0],px+cw*.58,py+ch*.23);}
           if(G.settings.showShedu||c.treasure&&!c.shedu)drawTreasureStateMarker(ctx,c,px,py,cw,ch);
           if(c.leader){drawLeader(ctx,c.leader,px,py,cw,ch);}
          }
          function drawLeader(ctx,l,px,py,cw,ch){
           let r=Math.min(cw,ch)*.25, cx=px+cw*.50, cy=py+ch*.48;
           let playerBand=PLAYER_BAND[l.p]||'#ffffff', owner=SIGIL[l.p], role=LEADER_SHORT[l.color].toUpperCase();
           ctx.save();ctx.translate(cx,cy);
           ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(0,ch*.14,r+16,r*.36,0,0,7);ctx.fill();
           ctx.fillStyle=playerBand;ctx.strokeStyle='#fff7d3';ctx.lineWidth=3.5;
           if(l.p===0){ctx.beginPath();ctx.arc(0,0,r+14,0,7);ctx.fill();ctx.stroke();}
           else if(l.p===1){drawRoundRect(ctx,-(r+14),-(r+14),(r+14)*2,(r+14)*2,10);ctx.fill();ctx.stroke();}
           else if(l.p===2){ctx.beginPath();ctx.moveTo(0,-(r+16));ctx.lineTo(r+16,0);ctx.lineTo(0,r+16);ctx.lineTo(-(r+16),0);ctx.closePath();ctx.fill();ctx.stroke();}
           else {ctx.beginPath();for(let i=0;i<6;i++){let a=-Math.PI/2+i*Math.PI/3,rr=r+15,x=Math.cos(a)*rr,y=Math.sin(a)*rr;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.closePath();ctx.fill();ctx.stroke();}
           ctx.fillStyle=HEX[l.color];ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.fill();ctx.strokeStyle='#ffffff';ctx.lineWidth=2.5;ctx.stroke();
           ctx.textAlign='center';
           ctx.fillStyle=MARK_FILL[l.p]||'#fff';ctx.font='900 '+(ch*.16)+'px Georgia';ctx.fillText(playerMark(l.p),0,-ch*.045);
           ctx.font='900 '+(ch*.095)+'px Georgia';ctx.fillText(LEADER_SHORT[l.color].slice(0,2).toUpperCase(),0,ch*.105);
           ctx.fillStyle='#fff7d1';drawRoundRect(ctx,-r*1.18,-r*1.34,r*2.36,ch*.16,5);ctx.fill();ctx.strokeStyle='rgba(60,35,12,.70)';ctx.lineWidth=1;ctx.stroke();
           ctx.fillStyle='#3a240f';ctx.font='900 '+(ch*.078)+'px Georgia';ctx.fillText(owner,0,-r*1.20+ch*.10);
           ctx.fillStyle='#fff7d1';drawRoundRect(ctx,-r*1.28,r*1.07,r*2.56,ch*.17,5);ctx.fill();ctx.stroke();
           ctx.fillStyle='#3a240f';ctx.font='900 '+(ch*.070)+'px Georgia';ctx.fillText(role,0,r*1.20+ch*.045);
           ctx.restore();ctx.textAlign='left';
          }
                    function statusHTML(){let p=G.players[G.turn]; let sel=describeCell(selected.x,selected.y); let s='<span class="statusLead"><b>'+playerMark(G.turn)+' '+esc(p.name)+'</b> · A '+G.actions+' · '+coord(selected.x,selected.y)+'</span> <span class="statusSel">'+colorizeText(sel)+'</span><br>'; s+='<b>Hand</b> '+handText(0)+' · <b>VP</b> '+vpText(0)+' · <b>Treasure</b> '+G.players[0].treasures+'<br><b>Off board</b> '+yourOffBoardLeaders()+' · <span class="muted">'+shortOptionSummary()+'</span>'; return s;}
          function optionSummary(){return (G.settings.advanced?'Advanced board':'Standard board')+'; '+(G.settings.buildings?'Buildings on':'Buildings off')+'; '+(G.settings.english?'English variant on':'English variant off')+'; '+(G.settings.wonder?'Wonder on':'Wonder off')+'; AI '+G.aiLevel;}
          function shortOptionSummary(){return (G.settings.advanced?'Advanced':'Standard')+'; Bld '+(G.settings.buildings?'on':'off')+'; Eng '+(G.settings.english?'on':'off')+'; Wnd '+(G.settings.wonder?'on':'off')+'; AI '+G.aiLevel;}
          function legendHTML(){if(!G)return ''; let s=selectedSpaceCardHTML(); s+='<b>Leader legend:</b> '; for(let i=0;i<G.players.length;i++)s+='<span class="pill"><span class="ownerShape" style="color:'+PLAYER_BAND[i]+'">'+OWNER_SYMBOL[i]+'</span><span class="leaderHint">'+playerMark(i)+' / '+SIGIL[i]+'</span> = '+G.players[i].name+' ('+OWNER_FRAME_NAME[i]+')</span>'; s+=' <b>Leader spheres:</b> '; for(let c=0;c<4;c++)s+='<span class="pill"><span class="sw" style="background:'+HEX[c]+'"></span>'+CNAME[c]+' '+LEADER_SHORT[c]+'</span>'; s+=' <b>Tiles:</b> '; for(let c=0;c<4;c++)s+='<span class="pill"><span class="sw" style="background:'+HEX[c]+'"></span>'+CNAME[c]+': '+TILE[c]+'</span>'; if(G.settings.buildings)s+=' <span class="pill">Buildings: Palace/Library/Granary/Market Hall.</span>'; s+='<div class="tiny muted">Rule reminders live in Menu. Tap a square any time to update this Info panel.</div>'; return s;}
                    function saveGame(){if(!G){alert('No game to save.');return;} let name=prompt('Optional name for this saved match position:', ''); let now=new Date(); let item={id:'save-'+now.getTime(),ts:now.toISOString(),name:(name||'').trim(),summary:saveSummary(G),g:JSON.stringify(G)}; let saves=getSaves(); saves.unshift(item); setSaves(saves); populateSaveSelect(); alert('Saved match position:\n'+formatSaveTitle(item)); log('SAVED MATCH POSITION: '+formatSaveTitle(item));}
          window.addEventListener('load',populateSaveSelect);
          </script>
          </body>
          </html>

          EOF

      - name: Download Gradle
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip

      - name: Build debug APK
        run: ./gradle-8.7/bin/gradle --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kings-of-the-Two-Rivers-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
