eight:1.28;white-space:pre-wrap;}\n  #v40Modal .v40Body .line{padding:3px 0;border-bottom:1px solid rgba(139,90,34,.15);}\n  #v40Modal input{width:100%;box-sizing:border-box;border:1px solid #b78a3d;border-radius:10px;background:#fffdf4;color:#2b1809;padding:10px;font-size:15px;margin:8px 0;}\n  #v40Modal .v40Btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}\n  #v40Modal .v40Btns button{width:100%!important;min-height:38px!important;font-size:12px!important;}\n  #v40Modal .v40Btns.single{grid-template-columns:1fr;}\n  #v40Rules{position:fixed;inset:0;z-index:7550;display:none;align-items:flex-end;justify-content:center;background:rgba(31,18,7,.40);box-sizing:border-box;padding:0 12px max(10px,env(safe-area-inset-bottom,0px));}\n  #v40Rules .ruleCard{display:flex;flex-direction:column;box-sizing:border-box;background:linear-gradient(180deg,#fff8e6,#efd696);border:2px solid #8a5a22;box-shadow:0 -12px 32px #0008;color:#2d1c0d;overflow:hidden;border-radius:20px 20px 0 0;width:min(860px,96vw);max-height:64dvh;}\n  body:not(.playing) #v40Rules{align-items:center;padding:calc(12px + env(safe-area-inset-top,0px)) 12px calc(12px + env(safe-area-inset-bottom,0px));}\n  body:not(.playing) #v40Rules .ruleCard{border-radius:20px;width:min(920px,96vw);height:min(92dvh,880px);max-height:92dvh;}\n  body.horiz #v40Rules{justify-content:flex-end;padding-right:max(12px,env(safe-area-inset-right,0px));}\n  body.horiz #v40Rules .ruleCard{width:min(900px,72vw);max-height:72dvh;}\n  #v40Rules .ruleHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px 7px;border-bottom:1px solid rgba(139,90,34,.32);background:linear-gradient(180deg,#fff7dd,#f5dda2);}\n  #v40Rules h2{margin:0!important;font-family:var(--display)!important;font-size:17px!important;line-height:1.1!important;color:#3b210d!important;}\n  #v40Rules .ruleHead button{width:auto!important;min-width:78px!important;min-height:32px!important;font-size:10.5px!important;margin:0!important;padding:5px 9px!important;}\n  #v40Rules .ruleTabs{display:flex;gap:6px;overflow-x:auto;white-space:nowrap;padding:7px 10px;border-bottom:1px solid rgba(139,90,34,.23);background:#fff1c6;scrollbar-width:thin;}\n  #v40Rules .ruleTabs button{width:auto!important;min-width:auto!important;min-height:28px!important;margin:0!important;padding:4px 8px!important;border-radius:999px!important;font-size:10px!important;background:#fff8e8!important;color:#3b2411!important;border:1px solid #ba8a36!important;box-shadow:none!important;text-shadow:none!important;}\n  #v40Rules .ruleTabs button.active{background:linear-gradient(180deg,#9a642b,#744315)!important;color:#fff!important;border-color:#56300f!important;}\n  #v40Rules .ruleBody{overflow:auto!important;-webkit-overflow-scrolling:touch!important;padding:9px 12px 12px!important;flex:1!important;}\n  #v40Rules .ruleSection{padding:2px 0 12px;margin:0 0 9px;border-bottom:1px solid rgba(139,90,34,.20);scroll-margin-top:8px;}\n  #v40Rules .ruleSection h3{font-size:14.5px!important;margin:0 0 7px!important;color:#4b2b10!important;line-height:1.1!important;font-family:var(--display)!important;}\n  #v40Rules .ruleGrid{display:grid;grid-template-columns:1fr;gap:8px;}\n  body.horiz #v40Rules .ruleGrid, body:not(.playing) #v40Rules .ruleGrid{grid-template-columns:1fr 1fr!important;gap:10px!important;}\n  #v40Rules .ruleBox{background:rgba(255,250,235,.72);border:1px solid rgba(190,145,70,.45);border-radius:12px;padding:8px 9px;}\n  #v40Rules .ruleBox b{display:block;font-size:12px;margin:0 0 4px;color:#5d3511;}\n  #v40Rules .ruleBox ul{margin:0;padding-left:16px;}\n  #v40Rules .ruleBox li{font-size:11.5px!important;line-height:1.23!important;margin:0 0 3px!important;}\n  body.horiz #v40Rules .ruleBox li{font-size:10.8px!important;line-height:1.18!important;}\n  #menuPanel #v35ThemeButtons.themeButtons{display:grid!important;grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:10px!important;grid-column:1/3!important;margin:10px 0!important;align-items:stretch!important;}\n  #menuPanel #v35ThemeButtons button{width:100%!important;min-height:38px!important;max-width:none!important;font-size:10.2px!important;margin:0!important;padding:5px 4px!important;}\n  #menuPanel #v35ThemeButtons .themeClassic{background:linear-gradient(180deg,#a66b2c,#7d4617)!important;color:#fff!important;}\n  #menuPanel #v35ThemeButtons .themeMuted{background:linear-gradient(180deg,#8b7c5f,#5e5039)!important;color:#fff!important;}\n  #menuPanel #v35ThemeButtons .themeContrast{background:linear-gradient(180deg,#191919,#000)!important;color:#fff!important;border-color:#ffd84d!important;}\n  #menuPanel #v35ThemeButtons .themeRules{background:linear-gradient(180deg,#59627c,#3e455b)!important;color:#fff!important;}\n  #menuPanel .helpLink{display:none!important;}\n  body.horiz #menuPanel #v35ThemeButtons button{font-size:8.7px!important;min-height:31px!important;}\n  #saveGridV40{display:grid!important;grid-template-columns:1fr 1fr!important;gap:12px!important;margin-top:14px!important;align-items:stretch!important;}\n  #saveGridV40 button{width:100%!important;max-width:none!important;min-height:46px!important;font-size:12px!important;margin:0!important;padding:7px 8px!important;}\n  #saveGridV40 .danger{margin-top:8px!important;}\n  #canvasWrap.zoomed canvas{max-width:none!important;max-height:none!important;flex:0 0 auto!important;}\n\n</style>\n</head>\n<body>\n<header><h1>Kings of the Two Rivers</h1><div class=\"small\">\u2726 \U0001202D \u2726</div></header>\n<section id=\"setup\">\n  <div id=\"homeHero\"><div class=\"emblem\">\u265B</div><h1>Kings of the Two Rivers</h1><div class=\"flourish\">\u2726 \U0001202D \u2726</div></div>\n  <div class=\"card\">\n    <h2>Players and AI</h2>\n    <label for=\"aiCount\">Automated opponents</label>\n    <select id=\"aiCount\"><option>1</option><option>2</option><option selected>3</option></select>\n    <label for=\"aiLevel\">Automated opponent level</label>\n    <select id=\"aiLevel\"><option value=\"easy\">Easy \u2014 forgiving</option><option value=\"regular\" selected>Regular \u2014 balanced</option><option value=\"hard\">Hard \u2014 ruthless</option></select>\n    <label for=\"playerSymbol\">Your dynasty symbol</label>\n    <select id=\"playerSymbol\"><option value=\"BOW\" selected>Bow</option><option value=\"BULL\">Bull</option><option value=\"POT\">Pot</option><option value=\"LION\">Lion</option></select>\n  </div>\n  <div class=\"card\">\n    <h2>Board and separate rule toggles</h2>\n    <label for=\"boardSide\">Board layout</label>\n    <select id=\"boardSide\"><option value=\"standard\" selected>Standard board</option><option value=\"advanced\">Advanced board</option></select>\n    <div class=\"check\"><input id=\"ruleBuildings\" type=\"checkbox\"><div><b>Civilisation buildings</b><span>Adds buildings.</span></div></div>\n    <div class=\"check\"><input id=\"ruleEnglish\" type=\"checkbox\"><div><b>English variant</b><span>Stricter support.</span></div></div>\n    <div class=\"check\"><input id=\"ruleWonder\" type=\"checkbox\"><div><b>Wonder variant</b><span>Adds wonder.</span></div></div>\n    <div class=\"check\"><input id=\"showCoords\" type=\"checkbox\"><div><b>Show board coordinates</b><span>A1\u2013P11 labels.</span></div></div>\n    <div class=\"check\"><input id=\"confirmImpact\" type=\"checkbox\" checked><div><b>Confirm impactful moves</b><span>Confirm big moves.</span></div></div>\n    <div class=\"row setupActionRow\"><button onclick=\"startGameV44()\">Start game</button><button class=\"secondary\" onclick=\"showTutorial('setup')\">Rule reminders</button></div>\n  </div>\n  <div class=\"card\">\n    <h2>Continue saved match</h2>\n    <label for=\"saveSelect\">Saved positions</label>\n    <select id=\"saveSelect\"><option>No saved matches found</option></select>\n    <div id=\"saveDetails\" class=\"note tiny\">Choose a saved match by name and time.</div>\n    <div class=\"row\"><button class=\"secondary\" onclick=\"populateSaveSelect()\">Refresh saves</button><button onclick=\"continueSavedMatchV44()\">Continue selected match</button><button class=\"danger\" onclick=\"clearAllSavedMatches()\">Clear all saved matches</button></div>\n  </div>\n</section>\n<section id=\"game\">\n  <div id=\"topbar\"></div>\n  <div id=\"hudButtons\"><button data-panel=\"controls\" onclick=\"setActivePanel('controls')\">Actions</button><button data-panel=\"legend\" onclick=\"setActivePanel('legend')\">Info</button><button data-panel=\"log\" onclick=\"setActivePanel('log')\">History</button><button data-panel=\"menuPanel\" onclick=\"setActivePanel('menuPanel')\">Menu</button><button onclick=\"centerBoard()\">Board</button><button id=\"layoutBtn\" onclick=\"toggleGameLayout()\">Landscape</button></div>\n  <div id=\"playerStrip\"></div>\n  <div id=\"phaseBadge\"></div><div id=\"canvasWrap\"><canvas id=\"board\" width=\"1280\" height=\"880\"></canvas></div>\n  <div id=\"legend\"></div>\n  <div id=\"eventBox\">AI and conflict events will appear here.</div>\n  <div id=\"previewBox\">Select a space and action to see a rules preview.</div>\n  <div id=\"controls\">\n    <div id=\"actionContext\" class=\"panelIntro\">Normal action phase. Choose an action or use a quick suggestion.</div>\n    <div id=\"quickActions\" class=\"quickRow\"></div>\n    <div id=\"actionChips\" class=\"choiceChips\"></div>\n    <div id=\"colorChips\" class=\"choiceChips\"></div>\n    <select id=\"action\" onchange=\"refreshEligibilityMessage()\"><option value=\"tile\">Place civilisation tile</option><option value=\"leader\">Place/move leader</option><option value=\"withdraw\">Withdraw selected leader</option><option value=\"cat\">Play catastrophe tile</option><option value=\"recycleCustom\">Recycle chosen tile mix</option><option value=\"replaceAll\">Recycle entire hand</option></select>\n    <select id=\"color\" onchange=\"refreshEligibilityMessage()\"><option value=\"0\">Black: settlement tile / king leader / bricks VP</option><option value=\"1\">Red: temple tile / priest leader / amulets VP</option><option value=\"2\">Blue: farm tile / farmer leader / crops VP</option><option value=\"3\">Green: market tile / trader leader / goods VP</option></select>\n    <div id=\"recyclePanel\" class=\"wide\"><div class=\"recSlot\"><span>Black</span><input id=\"rec0\" type=\"number\" oninput=\"updateDoActionButton()\" min=\"0\" max=\"6\" value=\"0\"></div><div class=\"recSlot\"><span>Red</span><input id=\"rec1\" type=\"number\" oninput=\"updateDoActionButton()\" min=\"0\" max=\"6\" value=\"0\"></div><div class=\"recSlot\"><span>Blue</span><input id=\"rec2\" type=\"number\" oninput=\"updateDoActionButton()\" min=\"0\" max=\"6\" value=\"0\"></div><div class=\"recSlot\"><span>Green</span><input id=\"rec3\" type=\"number\" oninput=\"updateDoActionButton()\" min=\"0\" max=\"6\" value=\"0\"></div></div>\n    <div class=\"settingsMini\"><label><input id=\"uiConfirm\" type=\"checkbox\" onchange=\"setUiOption('confirmImpact',this.checked)\">Confirm big moves</label><label><input id=\"uiLegal\" type=\"checkbox\" onchange=\"setUiOption('showLegal',this.checked)\">Legal-space glow</label><label><input id=\"uiPhase\" type=\"checkbox\" onchange=\"setUiOption('showPhase',this.checked)\">Turn badge</label></div>\n    <div class=\"zoomBar\"><button class=\"secondary\" onclick=\"zoomBoard(1.2)\">Zoom +</button><button class=\"secondary\" onclick=\"zoomBoard(1/1.2)\">Zoom \u2212</button><button class=\"secondary\" onclick=\"resetBoardZoom()\">Fit board</button></div>\n    <button id=\"doActionBtn\" class=\"disabled\" onclick=\"doHumanAction()\" disabled>Do selected action</button><button class=\"secondary\" onclick=\"finishHumanTurn()\">Finish turn</button>\n  </div>\n  <div id=\"menuPanel\" class=\"collapsed\">\n    <button class=\"secondary\" onclick=\"zoomBoard(1.2)\">Zoom board +</button><button class=\"secondary\" onclick=\"zoomBoard(1/1.2)\">Zoom board \u2212</button>\n    <button class=\"secondary\" onclick=\"resetBoardZoom()\">Fit board</button><button class=\"secondary\" onclick=\"undoLastAction()\">Undo last action</button>\n    <button onclick=\"saveGame()\">Save position</button><button class=\"danger\" onclick=\"if(confirm('Start over? Unsaved progress since your last save will be lost.')) location.reload()\">New game</button>\n    <div class=\"settingsMini wide\"><label><input id=\"uiConfirm2\" type=\"checkbox\" onchange=\"setUiOption('confirmImpact',this.checked)\">Confirm big moves</label><label><input id=\"uiLegal2\" type=\"checkbox\" onchange=\"setUiOption('showLegal',this.checked)\">Legal-space glow</label></div>\n  </div>\n  <div id=\"warOrderDrawer\"><div id=\"warOrderText\"></div><div id=\"warOrderButtons\" class=\"warOrderBtns\"></div></div>\n  <div id=\"supportDrawer\"><div id=\"supportText\"></div><div id=\"supportBattle\" class=\"conflictCompare\"></div><div id=\"supportHint\" class=\"tiny\"></div><input id=\"supportRange\" type=\"range\" min=\"0\" max=\"0\" value=\"0\" oninput=\"updateSupportReadout()\"><div id=\"supportValue\" class=\"tiny\"></div><div class=\"supportBtns\"><button onclick=\"commitSupportChoice()\">Commit support</button><button class=\"secondary\" onclick=\"commitSupportChoice(0)\">Commit none</button></div></div>\n  <div id=\"log\"></div>\n</section>\n<script>\n'use strict';\nconst W=16,H=11, BLACK=0, RED=1, BLUE=2, GREEN=3;\nconst CNAME=['Black','Red','Blue','Green'];\nconst SHORT=['Bk','Rd','Bu','Gn'];\nconst TILE=['settlement','temple','farm','market'];\nconst TILE_SHORT=['Set','Tmp','Frm','Mkt'];\nconst LEADER=['king','priest','farmer','trader'];\nconst LEADER_SHORT=['King','Priest','Farmer','Trader'];\nconst VP=['bricks','amulets','crops','goods'];\nconst HEX=['#1f1f1f','#b74336','#2d88c4','#2e9655'];\nconst TEXTHEX=['#ffffff','#ffffff','#ffffff','#ffffff'];\nconst DYNASTY=['You','Bull AI','Pot AI','Lion AI'];\nconst SIGIL=['YOU','BULL','POT','LION'];\nconst MARK=['I','II','III','IV'];\nconst OWNER_SYMBOL=['\u25CF','\u25A0','\u25C6','\u2B22'];\nconst OWNER_FRAME=['circle','square','diamond','hex'];\nconst OWNER_FRAME_NAME=['round frame','square frame','diamond frame','hex frame'];\nconst PLAYER_BAND=['#f2c84b','#8b5a2b','#d66aa3','#7b5bd6'];\nconst SYMBOL_OPTIONS=['BOW','BULL','POT','LION'];\nconst SYMBOL_NAMES={BOW:'Bow',BULL:'Bull',POT:'Pot',LION:'Lion'};\nconst MARK_FILL=['#2b1a0b','#ffffff','#ffffff','#ffffff'];\nconst BUILDING=['Palace','Library','Granary','Market Hall'];\nconst MONUMENTS=[[BLUE,RED],[GREEN,BLACK],[BLUE,BLACK],[GREEN,BLUE],[RED,GREEN],[RED,BLACK]];\nconst BOARD={\n standard:{\n  shedu:[[10,0],[1,1],[15,1],[5,2],[13,4],[8,6],[1,7],[14,8],[5,9],[10,10]],\n  special:[[1,1],[15,1],[1,7],[14,8]],\n  river:[[4,0],[5,0],[6,0],[7,0],[8,0],[12,0],[4,1],[12,1],[3,2],[4,2],[12,2],[13,2],[0,3],[1,3],[2,3],[3,3],[13,3],[14,3],[15,3],[14,4],[15,4],[14,5],[0,6],[1,6],[2,6],[3,6],[12,6],[13,6],[14,6],[4,7],[5,7],[6,7],[12,7],[6,8],[7,8],[8,8],[9,8],[10,8],[11,8],[12,8]]\n },\n advanced:{\n  shedu:[[4,0],[9,0],[14,1],[1,2],[6,3],[11,3],[3,5],[15,5],[0,7],[7,7],[12,7],[4,9],[9,10],[14,10]],\n  special:[[1,2],[15,5],[0,7],[4,9],[9,10],[14,10]],\n  river:[[2,0],[3,0],[15,0],[2,1],[3,1],[15,1],[2,2],[3,2],[15,2],[2,3],[13,3],[14,3],[15,3],[2,4],[12,4],[2,5],[12,5],[2,6],[3,6],[12,6],[13,6],[4,7],[5,7],[13,7],[5,8],[6,8],[13,8],[6,9],[7,9],[8,9],[9,9],[10,9],[11,9],[12,9],[13,9],[6,10]]\n }\n};\nlet G=null, selected={x:0,y:0}, statusFlash='Ready.', aiBusy=false, pendingSupport=null, pendingWarOrder=null, activePanel='controls', preActionSnapshot=null;\nconst AI_PACE={plan:780,between:960,end:760};\nfunction key(x,y){return x+','+y} function inside(x,y){return x>=0&&x<W&&y>=0&&y<H}\nfunction eachCell(fn){for(let y=0;y<H;y++)for(let x=0;x<W;x++)fn(G.board[y][x],x,y)}\nfunction cell(x,y){return G.board[y][x]} function neighbors(x,y){return [[x+1,y],[x-1,y],[x,y+1],[x,y-1]].filter(p=>inside(p[0],p[1]));}\nfunction emptyCell(c){return !c.cat&&c.tile===null&&!c.face&&!c.wonder&&!c.leader&&!c.mon}\nfunction hasNode(c){return c.cat?false:!!(c.tile!==null||c.face||c.wonder||c.leader||c.mon)}\nfunction faceTemple(c){return c.tile===RED&&!c.face&&!c.wonder&&!c.cat}\nfunction colourChip(i,txt){return '<span class=\"colorChip c'+i+'\">'+esc(txt)+'</span>';}\nfunction handText(p){return CNAME.map((n,i)=>colourChip(i,SHORT[i]+' '+G.players[p].hand[i])).join(' ')}\nfunction vpText(p){return G.players[p].vp.map((v,i)=>colourChip(i,SHORT[i]+' '+v)).join(' ')}\nfunction yourOffBoardLeaders(){let on=[false,false,false,false]; eachCell(c=>{if(c.leader&&c.leader.p===0)on[c.leader.color]=true;}); let off=[]; for(let i=0;i<4;i++)if(!on[i])off.push(colourChip(i,LEADER_SHORT[i])); return off.length?off.join(' '):'<span class=\"okChip\">all leaders on board</span>';}\nfunction colorizeText(s){let t=esc(s); for(let i=0;i<4;i++){let names=[CNAME[i],TILE[i],TILE_SHORT[i],LEADER[i],LEADER_SHORT[i],VP[i],SHORT[i]]; for(const w of names){let re=new RegExp('\\\\b'+w.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&')+'\\\\b','gi'); t=t.replace(re,m=>'<span class=\"inlineColor c'+i+'\">'+m+'</span>');}} return t;}\nfunction log(s){G.log.unshift(s); if(G.log.length>160)G.log.length=160; let el=document.getElementById('log'); if(el)el.innerHTML=historyHTML();}\nfunction flash(s){statusFlash=s; let box=document.getElementById('eventBox'); if(box) box.textContent=s;}\nconst SAVE_KEY='kingsTwoRiversSavedMatchesV1';\nfunction esc(s){return String(s).replace(/[&<>\"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[ch]));}\nfunction playerTurnOffset(p){if(!G||!G.players)return p; let st=Number.isFinite(G.startTurn)?G.startTurn:0; return (p-st+G.players.length)%G.players.length;}\nfunction playerMark(p){return MARK[playerTurnOffset(p)]||String(playerTurnOffset(p)+1);}\nfunction playerSigil(p){return (G&&G.players&&G.players[p]&&G.players[p].symbol)||SIGIL[p]||'BOW';}\nfunction playerSymbolName(p){let s=playerSigil(p); return SYMBOL_NAMES[s]||s;}\nfunction playerSubject(p){return G&&G.players[p]?G.players[p].name:'Player';}\nfunction verbFor(p,base,third){return playerSubject(p)==='You'?base:third;}\nfunction playerDoes(p,base,third){return playerSubject(p)+' '+verbFor(p,base,third);}\nfunction turnOrderText(){if(!G||!G.players)return ''; let st=Number.isFinite(G.startTurn)?G.startTurn:0, rows=[]; for(let i=0;i<G.players.length;i++){let p=(st+i)%G.players.length; rows.push((i+1)+'. '+playerMark(p)+' \u2014 '+G.players[p].name+' ('+playerSymbolName(p)+')');} return rows.join('\\n');}\nfunction optionSummaryFor(g){return (g.settings.advanced?'Advanced board':'Standard board')+'; '+(g.settings.buildings?'Buildings on':'Buildings off')+'; '+(g.settings.english?'English variant on':'English variant off')+'; '+(g.settings.wonder?'Wonder on':'Wonder off')+'; AI '+g.aiLevel;}\nfunction saveSummary(g){let turnName=(g.players&&g.players[g.turn])?g.players[g.turn].name:'Unknown'; return optionSummaryFor(g)+'; Turn: '+turnName+'; Actions left: '+g.actions;}\nfunction getSaves(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||'[]').filter(x=>x&&x.id&&x.g);}catch(e){return [];}}\nfunction setSaves(saves){localStorage.setItem(SAVE_KEY,JSON.stringify(saves.slice(0,60)));}\nfunction clearAllSavedMatches(){let saves=getSaves(); if(!saves.length){alert('No saved matches to clear.'); return;} if(!confirm('Delete all saved match positions from this device? This cannot be undone.'))return; localStorage.removeItem(SAVE_KEY); populateSaveSelect(); alert('All saved matches cleared.');}\nfunction formatSaveTitle(s){let d=new Date(s.ts), stamp=isNaN(d)?s.ts:d.toLocaleString(); return stamp+(s.name?' \u2014 '+s.name:'')+' \u2014 '+s.summary;}\nfunction populateSaveSelect(){let sel=document.getElementById('saveSelect'), det=document.getElementById('saveDetails'); if(!sel)return; let saves=getSaves(); sel.innerHTML=''; if(!saves.length){sel.innerHTML='<option value=\"\">No saved matches found</option>'; if(det)det.textContent='No saved match positions are stored on this device yet.'; return;} saves.forEach((s,i)=>{let opt=document.createElement('option'); opt.value=s.id; opt.textContent=formatSaveTitle(s); sel.appendChild(opt);}); if(det)det.textContent=formatSaveTitle(saves[0]); sel.onchange=()=>{let s=getSaves().find(x=>x.id===sel.value); if(det)det.textContent=s?formatSaveTitle(s):'No saved match selected.';};}\nfunction continueSavedMatch(){let sel=document.getElementById('saveSelect'); if(!sel||!sel.value){alert('No saved match selected.'); return;} let s=getSaves().find(x=>x.id===sel.value); if(!s){alert('Saved match not found.'); populateSaveSelect(); return;} try{G=typeof s.g==='string'?JSON.parse(s.g):s.g;}catch(e){alert('Could not read that saved match.'); return;} normalizeSettings(); if(!Number.isFinite(G.startTurn))G.startTurn=G.turn||0; document.body.classList.add('playing'); document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='flex'; activePanel='controls'; applyGameLayout(); setActivePanel('controls'); resizeCanvas(); render(); flash('Loaded saved match: '+(s.name||new Date(s.ts).toLocaleString())+'.'); log('CONTINUED SAVED MATCH: '+formatSaveTitle(s)); if(G.players[G.turn].ai)setTimeout(aiTurn,650);}\n\nfunction cellDescription(x,y){\n if(!G||!inside(x,y))return 'Off board.';\n let c=cell(x,y), parts=[coord(x,y)];\n parts.push(c.river?'river space':'land space');\n if(c.shedu)parts.push(c.special?'outlined Shedu start temple':'Shedu start temple');\n if(c.leader)parts.push(G.players[c.leader.p].name+' '+CNAME[c.leader.color]+' '+LEADER_SHORT[c.leader.color]+' leader');\n if(c.tile!==null&&!c.face&&!c.wonder)parts.push(CNAME[c.tile]+' '+TILE[c.tile]+' tile');\n if(c.face)parts.push('monument base');\n if(c.wonder)parts.push('wonder');\n if(c.monumentColors)parts.push(CNAME[c.monumentColors[0]]+'/'+CNAME[c.monumentColors[1]]+' monument');\n if(c.building!==null)parts.push(BUILDING[c.building]);\n if(c.cat)parts.push('catastrophe marker');\n if(c.union!==null)parts.push('unification marker');\n if(c.treasure)parts.push('treasure');\n if(parts.length===2)parts.push('empty');\n return parts.join(' \xB7 ');\n}\n\nfunction showTurnOrderPopup(done){\n let el=document.getElementById('turnOrderModal');\n if(!el){el=document.createElement('div'); el.id='turnOrderModal'; document.body.appendChild(el);}\n let rows=turnOrderText().split('\\n').map(r=>'<div class=\"orderRow\">'+esc(r)+'</div>').join('');\n el.innerHTML='<div class=\"orderCard\"><h2>Turn order</h2><div class=\"orderRows\">'+rows+'</div><p class=\"tiny\">Player labels I\u2013IV follow this order for this match.</p><button id=\"orderStartBtn\">Start match</button></div>';\n el.style.display='flex';\n document.getElementById('orderStartBtn').onclick=()=>{el.style.display='none'; if(done)done();};\n}\n\nfunction startGame(){\n document.body.classList.add('playing');\n const aiCount=+document.getElementById('aiCount').value;\n G={players:[],turn:0,actions:2,aiCount,aiLevel:document.getElementById('aiLevel').value,settings:{buildings:document.getElementById('ruleBuildings').checked,advanced:document.getElementById('boardSide').value==='advanced',english:document.getElementById('ruleEnglish').checked,wonder:document.getElementById('ruleWonder').checked,showCoords:document.getElementById('showCoords').checked,confirmImpact:document.getElementById('confirmImpact').checked,showLegal:true,showShedu:true,showPhase:true},bag:[30,57,36,30],board:[],log:[],over:false,buildingsOn:[null,null,null,null],monuments:MONUMENTS.map((m,i)=>({id:i,colors:m,used:false})),lastUnion:null,uiHorizontal:false,boardZoom:1};\n const def=G.settings.advanced?BOARD.advanced:BOARD.standard;\n const river=new Set(def.river.map(p=>key(p[0],p[1]))), shedu=new Set(def.shedu.map(p=>key(p[0],p[1]))), special=new Set(def.special.map(p=>key(p[0],p[1])));\n for(let y=0;y<H;y++){G.board[y]=[];for(let x=0;x<W;x++)G.board[y][x]={river:river.has(key(x,y)),shedu:shedu.has(key(x,y)),special:special.has(key(x,y)),tile:null,face:false,wonder:false,cat:false,leader:null,treasure:false,mon:null,building:null,union:null};}\n for(const [x,y] of def.shedu){let c=cell(x,y);c.tile=RED;c.treasure=true;G.bag[RED]--;}\n let chosenSymbol=(document.getElementById('playerSymbol')&&document.getElementById('playerSymbol').value)||'BOW';\n let symOrder=[chosenSymbol].concat(SYMBOL_OPTIONS.filter(s=>s!==chosenSymbol));\n for(let i=0;i<1+aiCount;i++){let sym=symOrder[i]; G.players.push({name:i?'AI '+SYMBOL_NAMES[sym]:'You',ai:i>0,symbol:sym,symbolName:SYMBOL_NAMES[sym],vp:[0,0,0,0],treasures:0,hand:[0,0,0,0],cat:2,leaders:[null,null,null,null]});}\n for(let p=0;p<G.players.length;p++)drawTo(p,6); normalizeSettings();\n G.turn=Math.floor(Math.random()*G.players.length); G.startTurn=G.turn; G.actions=2;\n document.body.classList.add('playing'); document.getElementById('setup').style.display='none'; document.getElementById('game').style.display='flex'; activePanel='controls'; applyGameLayout(); setActivePanel('controls');\n resizeCanvas(); log('Game started on '+(G.settings.advanced?'advanced':'standard')+' board with '+(G.settings.advanced?14:10)+' Shedu start temples and '+(G.settings.advanced?6:4)+' outlined Shedu spaces.'); log('Turn order:\\n'+turnOrderText()); log('AI level: '+G.aiLevel+'. Enabled toggles: '+optionSummary()+'.'); render(); showTurnOrderPopup(()=>{ flash('Game ready. Starting player: '+G.players[G.turn].name+' ('+playerMark(G.turn)+').'); autoSave('game start'); if(G.players[G.turn].ai) setTimeout(aiTurn,650); });\n}\nfunction drawOne(){let total=G.bag.reduce((a,b)=>a+b,0); if(total<=0){G.over=true; return -1;} let r=Math.floor(Math.random()*total); for(let i=0;i<4;i++){if(r<G.bag[i]){G.bag[i]--; return i;} r-=G.bag[i];} return -1;}\nfunction drawTo(p,n){while(G.players[p].hand.reduce((a,b)=>a+b,0)<n){let t=drawOne(); if(t<0){G.over=true;break;} G.players[p].hand[t]++;}}\nfunction canAfford(p,c){return G.players[p].hand[c]>0}\nfunction comps(block){let seen=new Set(), res=[]; eachCell((c,x,y)=>{let k=key(x,y); if(seen.has(k)||!hasNode(c)||k===block)return; let q=[[x,y]], comp=[], leaders=[]; seen.add(k); while(q.length){let [cx,cy]=q.pop(), cc=cell(cx,cy); comp.push([cx,cy]); if(cc.leader)leaders.push({x:cx,y:cy,p:cc.leader.p,color:cc.leader.color}); for(const [nx,ny] of neighbors(cx,cy)){let nk=key(nx,ny); if(nk===block||seen.has(nk)||!hasNode(cell(nx,ny)))continue; seen.add(nk); q.push([nx,ny]);}} res.push({cells:comp,leaders});}); return res;}\nfunction compAt(x,y,block){return comps(block).find(co=>co.cells.some(p=>p[0]===x&&p[1]===y));}\nfunction compIdMap(block){let map=new Map(); comps(block).forEach((co,i)=>co.cells.forEach(p=>map.set(key(p[0],p[1]),i))); return map;}\nfunction neighborKingdomCount(x,y){let cm=comps().filter(c=>c.leaders.length); let map=new Map(); cm.forEach((co,i)=>co.cells.forEach(p=>map.set(key(p[0],p[1]),i))); let s=new Set(); for(const [nx,ny] of neighbors(x,y)){let id=map.get(key(nx,ny)); if(id!==undefined)s.add(id);} return s.size;}\nfunction legalLeader(p,color,x,y){let c=cell(x,y); if(!emptyCell(c)||c.river)return false; let adjTemple=neighbors(x,y).some(([nx,ny])=>faceTemple(cell(nx,ny))); if(!adjTemple)return false; return neighborKingdomCount(x,y)<=1;}\nasync function placeLeader(p,color,x,y){if(!legalLeader(p,color,x,y))return 'Illegal leader placement.'; let old=G.players[p].leaders[color]; if(old){cell(old.x,old.y).leader=null;} let c=cell(x,y); c.leader={p,color}; G.players[p].leaders[color]={x,y}; log(G.players[p].name+' placed '+CNAME[color]+' '+LEADER[color]+' at '+coord(x,y)+'.'); await resolveRevolt(p,color,x,y); treasureSweep(); spendAction(); return null;}\nfunction legalTile(p,color,x,y){let c=cell(x,y); if(!emptyCell(c))return false; if(color===BLUE?!c.river:c.river)return false; if(!canAfford(p,color))return false; return neighborKingdomCount(x,y)<=2;}\nasync function placeTile(p,color,x,y){if(!legalTile(p,color,x,y))return 'Illegal tile placement.'; let unite=neighborKingdomCount(x,y)===2; let c=cell(x,y); c.tile=color; G.players[p].hand[color]--; log(G.players[p].name+' placed '+CNAME[color]+' '+TILE[color]+' at '+coord(x,y)+'.'); if(unite){c.union=p; G.lastUnion={x,y,color}; log('Unification marker placed on '+coord(x,y)+'. The linking tile gives no placement VP.'); await resolveWars(p,x,y,color); c.union=null; G.lastUnion=null; if(c.tile===color&&!c.face&&!c.wonder&&!c.cat){postConflictBuilds(p,x,y,color);} } else {awardTilePoint(p,x,y,color); postConflictBuilds(p,x,y,color);} treasureSweep(); spendAction(); return null;}\nfunction awardTilePoint(active,x,y,color){let co=compAt(x,y); if(!co||!co.leaders.length)return; let holder=co.leaders.find(l=>l.color===color)||co.leaders.find(l=>l.color===BLACK); if(!holder)return; let amount=1; if(G.settings.buildings && co.cells.some(([cx,cy])=>cell(cx,cy).building===color))amount=2; G.players[holder.p].vp[color]+=amount; log(G.players[holder.p].name+' gains '+amount+' '+VP[color]+'.');}\nfunction spendAction(){if(G.over){gameOver();return;} if(!G.players[G.turn].ai){G.actions--; if(G.actions<=0)endTurn(); else render();}}\nfunction endTurn(){autoSave('before end turn'); scoreEndOfTurn(G.turn); drawTo(G.turn,6); for(let p=0;p<G.players.length;p++)drawTo(p,6); if(boardTreasures()<=2||G.over){autoSave('game over'); gameOver();return;} G.turn=(G.turn+1)%G.players.length; G.actions=2; preActionSnapshot=null; log('TURN START: '+playerMark(G.turn)+' \u2014 '+G.players[G.turn].name); render(); autoSave('turn start'); if(G.players[G.turn].ai)setTimeout(aiTurn,250);}\nfunction boardTreasures(){let n=0; eachCell(c=>{if(c.treasure)n++;}); return n;}\n\nfunction showConflictResult(kind,humanInvolved,lines){\n let msg=kind+' resolved:\\n'+lines.join('\\n');\n flash(lines[0]||kind+' resolved.');\n if(humanInvolved)setTimeout(()=>alert(msg),60);\n}\nasync function resolveRevolt(attacker,color,x,y){let co=compAt(x,y); if(!co)return; let rivals=co.leaders.filter(l=>l.color===color); if(rivals.length<2)return; let def=rivals.find(l=>!(l.x===x&&l.y===y)); if(!def)return; let aBase=neighbors(x,y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length; let dBase=neighbors(def.x,def.y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length; let aSup=await commit(attacker,RED,aBase,dBase,true,true); let dSup=await commit(def.p,RED,dBase,aBase+aSup,true,false); let aTotal=aBase+aSup,dTotal=dBase+dSup; let winner=(aTotal>dTotal)?attacker:def.p; let loser=(winner===attacker)?def:{p:attacker,x,y,color}; G.players[winner].vp[RED]++; removeLeader(loser.x,loser.y); let lines=[G.players[winner].name+' wins the revolt '+aTotal+'\u2013'+dTotal+'.','Loser withdraws '+G.players[loser.p].name+' '+LEADER[color]+' from '+coord(loser.x,loser.y)+'.',G.players[winner].name+' gains 1 '+VP[RED]+'.','Committed temples from both sides are removed from the game.']; log('Revolt: '+lines.join(' ')); showConflictResult('Revolt', attacker===0||def.p===0, lines);}\nasync function resolveWars(active,ux,uy,ucolor){\n let original=compAt(ux,uy); if(!original)return;\n let originKeys=new Set(original.cells.map(([x,y])=>key(x,y)));\n let safety=0;\n while(safety++<12){\n  let conflicts=[];\n  for(const co of comps()){\n   if(!co.cells.some(([cx,cy])=>originKeys.has(key(cx,cy))))continue;\n   for(let color=0;color<4;color++){\n    let ls=co.leaders.filter(l=>l.color===color);\n    if(ls.length>1)conflicts.push({color,leaders:ls,co});\n   }\n  }\n  if(!conflicts.length)break;\n  let conflict=await chooseWarConflict(active,conflicts,ux,uy), color=conflict.color, ls=conflict.leaders.slice();\n  let attacker=ls.find(l=>l.p===active);\n  if(!attacker){attacker=ls.slice().sort((a,b)=>((a.p-active+G.players.length)%G.players.length)-((b.p-active+G.players.length)%G.players.length))[0];}\n  let defender=ls.find(l=>!(l.x===attacker.x&&l.y===attacker.y));\n  let block=key(ux,uy);\n  let aBase=countSupport(attacker.x,attacker.y,color,block), dBase=countSupport(defender.x,defender.y,color,block);\n  log('War attacker: '+G.players[attacker.p].name+'; defender: '+G.players[defender.p].name+' for '+CNAME[color]+'.');\n  let aSup=await commit(attacker.p,color,aBase,dBase,false,true);\n  let dSup=await commit(defender.p,color,dBase,aBase+aSup,false,false);\n  let aTotal=aBase+aSup,dTotal=dBase+dSup;\n  let winner=aTotal>dTotal?attacker:defender, loser=aTotal>dTotal?defender:attacker;\n  let removed=removeWarLoser(loser.x,loser.y,color,block);\n  let gained=1+removed;\n  G.players[winner.p].vp[color]+=gained;\n  let lines=[G.players[winner.p].name+' wins the '+CNAME[color]+' war '+aTotal+'\u2013'+dTotal+'.','Loser withdraws '+G.players[loser.p].name+' '+LEADER[color]+' from '+coord(loser.x,loser.y)+'.','Removed '+removed+' defeated '+TILE[color]+' supporter tile'+(removed===1?'':'s')+'.',G.players[winner.p].name+' gains '+gained+' '+VP[color]+'.','Committed support tiles from both sides are removed from the game.'];\n  log('War over '+CNAME[color]+': '+lines.join(' '));\n  showConflictResult(CNAME[color]+' war', winner.p===0||loser.p===0, lines);\n }\n let u=cell(ux,uy); if(u.union!==null)log('Unification marker removed from '+coord(ux,uy)+'. The linking tile remains.');\n}\nasync function chooseWarConflict(active,conflicts,ux,uy){if(conflicts.length<=1)return conflicts[0]; if(G.players[active].ai){let choice=autoWarConflict(active,conflicts,ux,uy); flash(G.players[active].name+' chooses to resolve '+CNAME[choice.color]+' '+LEADER[choice.color]+' war first.'); log(G.players[active].name+' chooses conflict order: '+CNAME[choice.color]+' first.'); return choice;} return requestWarOrder(active,conflicts,ux,uy);}\nfunction autoWarConflict(active,conflicts,ux,uy){let block=key(ux,uy), rival=mainRival(active); let scored=conflicts.map(cf=>{let own=cf.leaders.find(l=>l.p===active), foes=cf.leaders.filter(l=>l.p!==active), score=0; if(own&&foes.length){let foe=foes.sort((a,b)=>(b.p===rival)-(a.p===rival))[0]; let ownStr=countSupport(own.x,own.y,cf.color,block)+G.players[active].hand[cf.color]; let foeStr=countSupport(foe.x,foe.y,cf.color,block)+G.players[foe.p].hand[cf.color]; score=(ownStr-foeStr)*2+expectedWarRewardForLoser(foe,cf.color,block)+8;} else if(foes.length>1){let vals=foes.map(f=>({p:f.p,t:playerThreat(f.p),s:countSupport(f.x,f.y,cf.color,block)+G.players[f.p].hand[cf.color]})); vals.sort((a,b)=>b.t-a.t); score=3+(vals[0].t-(vals[1]||vals[0]).t)/30-(vals[0].s-(vals[1]||vals[0]).s)*.2;} return {cf,score};}); scored.sort((a,b)=>b.score-a.score); return scored[0].cf;}\nfunction conflictLabel(cf){return CNAME[cf.color]+' '+LEADER[cf.color]+' war: '+cf.leaders.map(l=>G.players[l.p].name+' at '+coord(l.x,l.y)).join(' vs ');}\nfunction requestWarOrder(active,conflicts,ux,uy){return new Promise(resolve=>{pendingWarOrder={active,conflicts,ux,uy,resolve}; let drawer=document.getElementById('warOrderDrawer'), text=document.getElementById('warOrderText'), box=document.getElementById('warOrderButtons'); text.textContent='War order: choose which like-coloured leader conflict to resolve next. You choose the order even if you are not involved; attacker is determined separately.'; box.innerHTML=''; conflicts.forEach((cf,i)=>{let b=document.createElement('button'); b.textContent=conflictLabel(cf); b.onclick=()=>pickWarConflict(i); box.appendChild(b);}); drawer.style.display='block'; flash('War order: active player chooses the next conflict to resolve.'); render();});}\nfunction pickWarConflict(i){if(!pendingWarOrder)return; let s=pendingWarOrder, cf=s.conflicts[i]; document.getElementById('warOrderDrawer').style.display='none'; pendingWarOrder=null; flash('Resolving '+CNAME[cf.color]+' '+LEADER[cf.color]+' war next.'); log(G.players[s.active].name+' chooses conflict order: '+CNAME[cf.color]+' next.'); s.resolve(cf);}\nfunction countSupport(x,y,color,block){let seen=new Set([block]), q=[[x,y]], count=0; while(q.length){let [cx,cy]=q.pop(), cc=cell(cx,cy); if(cc.tile===color&&!cc.face&&!cc.wonder)count++; for(const [nx,ny] of neighbors(cx,cy)){let k=key(nx,ny); if(seen.has(k)||!hasNode(cell(nx,ny)))continue; seen.add(k); q.push([nx,ny]);}} return count;}\nfunction removeWarLoser(x,y,color,block){removeLeader(x,y); let seen=new Set([block]), q=[[x,y]], victims=[]; while(q.length){let [cx,cy]=q.pop(), cc=cell(cx,cy); if(cc.tile===color&&!cc.face&&!cc.wonder&&cc.building===null){ if(color!==RED||(!cc.treasure&&!neighbors(cx,cy).some(([nx,ny])=>cell(nx,ny).leader&&cell(nx,ny).leader.color!==RED)))victims.push([cx,cy]); }\n for(const [nx,ny] of neighbors(cx,cy)){let k=key(nx,ny); if(seen.has(k)||!hasNode(cell(nx,ny)))continue; seen.add(k); q.push([nx,ny]);}}\n for(const [vx,vy] of victims){let c=cell(vx,vy); if(c.building!==null)G.buildingsOn[c.building]=null; c.tile=null; c.face=false; c.treasure=false; c.building=null; c.union=null;} afterBoardChange('war removal'); return victims.length;}\nfunction removeLeader(x,y){let c=cell(x,y); if(c.leader){G.players[c.leader.p].leaders[c.leader.color]=null; c.leader=null;}}\nfunction evictUnsupportedLeaders(){eachCell((c,x,y)=>{if(c.leader&&!neighbors(x,y).some(([nx,ny])=>faceTemple(cell(nx,ny)))){log(G.players[c.leader.p].name+' loses unsupported '+LEADER[c.leader.color]+'.'); removeLeader(x,y);}});}\nfunction afterBoardChange(reason){evictUnsupportedLeaders(); validateBuildingState(); if(reason)log('Board checked after '+reason+'.');}\nfunction validateBuildingState(){for(let i=0;i<4;i++){let pos=G.buildingsOn[i]; if(pos){let c=cell(pos.x,pos.y); if(c.building!==i||c.tile!==i||c.face||c.wonder||c.cat){c.building=null;G.buildingsOn[i]=null;log(BUILDING[i]+' returned beside the board.');}}}}\nasync function commit(p,color,base,opponent,isRevolt,isAttacker){let max=G.players[p].hand[color]; let needed=isAttacker?opponent+1-base:opponent-base; if(!isAttacker&&needed<0)needed=0; let suggested=Math.max(0,Math.min(max,needed)); if(G.settings.english){ if(isAttacker && needed>max) suggested=0; if(!isAttacker && needed>max) suggested=0; }\n let n=0;\n if(!G.players[p].ai){n=await requestSupport(p,color,base,opponent,isRevolt,isAttacker,suggested,max,needed);}\n else {n=aiCommitSupport(p,color,base,opponent,isRevolt,isAttacker,max,needed); if(G.settings.english){ if(isAttacker && n>0 && base+n<=opponent)n=0; if(!isAttacker && n>0 && base+n!==opponent)n=0; }}\n G.players[p].hand[color]-=n; if(n)log(playerDoes(p,'commit','commits')+' '+n+' '+CNAME[color]+'.'); else log(playerDoes(p,'commit','commits')+' no '+CNAME[color]+' support.'); return n;}\nfunction requestSupport(p,color,base,opponent,isRevolt,isAttacker,suggested,max,needed){\n return new Promise(resolve=>{pendingSupport={p,color,base,opponent,isRevolt,isAttacker,suggested,max,needed,resolve}; let drawer=document.getElementById('supportDrawer'), rng=document.getElementById('supportRange'); drawer.style.display='block'; rng.min=0; rng.max=max; rng.value=suggested; updateSupportReadout(); flash((isRevolt?'Revolt':'War')+' support needed: choose '+CNAME[color]+' tile support for '+G.players[p].name+'.'); render();});\n}\nfunction updateSupportReadout(){if(!pendingSupport)return; let n=+document.getElementById('supportRange').value, s=pendingSupport, rule=''; if(G.settings.english){ if(s.isAttacker) rule='English variant: attacker may commit 0, or enough to exceed the defender.'; else rule='English variant: defender may commit 0, or exactly enough to tie.';} else rule='Commit any number from your hand.'; document.getElementById('supportText').textContent=G.players[s.p].name+' support with '+CNAME[s.color]+' tiles.'; let battle=document.getElementById('supportBattle'); if(battle) battle.innerHTML='<div class=\"conflictSide\"><b>'+G.players[s.p].name+'</b><br>Board support: '+s.base+'<br>Committed: '+n+'<br><b>Total: '+(s.base+n)+'</b></div><div class=\"conflictSide\"><b>Opponent</b><br>Current strength: '+s.opponent+'<br>Defender wins ties.<br><b>Target: '+(s.isAttacker?'exceed':'tie/win')+'</b></div>'; document.getElementById('supportHint').textContent=rule; document.getElementById('supportValue').textContent='Selected support: '+n+' tile(s). Suggested: '+s.suggested+'.';}\nfunction commitSupportChoice(force){if(!pendingSupport)return; let s=pendingSupport, n=(force===0)?0:+document.getElementById('supportRange').value; n=Math.max(0,Math.min(s.max,n)); if(G.settings.english&&n>0){ if(s.isAttacker && s.base+n<=s.opponent){flash('Ineligible support amount: attacker must exceed the current defender strength, or commit none.'); return;} if(!s.isAttacker && s.base+n!==s.opponent){flash('Ineligible support amount: defender must commit exactly enough to tie, or commit none.'); return;} } document.getElementById('supportDrawer').style.display='none'; pendingSupport=null; flash(playerDoes(s.p,'commit','commits')+' '+n+' '+CNAME[s.color]+' support tile(s).'); s.resolve(n);}\n\nfunction postConflictBuilds(p,x,y,color){ if(G.settings.buildings) placeBuildingIfLine(color,x,y,p); maybeWonderOrMonument(p,x,y,color); }\nfunction maybeWonderOrMonument(p,x,y,color){ let crosses=findCrosses(x,y,color); if(G.settings.wonder && crosses.length && !wonderOnBoard()){let build=G.players[p].ai?G.aiLevel!=='easy':confirm('Build the wonder from this 5-tile cross?'); if(build){buildWonder(crosses[0]);return;}} let sqs=findSquares(x,y,color); if(sqs.length){let opts=G.monuments.filter(m=>!m.used&&m.colors.includes(color)); if(opts.length){let build=G.players[p].ai?true:confirm('Build a monument from the 2x2 '+CNAME[color]+' square?'); if(build){let m=opts[0]; if(!G.players[p].ai&&opts.length>1){let ans=prompt('Choose monument by number:\\n'+opts.map((o,i)=>(i+1)+': '+o.colors.map(c=>CNAME[c]).join('/')).join('\\n'),'1'); let idx=Math.max(0,Math.min(opts.length-1,(parseInt(ans||'1',10)||1)-1)); m=opts[idx];} buildMonument(sqs[0],m);}}}}\nfunction wonderOnBoard(){let found=false; eachCell(c=>{if(c.wonder)found=true;}); return found;}\nfunction findSquares(x,y,color){let a=[]; for(let dx=-1;dx<=0;dx++)for(let dy=-1;dy<=0;dy++){let sx=x+dx,sy=y+dy;if(sx<0||sy<0||sx>=W-1||sy>=H-1)continue; let ps=[[sx,sy],[sx+1,sy],[sx,sy+1],[sx+1,sy+1]]; if(ps.every(([cx,cy])=>{let c=cell(cx,cy); return c.tile===color&&!c.face&&!c.wonder&&!c.cat&&!c.mon;}))a.push(ps);} return a;}\nfunction crossAt(cx,cy,color){let ps=[[cx,cy],[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]]; if(ps.every(([x,y])=>inside(x,y)&&cell(x,y).tile===color&&!cell(x,y).face&&!cell(x,y).wonder&&!cell(x,y).cat&&!cell(x,y).mon))return ps; return null;}\nfunction findCrosses(x,y,color){let centers=[[x,y],[x+1,y],[x-1,y],[x,y+1],[x,y-1]], res=[]; for(const [cx,cy] of centers){let ps=crossAt(cx,cy,color); if(ps && ps.some(([px,py])=>px===x&&py===y))res.push(ps);} return res;}\nfunction findCross(x,y,color){let r=findCrosses(x,y,color); return r.length?r[0]:null;}\nfunction buildMonument(ps,m){m.used=true; let id='M'+m.id; for(const [x,y] of ps){let c=cell(x,y); c.face=true; c.mon=id; if(c.building!==null){G.buildingsOn[c.building]=null;c.building=null;}} cell(ps[0][0],ps[0][1]).monumentColors=m.colors; log('Monument built: '+m.colors.map(c=>CNAME[c]).join('/')+'.'); afterBoardChange('monument building');}\nfunction buildWonder(ps){for(const [x,y] of ps){let c=cell(x,y); if(c.building!==null){G.buildingsOn[c.building]=null;c.building=null;} c.tile=null;c.face=true;c.wonder=true;} log('Wonder erected. Treasures on replaced temples remain on the wonder space and can still be collected.'); afterBoardChange('wonder building');}\nfunction ordinal(n){return ['first','second','third','fourth','fifth','sixth','seventh','eighth','ninth','tenth'][n-1]||String(n)+'th';}\nfunction sortLine(arr){return arr.slice().sort((a,b)=>(a[0]-b[0])||(a[1]-b[1]));}\nfunction lineOrientation(arr){return arr.every(p=>p[0]===arr[0][0])?'vertical':'horizontal';}\nfunction linePositionName(line,i){let o=lineOrientation(line), n=line.length; if(n===3)return (o==='vertical'?['top','middle','bottom']:['left','centre','right'])[i]; return ordinal(i+1);}\nfunction lineSummary(line){let o=lineOrientation(line), dir=o==='vertical'?'top to bottom':'left to right'; return CNAME[cell(line[0][0],line[0][1]).tile]+' line of '+line.length+' ('+dir+'): '+line.map((pt,i)=>linePositionName(line,i)+' '+coord(pt[0],pt[1])).join(', ');}\nfunction buildingChoiceLine(line){let o=lineOrientation(line), dir=o==='vertical'?'top to bottom':'left to right'; return line.map((pt,i)=>(i+1)+': '+linePositionName(line,i)+' tile ('+dir+') \u2014 '+coord(pt[0],pt[1])).join('\\n');}\nfunction placeBuildingIfLine(color,x,y,p){let candidates=[]; for(const dir of [[1,0],[0,1]]){let arr=[[x,y]]; for(const s of [-1,1]){let nx=x+dir[0]*s,ny=y+dir[1]*s; while(inside(nx,ny)&&cell(nx,ny).tile===color&&!cell(nx,ny).face&&!cell(nx,ny).wonder){arr.push([nx,ny]); nx+=dir[0]*s; ny+=dir[1]*s;}} if(arr.length>=3)candidates.push(sortLine(arr));} if(!candidates.length)return; let current=G.buildingsOn[color]; let oldLen=0; if(current){oldLen=lineLenAt(color,current.x,current.y);} candidates=candidates.filter(line=>line.length>oldLen); if(!candidates.length)return; candidates.sort((a,b)=>b.length-a.length); let best=candidates[0]; if(!G.players[p].ai){let ok=confirm('Place or move the '+BUILDING[color]+' onto a new '+CNAME[color]+' line?\\n\\nEligible line: '+lineSummary(best)); if(!ok)return; if(candidates.length>1){let ans=prompt('Choose which line for '+BUILDING[color]+' by number:\\n'+candidates.map((line,i)=>(i+1)+': '+lineSummary(line)).join('\\n'),'1'); let idx=Math.max(0,Math.min(candidates.length-1,(parseInt(ans||'1',10)||1)-1)); best=candidates[idx];}} let choice=best[0]; if(!G.players[p].ai&&best.length>1){let ans=prompt('Choose where to place '+BUILDING[color]+' by number:\\n'+buildingChoiceLine(best),'1'); let idx=Math.max(0,Math.min(best.length-1,(parseInt(ans||'1',10)||1)-1)); choice=best[idx];} if(current)cell(current.x,current.y).building=null; let [bx,by]=choice; cell(bx,by).building=color; G.buildingsOn[color]={x:bx,y:by}; log(BUILDING[color]+' placed at '+coord(bx,by)+' for '+CNAME[color]+' line.');}\nfunction lineLenAt(color,x,y){let max=1; for(const dir of [[1,0],[0,1]]){let n=1; for(const s of [-1,1]){let nx=x+dir[0]*s,ny=y+dir[1]*s; while(inside(nx,ny)&&cell(nx,ny).tile===color&&!cell(nx,ny).face&&!cell(nx,ny).wonder){n++;nx+=dir[0]*s;ny+=dir[1]*s;}} max=Math.max(max,n);} return max;}\nfunction treasureSweep(){let cps=comps().filter(co=>co.leaders.length); for(const co of cps){let treasures=co.cells.filter(([x,y])=>cell(x,y).treasure); if(treasures.length<=1)continue; let trader=co.leaders.find(l=>l.color===GREEN); if(!trader)continue; let take=treasures.length-1; for(let i=0;i<take;i++){let remaining=co.cells.filter(([x,y])=>cell(x,y).treasure); let special=remaining.filter(([x,y])=>cell(x,y).special); let choices=special.length?special:remaining; let pick=chooseTreasure(trader.p,choices,special.length>0); cell(pick[0],pick[1]).treasure=false; G.players[trader.p].treasures++; log(G.players[trader.p].name+' takes a treasure from '+coord(pick[0],pick[1])+(special.length?' (special border first).':'.'));}}}\nfunction chooseTreasure(p,choices,forcedSpecial){choices=choices.slice().sort((a,b)=>a[1]-b[1]||a[0]-b[0]); if(G.players[p].ai||choices.length<=1)return choices[0]; let ans=prompt((forcedSpecial?'Choose a special-border treasure to take by number:\\n':'Choose a treasure to take by number:\\n')+choices.map((pt,i)=>(i+1)+': '+coord(pt[0],pt[1])).join('\\n'),'1'); let idx=Math.max(0,Math.min(choices.length-1,(parseInt(ans||'1',10)||1)-1)); return choices[idx];}\nfunction playCat(p,x,y){let c=cell(x,y); let bad=playCatCheck(p,x,y); if(bad)return bad; c.cat=true; c.tile=null;c.face=false;c.leader=null;c.treasure=false;c.union=null; G.players[p].cat--; log(G.players[p].name+' plays catastrophe at '+coord(x,y)+'.'); afterBoardChange('catastrophe'); spendAction(); return null;}\nfunction replaceTiles(p,color,all){let n=0; if(all){n=G.players[p].hand.reduce((a,b)=>a+b,0); G.players[p].hand=[0,0,0,0];} else {n=G.players[p].hand[color]; G.players[p].hand[color]=0;} drawTo(p,6); log(G.players[p].name+' recycles '+n+' tile(s).'); spendAction(); return null;}\nfunction getRecycleCounts(){return [0,1,2,3].map(i=>Math.max(0,parseInt((document.getElementById('rec'+i)||{}).value||'0',10)||0));}\nfunction replaceCustom(p,counts){let total=counts.reduce((a,b)=>a+b,0); if(total<=0)return 'Choose at least one tile to recycle.'; if(total>6)return 'You can recycle at most six tiles.'; for(let i=0;i<4;i++){if(counts[i]>G.players[p].hand[i])return 'You do not have that many '+CNAME[i]+' tiles.';} for(let i=0;i<4;i++)G.players[p].hand[i]-=counts[i]; drawTo(p,6); log(G.players[p].name+' recycles '+counts.map((n,i)=>n?CNAME[i]+' '+n:null).filter(Boolean).join(', ')+'.'); spendAction(); return null;}\nfunction syncRecycleInputs(){if(!G||!document.getElementById('rec0'))return; let panel=document.getElementById('recyclePanel'); if(panel){panel.classList.toggle('active', document.getElementById('action').value==='recycleCustom');} for(let i=0;i<4;i++){let el=document.getElementById('rec'+i), max=G.players[0].hand[i]; el.max=max; if(+el.value>max)el.value=max;}}\nfunction replaceCustomAi(p,counts){let err=replaceCustom(p,counts); if(err){log('AI recycle skipped: '+err); flash('AI recycle skipped: '+err);} else {let msg=G.players[p].name+' recycled weak/surplus tiles.'; log(msg); flash(msg);}}\n\nasync function doHumanAction(){if(G.over||G.players[G.turn].ai||pendingSupport||pendingWarOrder)return; preActionSnapshot=JSON.stringify(G); let p=G.turn, a=action.value, color=+document.getElementById('color').value, x=selected.x, y=selected.y; let imp=impactfulMoveText(a,color,x,y); if(G.settings.confirmImpact&&imp&&!confirm('Confirm impactful move:\\n\\n'+imp+'\\n\\nContinue?')){flash('Move cancelled.');return;} let err=null; if(a==='tile')err=await placeTile(p,color,x,y); else if(a==='leader')err=await placeLeader(p,color,x,y); else if(a==='withdraw'){let c=cell(x,y); if(c.leader&&c.leader.p===p){removeLeader(x,y); log('You withdrew a leader.'); spendAction();} else err='Select one of your leaders.';} else if(a==='cat')err=playCat(p,x,y); else if(a==='recycleCustom')err=replaceCustom(p,getRecycleCounts()); else if(a==='replaceAll')err=replaceTiles(p,color,true); if(err){preActionSnapshot=null; flash(err+' '+eligibilityText());} render(); autoSave('after action');}\nfunction aiProfile(){\n if(!G)return {mistake:0.25,top:10,noise:.45,cat:8,recycle:4,helpPenalty:0.65,risk:0.55};\n if(G.aiLevel==='easy')return {mistake:0.28,top:9,noise:.75,cat:8,recycle:4.25,helpPenalty:0.75,risk:0.55};\n if(G.aiLevel==='regular')return {mistake:0.10,top:5,noise:.28,cat:4.25,recycle:2.85,helpPenalty:1.05,risk:0.82};\n return {mistake:0.00,top:1,noise:.03,cat:2.4,recycle:2.05,helpPenalty:1.35,risk:1.08};\n}\nfunction vpVector(p){return G.players[p].vp.slice().sort((a,b)=>a-b);}\nfunction lowestVp(p){return Math.min(...G.players[p].vp);}\nfunction colourNeed(p,c){let v=G.players[p].vp, min=Math.min(...v); return Math.max(0,5-(v[c]-min));}\nfunction playerThreat(p){let v=vpVector(p), base=v[0]*100+v[1]*20+v[2]*4+v[3]; return base+G.players[p].treasures*18;}\nfunction mainRival(p){let best=null; for(let i=0;i<G.players.length;i++){if(i===p)continue; let t=playerThreat(i); if(!best||t>best.t)best={p:i,t};} return best?best.p:null;}\nfunction leaderCount(p){let n=0; for(let c=0;c<4;c++)if(G.players[p].leaders[c])n++; return n;}\nfunction offBoardLeaderList(p){let a=[]; for(let c=0;c<4;c++)if(!G.players[p].leaders[c])a.push(c); return a;}\nfunction hasOwnLeaderInComp(co,p,color){return co&&co.leaders.some(l=>l.p===p&&(color===undefined||l.color===color));}\nfunction hasEnemyLeaderInComp(co,p,color){return co&&co.leaders.some(l=>l.p!==p&&(color===undefined||l.color===color));}\nfunction compTreasures(co){return co?co.cells.filter(([x,y])=>cell(x,y).treasure).length:0;}\nfunction compHasBuilding(co,color){return co&&co.cells.some(([x,y])=>cell(x,y).building===color);}\nfunction futureColorPotential(p,color){let good=0,best=-99; if(G.players[p].hand[color]<=0)return {good,best}; for(let y=0;y<H;y++)for(let x=0;x<W;x++){ if(!legalTile(p,color,x,y))continue; let v=evaluateTile(p,color,x,y,true); best=Math.max(best,v); if(v>2.5)good++; } return {good,best};}\nfunction handBalanceScore(p){let h=G.players[p].hand, v=G.players[p].vp, min=Math.min(...v); let s=0; for(let c=0;c<4;c++){ if(v[c]===min&&h[c]>0)s+=1.2; if(h[c]>=3)s-=0.35*(h[c]-2); } return s;}\nfunction aiCandidates(p){let moves=[];\n for(let c=0;c<4;c++){\n  if(G.players[p].hand[c]>0){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalTile(p,c,x,y)){let v=evaluateTile(p,c,x,y); if(v>-25)moves.push({t:'tile',c,x,y,v});}}\n  for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalLeader(p,c,x,y)){let v=evaluateLeader(p,c,x,y); if(v>-25)moves.push({t:'leader',c,x,y,v});}\n }\n if(G.players[p].cat>0){eachCell((cc,x,y)=>{let v=evaluateCat(p,x,y); if(v!==null&&v>aiProfile().cat)moves.push({t:'cat',x,y,v});});}\n let rp=recyclePlan(p); if(rp.score>aiProfile().recycle)moves.push({t:'recycle',counts:rp.counts,v:rp.score});\n moves.sort((a,b)=>b.v-a.v); return moves;\n}\nfunction hardRecommendations(p,limit=4){let old=G.aiLevel; G.aiLevel='hard'; let moves=aiCandidates(p); G.aiLevel=old; return moves.slice(0,limit).map((m,i)=>(i+1)+'. '+moveLabel(m));}\nfunction finishHumanTurn(){if(pendingSupport||pendingWarOrder){flash('Resolve the current war/support choice first.');return;} if(!G.players[G.turn].ai){ if(G.actions>0){let recs=hardRecommendations(G.turn,5); let checklist=endTurnChecklist(); let msg='End-turn checklist:\\n'+checklist+'\\n\\nYou still have '+G.actions+' action'+(G.actions===1?'':'s')+' available. Strong options include:\\n\\n'+(recs.length?recs.join('\\n'):'No clearly useful action found; recycling tiles may still be worth considering.')+'\\n\\nTap OK only if you explicitly do not care and want to end the turn anyway. Tap Cancel to keep playing.'; if(!confirm(msg)){flash('Turn not ended. Choose an action or tap Finish turn again and confirm.'); return;} log('You explicitly chose to end the turn with '+G.actions+' unused action'+(G.actions===1?'':'s')+'.'); } endTurn();}}\nfunction aiTurn(){if(G.over||!G.players[G.turn].ai||aiBusy)return; let p=G.turn; aiBusy=true; flash(G.players[p].name+' is thinking\u2026'); runAiStep(p,0);}\nfunction runAiStep(p,step){ if(G.over||G.turn!==p){aiBusy=false; return;} if(step>=2){flash(G.players[p].name+' ends the turn.'); aiBusy=false; setTimeout(()=>endTurn(),AI_PACE.end); return;} let move=chooseAiMove(p); if(!move){move={t:'recycle',counts:recyclePlan(p).counts,v:0};} if(move.x!==undefined)selected={x:move.x,y:move.y}; render(); let dest=(move.x!==undefined&&move.y!==undefined)?(' at '+coord(move.x,move.y)):''; flash(G.players[p].name+' is considering '+moveLabel(move)+dest+'.'); setTimeout(async()=>{ if(move.t==='tile')await placeTileAi(p,move.c,move.x,move.y); else if(move.t==='leader')await placeLeaderAi(p,move.c,move.x,move.y); else if(move.t==='cat')playCatAi(p,move.x,move.y); else if(move.t==='recycle')replaceCustomAi(p,move.counts); render(); setTimeout(()=>runAiStep(p,step+1),AI_PACE.between); },AI_PACE.plan); }\nfunction moveLabel(m){if(!m)return 'none'; if(m.t==='tile')return 'place '+CNAME[m.c]+' '+TILE[m.c]+' at '+coord(m.x,m.y); if(m.t==='leader')return 'place '+CNAME[m.c]+' '+LEADER[m.c]+' at '+coord(m.x,m.y); if(m.t==='cat')return 'catastrophe at '+coord(m.x,m.y); if(m.t==='recycle')return 'recycle '+m.counts.map((n,i)=>n?CNAME[i]+' '+n:null).filter(Boolean).join(', '); return m.t;}\nfunction chooseAiMove(p){let moves=aiCandidates(p); if(!moves.length)return null; let prof=aiProfile(); if(G.aiLevel==='hard')return moves[0]; if(G.aiLevel==='regular'){let pool=moves.filter(m=>m.v>=moves[0].v-2.0).slice(0,prof.top); return weightedMove(pool,.75);} let safe=moves.filter(m=>m.v>0); let pool=(safe.length?safe:moves).slice(0,prof.top); if(Math.random()<prof.mistake&&pool.length>2)return pool[Math.floor(Math.random()*pool.length)]; return weightedMove(pool,.45);}\nfunction weightedMove(pool,temp){let min=Math.min(...pool.map(m=>m.v)), weights=pool.map(m=>Math.exp((m.v-min)/Math.max(.2,2.5/temp))), total=weights.reduce((a,b)=>a+b,0), r=Math.random()*total; for(let i=0;i<pool.length;i++){r-=weights[i]; if(r<=0)return pool[i];} return pool[0];}\nfunction evaluateTile(p,c,x,y,quiet){\n let v=0, pl=G.players[p], need=colourNeed(p,c), beforeUnite=neighborKingdomCount(x,y)===2, rival=mainRival(p), prof=aiProfile();\n let tmp=cell(x,y), oldTile=tmp.tile; tmp.tile=c; let co=compAt(x,y); let holder=null;\n if(beforeUnite)v+=G.aiLevel==='hard'?0.2:0.45;\n if(co){\n  holder=co.leaders.find(l=>l.color===c)||co.leaders.find(l=>l.color===BLACK);\n  if(holder&&holder.p===p){let reward=1+(G.settings.buildings&&compHasBuilding(co,c)?1:0); v+=5.8*reward+need*1.1;}\n  else if(holder&&holder.p!==p){let penalty=(5.8+colourNeed(holder.p,c)*0.75)*prof.helpPenalty; if(holder.p===rival)penalty+=2.2; v-=penalty;}\n  else v-=.6;\n  if(beforeUnite){let cf=warForecast(p,c,x,y); v+=cf; if(cf<0)v-=prof.risk*2.5;}\n  let ownLeaders=co.leaders.filter(l=>l.p===p), enemyLeaders=co.leaders.filter(l=>l.p!==p);\n  v+=Math.min(2.8,ownLeaders.length*.65+co.cells.length/12);\n  if(enemyLeaders.length&&!ownLeaders.length)v-=1.7;\n  let treasures=compTreasures(co);\n  if(treasures>1){let ownTrader=co.leaders.find(l=>l.p===p&&l.color===GREEN), enemyTrader=co.leaders.find(l=>l.p!==p&&l.color===GREEN); if(ownTrader)v+=4.5+treasures*1.6; if(enemyTrader)v-=5.2+treasures*1.9;}\n  if(c===RED&&co.leaders.some(l=>l.p===p))v+=.75; // temples preserve leader options\n }\n if(findSquares(x,y,c).length)v+=G.settings.buildings?5.2:4.3;\n if(G.settings.wonder&&findCross(x,y,c))v+=6.3+colourNeed(p,BLACK)*.4;\n if(G.settings.buildings){let lg=lineCandidateGain(c,x,y); if(lg>=3)v+=2.4+Math.min(2,lg-3);}\n // Support own threatened leaders with like-colour tiles, but do not overbuild far-ahead colours.\n if(co&&hasOwnLeaderInComp(co,p,c))v+=1.2; if(pl.vp[c]>lowestVp(p)+6)v-=1.2;\n if(!co||!co.leaders.length)v-=2.3;\n tmp.tile=oldTile;\n return v + (quiet?0:Math.random()*aiProfile().noise);\n}\nfunction evaluateLeader(p,c,x,y){\n let v=1.1+colourNeed(p,c)*1.1, old=G.players[p].leaders[c], oldCell=null, prof=aiProfile(), rival=mainRival(p);\n if(old){oldCell=cell(old.x,old.y); oldCell.leader=null; v-=0.9;} else v+=1.25;\n let tmp=cell(x,y); tmp.leader={p,color:c}; let co=compAt(x,y);\n if(co){\n  let treasures=compTreasures(co), ownOther=co.leaders.filter(l=>l.p===p&&l.color!==c).length, enemySame=co.leaders.find(l=>l.p!==p&&l.color===c);\n  if(c===GREEN)v+=treasures*4.2; else if(treasures>1)v+=treasures*.75;\n  if(enemySame){let odds=revoltForecast(p,c,x,y); v+=odds; if(enemySame.p===rival&&odds>0)v+=1.4;}\n  if(ownOther)v+=1.2+ownOther*.35;\n  v+=Math.min(3.2,co.cells.length/7);\n  if(c===BLACK){let missingColors=[1,2,3].filter(col=>!co.leaders.some(l=>l.color===col)); v+=missingColors.length*.45;}\n  if(c!==BLACK&&!co.leaders.some(l=>l.color===c&&l.p!==p))v+=.75;\n  if(co.leaders.some(l=>l.p!==p&&l.p===rival))v+=.4;\n }\n tmp.leader=null; if(oldCell)oldCell.leader={p,color:c};\n return v + Math.random()*prof.noise;\n}\nfunction lineCandidateGain(color,x,y){let best=0; for(const dir of [[1,0],[0,1]]){let n=1; for(const s of [-1,1]){let nx=x+dir[0]*s,ny=y+dir[1]*s; while(inside(nx,ny)&&cell(nx,ny).tile===color&&!cell(nx,ny).face&&!cell(nx,ny).wonder){n++; nx+=dir[0]*s; ny+=dir[1]*s;}} best=Math.max(best,n);} return best>=3?best:0;}\nfunction revoltForecast(p,c,x,y){let co=compAt(x,y); if(!co)return 0; let def=co.leaders.find(l=>l.color===c&&l.p!==p); if(!def)return 0; let aBase=neighbors(x,y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length, dBase=neighbors(def.x,def.y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length; let aMax=aBase+G.players[p].hand[RED], dMax=dBase+G.players[def.p].hand[RED], value=2+colourNeed(p,RED); if(aBase>dMax)return 5+value*.4; if(aMax<=dBase)return -13; let cost=Math.max(0,dBase+1-aBase); return aMax>dMax?(3.2+value*.25-cost*.35):(-3.2-cost*.3);}\nfunction expectedWarRewardForLoser(loser,color,block){return 1+countSupport(loser.x,loser.y,color,block);}\nfunction warForecast(p,c,x,y){let co=compAt(x,y); if(!co)return 0; let score=0, block=key(x,y), rival=mainRival(p); for(let col=0;col<4;col++){let ls=co.leaders.filter(l=>l.color===col); if(ls.length<2)continue; let own=ls.find(l=>l.p===p), enemies=ls.filter(l=>l.p!==p); if(!own){score-=2.8*enemies.length; continue;} let enemy=enemies.sort((a,b)=>(b.p===rival)-(a.p===rival))[0]; let ownStr=countSupport(own.x,own.y,col,block)+G.players[p].hand[col], enStr=countSupport(enemy.x,enemy.y,col,block)+G.players[enemy.p].hand[col]; let reward=expectedWarRewardForLoser(enemy,col,block)+colourNeed(p,col)*.4; if(ownStr>enStr)score+=4.5+reward*.7; else if(ownStr===enStr)score-=3.0; else score-=8.5+(enemy.p===rival?1.5:0); } return score;}\nfunction evaluateCat(p,x,y){let c=cell(x,y); if(c.leader||c.mon||c.wonder||c.treasure||c.building!==null||G.players[p].cat<=0)return null; if(c.tile===null&&!c.face)return null; let co=compAt(x,y), score=0, rival=mainRival(p); if(!co)return null; let own=co.leaders.filter(l=>l.p===p).length, enemy=co.leaders.filter(l=>l.p!==p).length; if(!enemy&&own)return -10; score+=(enemy-own)*1.9; if(c.tile===RED){for(const [nx,ny] of neighbors(x,y)){let l=cell(nx,ny).leader; if(!l)continue; let otherTemple=neighbors(nx,ny).some(([tx,ty])=>!(tx===x&&ty===y)&&faceTemple(cell(tx,ty))); if(!otherTemple)score += l.p===p?-25:(l.p===rival?15:11);}}\n if(c.tile!==null){let enemySame=co.leaders.some(l=>l.p!==p&&l.color===c.tile), ownSame=co.leaders.some(l=>l.p===p&&l.color===c.tile); if(enemySame)score+=3.2+colourNeed(p,c.tile)*.2; if(ownSame)score-=5.5;}\n let before=comps().length; let old={tile:c.tile,face:c.face,cat:c.cat}; c.cat=true;c.tile=null;c.face=false; let after=comps().length; c.cat=old.cat;c.tile=old.tile;c.face=old.face; if(after>before){ if(enemy>own)score+=4.2; else score-=2; }\n if(co.leaders.some(l=>l.p===rival))score+=1.2; return score+Math.random()*aiProfile().noise;}\nfunction recyclePlan(p){let h=G.players[p].hand, v=G.players[p].vp, min=Math.min(...v), counts=[0,0,0,0], score=0, prof=aiProfile();\n let potentials=[0,1,2,3].map(c=>futureColorPotential(p,c));\n for(let c=0;c<4;c++){\n  let surplus=Math.max(0,h[c]-2), ahead=Math.max(0,v[c]-min), isWeak=v[c]===min, good=potentials[c].good, best=potentials[c].best;\n  let discard=0;\n  if(h[c]>0 && best<1.5 && !isWeak)discard=Math.min(h[c],Math.max(1,surplus+Math.floor(ahead/2)));\n  if(h[c]>=4 && good<=1)discard=Math.max(discard,Math.min(h[c]-2,2));\n  if(G.aiLevel==='hard'&&isWeak&&best>1)discard=0;\n  if(G.aiLevel==='easy')discard=Math.min(discard,1);\n  counts[c]=Math.max(0,Math.min(h[c],discard));\n  if(counts[c])score+=counts[c]*(1.45+ahead*.25+(good===0?.65:0));\n }\n let total=counts.reduce((a,b)=>a+b,0); if(total===0){let worst=-1,wscore=-99; for(let c=0;c<4;c++){let s=h[c]-(v[c]===min?2:0)-potentials[c].good; if(s>wscore){wscore=s;worst=c;}} if(worst>=0&&h[worst]>3){counts[worst]=1; score=1.6+(G.aiLevel==='hard'?.7:0);}}\n return {counts,score:score+handBalanceScore(p)*.15};}\nfunction aiCommitSupport(p,color,base,opponent,isRevolt,isAttacker,max,needed){\n if(max<=0)return 0; let target=isAttacker?opponent+1-base:opponent-base; if(!isAttacker&&target<0)target=0; let minNeeded=Math.max(0,target); let winPossible=base+Math.min(max,minNeeded)>opponent || (!isAttacker&&base+Math.min(max,minNeeded)>=opponent); let stake=(isRevolt?2:2+colourNeed(p,color));\n if(G.aiLevel==='easy'){ if(minNeeded>0&&minNeeded<=max&&Math.random()<.72)return minNeeded; return Math.random()<.2?Math.min(max,1):0; }\n if(G.settings.english){ if(minNeeded>max)return 0; if(isAttacker&&base+minNeeded<=opponent)return 0; if(!isAttacker&&minNeeded>0&&base+minNeeded!==opponent)return 0; }\n if(minNeeded===0)return 0; if(minNeeded>max)return 0;\n if(G.aiLevel==='regular'){ if(minNeeded<=Math.max(1,Math.ceil(stake/2)))return minNeeded; return 0; }\n return minNeeded<=Math.max(1,stake+1)?minNeeded:0;\n}\n          async function placeTileAi(p,c,x,y){let err=await placeTile(p,c,x,y); if(err){log('AI illegal tile skipped: '+err); flash('AI illegal tile skipped: '+err);} else {flash(G.players[p].name+' placed '+CNAME[c]+' '+TILE[c]+' at '+coord(x,y)+'.');}}\nasync function placeLeaderAi(p,c,x,y){let err=await placeLeader(p,c,x,y); if(err){log('AI illegal leader skipped: '+err); flash('AI illegal leader skipped: '+err);} else {flash(G.players[p].name+' placed '+CNAME[c]+' '+LEADER[c]+' at '+coord(x,y)+'.');}}\nfunction playCatAi(p,x,y){let err=playCat(p,x,y); if(err){log('AI cat skipped: '+err); flash('AI cat skipped: '+err);} else {flash(G.players[p].name+' played catastrophe at '+coord(x,y)+'.');}}\nfunction scoreEndOfTurn(p){let cps=comps(); for(const co of cps){let own=co.leaders.filter(l=>l.p===p); if(!own.length)continue; let monColors=[]; let hasWonder=false; for(const [x,y] of co.cells){let c=cell(x,y); if(c.monumentColors)monColors.push(...c.monumentColors); if(c.wonder)hasWonder=true;} for(const l of own){let gains=monColors.filter(c=>c===l.color).length; if(gains){G.players[p].vp[l.color]+=gains; log(G.players[p].name+' gains '+gains+' '+VP[l.color]+' from monument(s).');} if(l.color===BLACK&&hasWonder){let ch=chooseLowestColor(p); G.players[p].vp[ch]++; log(G.players[p].name+' gains 1 '+VP[ch]+' from the wonder.');}}}}\nfunction chooseLowestColor(p){let v=G.players[p].vp, m=Math.min(...v), idx=v.indexOf(m); if(G.players[p].ai)return idx; let choices=CNAME.map((n,i)=>(i+1)+': '+n+' '+VP[i]).join('\\n'); let ans=prompt('Wonder scoring: your king is linked to the wonder. Choose a victory point colour by number:\\n'+choices, String(idx+1)); let n=(parseInt(ans||'',10)||0)-1; if(!Number.isFinite(n)||n<0||n>3){n=idx; flash('Wonder scoring: invalid choice, so your current lowest colour was chosen: '+CNAME[n]+'.');} else {flash('Wonder scoring: you chose '+CNAME[n]+' '+VP[n]+'.');} return n;}\nfunction gameOver(){if(G.finalized)return; G.over=true; G.finalized=true; let scores=G.players.map((pl,i)=>({i,name:pl.name,vec:bestScore(pl.vp,pl.treasures),base:pl.vp.slice(),treasures:pl.treasures})); scores.sort((a,b)=>compareVec(b.vec,a.vec)); let msg='Game over!\\nScores shown lowest-to-highest after best treasure allocation.\\n\\n'+scores.map(s=>s.name+': '+s.vec.join('/')+'  (treasures: '+s.treasures+')').join('\\n'); alert(msg); log('GAME OVER. Winner: '+scores[0].name+' by lowest-sphere comparison.'); render();}\nfunction bestScore(vp,t){let best=null; function rec(idx,left,arr){if(idx===3){arr[3]=left; let v=vp.map((v,i)=>v+arr[i]).sort((a,b)=>a-b); if(!best||compareVec(v,best)>0)best=v; return;} for(let n=0;n<=left;n++){arr[idx]=n;rec(idx+1,left-n,arr);}} rec(0,t,[0,0,0,0]); return best;}\nfunction compareVec(a,b){for(let i=0;i<4;i++)if(a[i]!==b[i])return a[i]-b[i]; return 0;}\nfunction describeCell(x,y){if(!G||!inside(x,y))return 'off board'; let c=cell(x,y), parts=[]; parts.push(c.river?'river':'land'); if(c.shedu)parts.push((c.special?'outlined Shedu start site':'Shedu start site')+' \u2014 '+(c.treasure?'treasure still here':'treasure already taken/removed')); if(c.tile!==null&&!c.face&&!c.wonder)parts.push(CNAME[c.tile]+' '+TILE[c.tile]); if(c.face)parts.push(c.wonder?'wonder':'facedown monument base'); if(c.leader)parts.push(G.players[c.leader.p].name+' '+CNAME[c.leader.color]+' '+LEADER[c.leader.color]); if(c.treasure&&!c.shedu)parts.push('treasure'); if(c.building!==null)parts.push(BUILDING[c.building]); if(c.cat)parts.push('catastrophe'); if(c.union!==null)parts.push('unification marker'); return parts.join(', ');}\nfunction eligibilityReason(a,color,x,y){if(!G||!inside(x,y))return 'Off board.'; let c=cell(x,y); if(a==='tile'){if(!emptyCell(c))return 'This space is occupied or blocked.'; if(color===BLUE&&!c.river)return 'Blue farms can only be placed on river spaces.'; if(color!==BLUE&&c.river)return CNAME[color]+' tiles cannot be placed on river spaces.'; if(!canAfford(G.turn,color))return 'You have no '+CNAME[color]+' tiles in hand.'; if(neighborKingdomCount(x,y)>2)return 'A tile cannot unite more than two kingdoms.'; return 'Eligible '+CNAME[color]+' tile placement.';} if(a==='leader'){if(!emptyCell(c))return 'Leaders require an empty space.'; if(c.river)return 'Leaders cannot be placed on river spaces.'; if(!neighbors(x,y).some(([nx,ny])=>faceTemple(cell(nx,ny))))return 'Leaders must be adjacent to a face-up temple.'; if(neighborKingdomCount(x,y)>1)return 'Leader placement cannot unite kingdoms.'; return 'Eligible '+CNAME[color]+' '+LEADER[color]+' placement.';} if(a==='cat'){if(G.players[G.turn].cat<=0)return 'You have no catastrophes left.'; if(c.leader)return 'Catastrophes cannot be played on leaders.'; if(c.mon||c.wonder||c.treasure)return 'Catastrophes cannot be played on treasures, monuments, or the wonder.'; if(c.building!==null)return 'Catastrophes cannot be played on a tile under a civilisation building; that tile is protected.'; return 'Eligible catastrophe placement.';} if(a==='withdraw'){return (c.leader&&c.leader.p===G.turn)?'Eligible: withdraw this leader.':'Select one of your own leaders to withdraw.';} if(a==='recycleCustom')return 'Set the tile counts below, then recycle that exact mix.'; return 'This action does not use a board placement.';}\nfunction eligibilityText(x=selected.x,y=selected.y){return eligibilityReason(document.getElementById('action').value,+document.getElementById('color').value,x,y);}\n\nfunction normalizeSettings(){if(!G)return; G.settings=G.settings||{}; if(G.settings.confirmImpact===undefined)G.settings.confirmImpact=true; if(G.settings.showLegal===undefined)G.settings.showLegal=true; G.settings.showShedu=true; if(G.settings.showPhase===undefined)G.settings.showPhase=true; if(!G.boardZoom)G.boardZoom=1; if(!activePanel)activePanel='controls'; applyAccessibility();}\nfunction applyAccessibility(){return;}\nfunction setUiOption(k,v){if(!G)return; G.settings[k]=v; applyAccessibility(); if(k==='confirmImpact')flash('Move confirmation '+(v?'enabled':'disabled')+'.'); render();}\nfunction updateMiniSettings(){if(!G)return; const m=[['uiConfirm','confirmImpact'],['uiConfirm2','confirmImpact'],['uiLegal','showLegal'],['uiLegal2','showLegal'],['uiPhase','showPhase']]; for(const [id,k] of m){let el=document.getElementById(id); if(el)el.checked=!!G.settings[k];} applyAccessibility();}\nfunction setQuickAction(a,c){setActionChoice(a); if(c!==undefined)setColorChoice(c); refreshEligibilityMessage();}\nfunction setActionChoice(a){let el=document.getElementById('action'); if(el)el.value=a; renderChoiceChips(); syncRecycleInputs();}\nfunction setColorChoice(c){let el=document.getElementById('color'); if(el)el.value=String(c); renderChoiceChips();}\nfunction renderChoiceChips(){\nlet aSel=document.getElementById('action'), cSel=document.getElementById('color');\nlet aBox=document.getElementById('actionChips'), cBox=document.getElementById('colorChips');\nif(aBox&&aSel){let opts=[['tile','Tile'],['leader','Leader'],['withdraw','Withdraw'],['cat','Catastrophe'],['recycleCustom','Recycle mix'],['replaceAll','Recycle all']]; aBox.innerHTML=opts.map(o=>'<button class=\"chipBtn '+(aSel.value===o[0]?'active':'')+'\" onclick=\"setActionChoice(\\''+o[0]+'\\');refreshEligibilityMessage()\">'+o[1]+'</button>').join('');}\nif(cBox&&cSel){cBox.innerHTML=CNAME.map((n,i)=>'<button class=\"chipBtn c'+i+' '+(+cSel.value===i?'active':'')+'\" onclick=\"setColorChoice('+i+');refreshEligibilityMessage()\">'+SHORT[i]+'</button>').join('');}\n}\nfunction updateQuickActions(){let box=document.getElementById('quickActions'); if(!box||!G)return; let items=contextActions(selected.x,selected.y).slice(0,4); if(!items.length){box.innerHTML='<button class=\"secondary\" onclick=\"setQuickAction(\\'recycleCustom\\')\">Recycle mix</button><button class=\"secondary\" onclick=\"setQuickAction(\\'replaceAll\\')\">Recycle all</button>';return;} box.innerHTML=items.map(it=>'<button class=\"'+(it.secondary?'secondary':'')+'\" onclick=\"setQuickAction(\\''+it.a+'\\''+(it.c!==undefined?','+it.c:'')+')\">'+it.label+'</button>').join('');}\nfunction contextActions(x,y){let res=[], c=inside(x,y)?cell(x,y):null; if(!G||G.players[G.turn].ai||!c)return res; for(let color=0;color<4;color++){if(legalTile(G.turn,color,x,y))res.push({a:'tile',c:color,label:'Place '+SHORT[color]+' '+TILE[color]});} for(let color=0;color<4;color++){if(legalLeader(G.turn,color,x,y))res.push({a:'leader',c:color,label:'Place '+SHORT[color]+' '+LEADER[color]});} if(c.leader&&c.leader.p===G.turn)res.unshift({a:'withdraw',label:'Withdraw leader',secondary:true}); if(!playCatCheck(G.turn,x,y))res.push({a:'cat',label:'Catastrophe',secondary:true}); return res;}\nfunction actionPreviewHTML(){if(!G)return ''; let a=document.getElementById('action').value, color=+document.getElementById('color').value, x=selected.x,y=selected.y, reason=eligibilityReason(a,color,x,y); let extra=''; if(a==='tile'&&inside(x,y)&&legalTile(G.turn,color,x,y)){let nk=neighborKingdomCount(x,y); if(nk===2)extra=' This is a linking tile: no placement VP; unification marker appears; war is checked.'; else if(nk===0)extra=' Isolated tile: no VP unless it later joins a kingdom.'; else extra=' If the kingdom has a matching leader, or a king if not, placement VP is awarded.'; if(G.settings.buildings&&lineCandidateGain(color,x,y)>=3)extra+=' Building line possible.'; if(G.settings.wonder&&findCrosses(x,y,color).length)extra+=' Wonder cross possible.'; if(findSquares(x,y,color).length)extra+=' Monument square possible.';} if(a==='leader'&&inside(x,y)&&legalLeader(G.turn,color,x,y)){let tmp=cell(x,y); tmp.leader={p:G.turn,color}; let co=compAt(x,y); let revolt=co&&co.leaders.filter(l=>l.color===color).length>1; tmp.leader=null; extra=revolt?' Revolt will occur: attacker commits temples first; defender wins ties.':' Leader positioning gives no VP.';} if(a==='cat')extra=' Catastrophes permanently block spaces and may split kingdoms.'; return '<b>Preview:</b> '+colorizeText(reason+extra);}\nfunction impactfulMoveText(a,color,x,y){if(!inside(x,y))return ''; if(a==='tile'&&legalTile(G.turn,color,x,y)){let notes=[]; if(neighborKingdomCount(x,y)===2)notes.push('This tile will unite two kingdoms. It gives no placement VP and may start war.'); if(findSquares(x,y,color).length)notes.push('This placement may create a monument choice.'); if(G.settings.wonder&&findCrosses(x,y,color).length)notes.push('This placement may create a wonder choice.'); return notes.join('\\n');} if(a==='leader'&&legalLeader(G.turn,color,x,y)){let c=cell(x,y); c.leader={p:G.turn,color}; let co=compAt(x,y); let rev=co&&co.leaders.filter(l=>l.color===color).length>1; c.leader=null; return rev?'This leader placement starts a revolt.': ''; } if(a==='cat')return playCatCheck(G.turn,x,y)?'':'This catastrophe permanently blocks the space and may split kingdoms or remove leaders.'; if(a==='withdraw')return 'Withdrawing a leader can alter kingdoms and treasure access.'; return '';}\n\nfunction boardThemePalette(){\n  let t=(G&&G.ui&&G.ui.theme)||localStorage.getItem('kingsTheme')||'classic';\n  if(t==='muted')return {land:'#c9ad69',river:'#7aa5b7',riverHi:'rgba(255,255,255,.12)',shedu:'rgba(245,229,176,.28)',special:'#d7bd66',special2:'#755117',grid:'rgba(72,55,31,.50)',riverLine:'rgba(38,91,112,.45)'};\n  if(t==='contrast')return {land:'#f1ca62',river:'#4fb6e6',riverHi:'rgba(255,255,255,.30)',shedu:'rgba(255,255,210,.50)',special:'#ffff4d',special2:'#000000',grid:'rgba(0,0,0,.85)',riverLine:'rgba(0,57,116,.78)'};\n  return {land:'#d9b56c',river:'#7db8d7',riverHi:'rgba(255,255,255,.18)',shedu:'rgba(250,238,190,.35)',special:'#ffe483',special2:'#8a5b10',grid:'rgba(84,63,32,.65)',riverLine:'rgba(20,92,132,.55)'};\n}\nfunction legendHTML(){\n  if(!G)return '';\n  let parts=[];\n  parts.push(selectedSpaceCardHTML());\n  parts.push('<div class=\"infoBlock\"><b>Turn order / dynasties</b><div class=\"legendRow\">'+G.players.map((pl,i)=>'<span class=\"pill ownerP'+i+'\"><b>'+playerMark(i)+'</b> '+esc(pl.name)+' \xB7 '+esc(pl.symbol||SIGIL[i]||'')+'</span>').join('')+'</div></div>');\n  parts.push('<div class=\"infoBlock\"><b>Sphere colours</b><div class=\"legendRow\">'+CNAME.map((n,i)=>'<span class=\"pill c'+i+'\"><span class=\"sw\" style=\"background:'+HEX[i]+'\"></span>'+n+': '+TILE[i]+' / '+LEADER[i]+' / '+VP[i]+'</span>').join('')+'</div></div>');\n  parts.push('<div class=\"infoBlock\"><b>Starting sites</b><div class=\"legendRow\"><span class=\"pill\">Gold ribbon = treasure still on the Shedu site</span><span class=\"pill\">Grey ribbon = starting treasure taken/removed</span></div></div>');\n  if(G.settings.buildings)parts.push('<div class=\"infoBlock\"><b>Civilisation buildings</b><div class=\"legendRow\">Buildings protect their tile from catastrophe/removal until flipped for a monument or wonder.</div></div>');\n  parts.push('<div class=\"infoBlock tiny\">Board theme is in Menu. Themes recolour the board only; player frames remain separate from sphere colours.</div>');\n  return parts.join('');\n}\nfunction selectedSpaceCardHTML(){let desc=describeCell(selected.x,selected.y); let c=cell(selected.x,selected.y); let icon=c.leader?'\u265F':c.treasure?'\u25C6':c.tile!==null?'\u25A0':c.wonder?'\u2726':c.face?'\u25A3':c.cat?'\xD7':'\xB7'; return '<div class=\"selectedCard\"><div class=\"big\"><b>'+icon+' '+coord(selected.x,selected.y)+'</b></div><div class=\"sub\">'+esc(desc)+'</div></div>';}\nfunction incomePreviewHTML(){if(!G)return ''; let p=G.turn, gains=[0,0,0,0], wonder=false; let cps=comps(); for(const co of cps){let own=co.leaders.filter(l=>l.p===p); if(!own.length)continue; let monColors=[], hasWonder=false; for(const [x,y] of co.cells){let c=cell(x,y); if(c.monumentColors)monColors.push(...c.monumentColors); if(c.wonder)hasWonder=true;} for(const l of own){for(const mc of monColors)if(mc===l.color)gains[l.color]++; if(l.color===BLACK&&hasWonder)wonder=true;}} let gainTxt=gains.map((v,i)=>v?SHORT[i]+' +'+v:'').filter(Boolean).join(', ')||'none'; return '<b>End-turn income preview</b><br>Monuments: '+gainTxt+(wonder?'<br>Wonder: your king will choose 1 VP colour.':'<br>Wonder: none.');}\nfunction actionContextHTML(){let a=document.getElementById('action').value, color=+document.getElementById('color').value; let phase=pendingSupport?'Resolve support':pendingWarOrder?'Choose war order':(G.players[G.turn].ai?'AI turn':'Normal action'); return '<b>'+phase+'</b><br>'+colorizeText(eligibilityReason(a,color,selected.x,selected.y))+'<br>'+incomePreviewHTML();}\nfunction autoSave(reason){try{if(!G)return; let item={id:'autosave',ts:new Date().toISOString(),name:'Autosave',summary:saveSummary(G)+'; '+reason,g:JSON.stringify(G)}; let saves=getSaves().filter(s=>s.id!=='autosave'); saves.unshift(item); setSaves(saves);}catch(e){}}\nfunction undoLastAction(){if(!preActionSnapshot){flash('Nothing to undo from the current turn.');return;} if(pendingSupport||pendingWarOrder||G.players[G.turn].ai){flash('Cannot undo during conflict resolution or AI turn.');return;} if(!confirm('Undo your last action? This is intended for the current local action before you end the turn.'))return; G=JSON.parse(preActionSnapshot); preActionSnapshot=null; normalizeSettings(); flash('Last action undone.'); render(); autoSave('undo');}\nfunction setActivePanel(id){activePanel=id; ['controls','legend','log','menuPanel'].forEach(pid=>{let el=document.getElementById(pid); if(el)el.classList.toggle('collapsed', pid!==id);}); updateActivePanelButtons(); setTimeout(()=>{resizeCanvas(); if(G)render();},70);}\nfunction updateActivePanelButtons(){document.querySelectorAll('#hudButtons button[data-panel]').forEach(b=>b.classList.toggle('activeTab', b.getAttribute('data-panel')===activePanel));}\n\nfunction playerStripHTML(){if(!G)return ''; return G.players.map((pl,i)=>{let active=i===G.turn; let role=i===0?'You':'AI'; return '<div class=\"playerChip '+(active?'active':'')+'\"><b>'+playerMark(i)+' '+esc(pl.name)+'</b><div class=\"vpMini\">'+role+' \xB7 Treasures '+pl.treasures+'</div></div>';}).join('');}\nfunction phaseBadgeHTML(){if(!G)return ''; let phase=pendingSupport?'Support':pendingWarOrder?'War order':(G.players[G.turn].ai?'AI turn':'Your turn'); return phase+' \xB7 '+playerMark(G.turn)+' '+G.players[G.turn].name+' \xB7 action '+(3-G.actions)+' / 2';}\nfunction historyHTML(){if(!G)return ''; let html='', open=false; for(const s of G.log){let safe=colorizeText(s); if(/^TURN START:|^Game started|^CONTINUED|^SAVED|^GAME OVER/.test(s)){if(open)html+='</div>'; html+='<div class=\"turnGroup\"><b>'+safe+'</b>'; open=true;} else {if(!open){html+='<div class=\"turnGroup\">'; open=true;} html+='<span class=\"turnLine\">'+safe+'</span>';}} if(open)html+='</div>'; return html;}\nfunction endTurnChecklist(){let p=G.turn, recs=[]; recs.push('\u2022 Actions remaining: '+G.actions); recs.push('\u2022 Monument/wonder income will now be checked.'); recs.push('\u2022 Your hand and any short hands refill to six if the bag allows.'); recs.push('\u2022 Game-end check: '+boardTreasures()+' treasure(s) remain on the board.'); recs.push('\u2022 Current selected space: '+coord(selected.x,selected.y)+' \u2014 '+describeCell(selected.x,selected.y)); return recs.join('\\n');}\nfunction zoomBoard(f){if(!G)return; let old=G.boardZoom||1; G.boardZoom=Math.max(1,Math.min(5,old*f)); resizeCanvas(); flash('Board zoom: '+Math.round(G.boardZoom*100)+'%. Drag the board area when zoomed.');}\nfunction resetBoardZoom(){if(!G)return; G.boardZoom=1; resizeCanvas(); flash('Board fit to screen.');}\n\nfunction refreshEligibilityMessage(){if(G){flash(eligibilityText()); render();}}\nfunction isEligibleForCurrentAction(x,y){let a=document.getElementById('action').value, color=+document.getElementById('color').value; if(a==='tile')return legalTile(G.turn,color,x,y); if(a==='leader')return legalLeader(G.turn,color,x,y); if(a==='cat')return !playCatCheck(G.turn,x,y); if(a==='withdraw'){let c=cell(x,y);return !!(c.leader&&c.leader.p===G.turn);} return false;}\nfunction playCatCheck(p,x,y){let c=cell(x,y); if(c.leader||c.mon||c.wonder||c.treasure||c.building!==null)return 'Illegal catastrophe.'; if(G.players[p].cat<=0)return 'No catastrophes left.'; return null;}\nfunction coord(x,y){return String.fromCharCode(65+x)+(y+1)}\nfunction requestNativeOrientation(mode){try{if(window.AndroidBridge&&AndroidBridge.setOrientation)AndroidBridge.setOrientation(mode);}catch(e){}}\nfunction applyGameLayout(){let on=!!(G&&G.uiHorizontal); document.body.classList.toggle('horiz',on); let b=document.getElementById('layoutBtn'); if(b)b.textContent=on?'Portrait':'Landscape'; if(!activePanel)activePanel='controls'; setActivePanel(activePanel); setTimeout(()=>{resizeCanvas(); if(G)render();},120);}\nfunction toggleGameLayout(){if(!G)return; G.uiHorizontal=!G.uiHorizontal; G.boardZoom=1; applyGameLayout(); requestNativeOrientation(G.uiHorizontal?'landscape':'portrait'); setTimeout(()=>requestNativeOrientation(G.uiHorizontal?'sensorLandscape':'sensorPortrait'),350); flash(G.uiHorizontal?'Landscape layout.':'Portrait layout.'); setTimeout(()=>{resizeCanvas();render();},650); setTimeout(()=>{resizeCanvas();render();},1200);}\nfunction togglePanel(id){setActivePanel(id);}\nfunction centerBoard(){['controls','legend','log','menuPanel'].forEach(pid=>{let el=document.getElementById(pid); if(el)el.classList.add('collapsed');}); activePanel='board'; updateActivePanelButtons(); resetBoardZoom(); flash('Board centred and panels hidden. Tap Actions, Info, History, or Menu to reopen a panel.');}\nfunction resizeCanvas(){let can=board, wrap=canvasWrap; if(!wrap||!can)return; let zoom=(G&&G.boardZoom)||1, horiz=document.body.classList.contains('horiz'); let safety=horiz?8:0; let availW=Math.max(180,wrap.clientWidth-safety), availH=Math.max(130,wrap.clientHeight-safety); let fit=Math.min(availW/W,availH/H); let cellSize=Math.max(8,Math.floor(fit)); let w=W*cellSize, h=H*cellSize; can.style.width=Math.max(1,Math.floor(w*zoom))+'px'; can.style.height=Math.max(1,Math.floor(h*zoom))+'px'; wrap.classList.toggle('zoomed',zoom>1.01); if(zoom<=1.01){wrap.scrollLeft=0;wrap.scrollTop=0;} else {setTimeout(()=>{wrap.scrollLeft=Math.max(0,(can.clientWidth-wrap.clientWidth)/2);wrap.scrollTop=Math.max(0,(can.clientHeight-wrap.clientHeight)/2);},0);}}\nwindow.addEventListener('resize',()=>{if(G){setTimeout(()=>{resizeCanvas();render();},80);}});\nlet boardDrag=null; canvasWrap.addEventListener('pointerdown',e=>{if(!G||G.boardZoom<=1.01)return; boardDrag={x:e.clientX,y:e.clientY,l:canvasWrap.scrollLeft,t:canvasWrap.scrollTop,moved:false}; canvasWrap.setPointerCapture&&canvasWrap.setPointerCapture(e.pointerId);}); canvasWrap.addEventListener('pointermove',e=>{if(!boardDrag)return; let dx=e.clientX-boardDrag.x, dy=e.clientY-boardDrag.y; if(Math.abs(dx)+Math.abs(dy)>3)boardDrag.moved=true; canvasWrap.scrollLeft=boardDrag.l-dx; canvasWrap.scrollTop=boardDrag.t-dy;}); canvasWrap.addEventListener('pointerup',()=>{setTimeout(()=>{boardDrag=null;},0);});\nboard.addEventListener('click',e=>{if(boardDrag&&boardDrag.moved)return;let r=board.getBoundingClientRect(), x=Math.floor((e.clientX-r.left)/r.width*W), y=Math.floor((e.clientY-r.top)/r.height*H); if(inside(x,y)){selected={x,y}; let desc=cellDescription(x,y); if(!G.players[G.turn].ai)flash(desc+' \u2014 '+eligibilityText(x,y)); else flash(desc); render();}});\nfunction render(){\n if(!G)return; const can=board, ctx=can.getContext('2d'), cw=can.width/W, ch=can.height/H; ctx.clearRect(0,0,can.width,can.height);\n ctx.fillStyle=G.settings.advanced?'#c99c52':'#d7ae62'; ctx.fillRect(0,0,can.width,can.height);\n drawBoardBase(ctx,cw,ch);\n drawEligibilityOverlay(ctx,cw,ch); eachCell((c,x,y)=>drawCellContents(ctx,c,x,y,cw,ch));\n let boardAction=['tile','leader','cat','withdraw'].includes(document.getElementById('action').value); ctx.strokeStyle=(!boardAction||isEligibleForCurrentAction(selected.x,selected.y))?'#ffeb3b':'#ff5a49';ctx.lineWidth=6;ctx.strokeRect(selected.x*cw+3,selected.y*ch+3,cw-6,ch-6);\n syncRecycleInputs(); updateMiniSettings(); updateQuickActions(); renderChoiceChips(); document.getElementById('topbar').innerHTML=statusHTML(); document.getElementById('legend').innerHTML=legendHTML(); document.getElementById('eventBox').textContent=statusFlash; document.getElementById('previewBox').innerHTML=actionPreviewHTML(); document.getElementById('playerStrip').innerHTML=playerStripHTML(); document.getElementById('phaseBadge').innerHTML=phaseBadgeHTML(); document.getElementById('phaseBadge').classList.toggle('hidden',!G.settings.showPhase); document.getElementById('log').innerHTML=historyHTML(); let mp=document.getElementById('menuPanel'); let ib=mp&&mp.querySelector('#incomePreviewBox'); if(ib)ib.innerHTML=incomePreviewHTML(); let ac=document.getElementById('actionContext'); if(ac)ac.innerHTML=actionContextHTML(); updateActivePanelButtons(); updateDoActionButton();\n}\nfunction drawBoardBase(ctx,cw,ch){\n const pal=boardThemePalette();\n eachCell((c,x,y)=>{let px=x*cw,py=y*ch; ctx.fillStyle=c.river?pal.river:pal.land; ctx.fillRect(px,py,cw,ch); if(c.river){ctx.fillStyle=pal.riverHi; ctx.fillRect(px+cw*.08,py+ch*.08,cw*.84,ch*.84);} if(c.shedu){ctx.fillStyle=pal.shedu;ctx.fillRect(px+cw*.12,py+ch*.12,cw*.76,ch*.76);} if(c.special){ctx.strokeStyle=pal.special;ctx.lineWidth=7;ctx.strokeRect(px+6,py+6,cw-12,ch-12);ctx.strokeStyle=pal.special2;ctx.lineWidth=2.5;ctx.strokeRect(px+12,py+12,cw-24,ch-24);} ctx.strokeStyle=pal.grid;ctx.lineWidth=1.5;ctx.strokeRect(px,py,cw,ch); if(G.settings.showCoords){ctx.fillStyle='rgba(40,28,15,.55)';ctx.fillRect(px+3,py+3,Math.min(cw*.42,34),Math.min(ch*.20,18)); ctx.fillStyle='#fff5cf';ctx.font='900 '+(ch*.13)+'px Georgia';ctx.fillText(coord(x,y),px+6,py+Math.min(ch*.16,16));} });\n ctx.strokeStyle=pal.riverLine;ctx.lineWidth=Math.min(cw,ch)*.28;ctx.lineCap='round';\n eachCell((c,x,y)=>{if(!c.river)return; let cx=x*cw+cw/2,cy=y*ch+ch/2; for(const [nx,ny] of neighbors(x,y)){if(nx<x||ny<y)continue; if(cell(nx,ny).river){ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(nx*cw+cw/2,ny*ch+ch/2);ctx.stroke();}}});\n}\nfunction drawEligibilityOverlay(ctx,cw,ch){if(!G||!G.settings.showLegal||G.players[G.turn].ai||pendingSupport||pendingWarOrder)return; let a=document.getElementById('action').value; if(!['tile','leader','cat','withdraw'].includes(a))return; eachCell((c,x,y)=>{let px=x*cw,py=y*ch; if(isEligibleForCurrentAction(x,y)){ctx.fillStyle='rgba(65,170,70,.22)';ctx.fillRect(px+3,py+3,cw-6,ch-6);} }); if(!isEligibleForCurrentAction(selected.x,selected.y)){ctx.fillStyle='rgba(190,45,35,.22)';ctx.fillRect(selected.x*cw+3,selected.y*ch+3,cw-6,ch-6);}}\nfunction drawRoundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}\nfunction drawSheduSiteLabel(ctx,c,px,py,cw,ch){\n ctx.save();\n ctx.fillStyle='rgba(85,60,31,.68)'; ctx.font='900 '+(ch*.17)+'px Georgia'; ctx.fillText(c.special?'Shedu\u2605':'Shedu',px+cw*.08,py+ch*.30);\n ctx.restore();\n}\nfunction drawTreasureStateMarker(ctx,c,px,py,cw,ch){\n // Every Shedu starting treasure site gets the same status ribbon regardless of whether the temple is still face-up, has become a monument/wonder base, or is gone.\n // Gold means the treasure is still physically on that site; grey means that starting-site treasure has already been taken/removed.\n if(!c.treasure && !c.shedu)return;\n let isHere=!!c.treasure, isShedu=!!c.shedu;\n ctx.save();\n let w=isShedu?cw*.70:cw*.50, h=isShedu?ch*.21:ch*.20, x=px+cw*.15, y=py+ch*.72;\n if(c.face||c.wonder||c.mon){w=cw*.74;h=ch*.23;x=px+cw*.13;y=py+ch*.64;}\n ctx.fillStyle=isHere?'#f7d75a':'rgba(231,224,202,.88)';\n ctx.strokeStyle=isHere?'#5d3d08':'#6d6252'; ctx.lineWidth=isHere?3:2;\n drawRoundRect(ctx,x,y,w,h,7); ctx.fill(); ctx.stroke();\n ctx.fillStyle=isHere?'#4b3006':'#5a5146';\n ctx.textAlign='center';\n ctx.font='900 '+(isShedu?ch*.078:ch*.105)+'px Georgia';\n ctx.fillText(isHere?'TREASURE':'TAKEN',x+w/2,y+h*.62);\n if(isShedu){ctx.font='900 '+(ch*.062)+'px Georgia'; ctx.fillText('START SITE',x+w/2,y+h*.92);}\n ctx.textAlign='left'; ctx.restore();\n}\nfunction drawCellContents(ctx,c,x,y,cw,ch){let px=x*cw,py=y*ch;\n if(c.shedu){drawSheduSiteLabel(ctx,c,px,py,cw,ch);}\n if(c.cat){ctx.fillStyle='#704126';drawRoundRect(ctx,px+8,py+8,cw-16,ch-16,8);ctx.fill();ctx.strokeStyle='#f6dfb0';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(px+cw*.30,py+ch*.30);ctx.lineTo(px+cw*.70,py+ch*.70);ctx.moveTo(px+cw*.70,py+ch*.30);ctx.lineTo(px+cw*.30,py+ch*.70);ctx.stroke();}\n if(c.face||c.wonder){ctx.fillStyle=c.wonder?'#cdbb82':'#9a8c73';drawRoundRect(ctx,px+9,py+9,cw-18,ch-18,8);ctx.fill();ctx.fillStyle='#3e3421';ctx.font='900 '+(ch*.16)+'px Georgia';ctx.fillText(c.wonder?'Wonder':'Monument base',px+cw*.11,py+ch*.55);}\n if(c.tile!==null&&!c.face&&!c.wonder){ctx.fillStyle=HEX[c.tile];drawRoundRect(ctx,px+10,py+10,cw-20,ch-20,9);ctx.fill();ctx.strokeStyle='#fff8';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=TEXTHEX[c.tile];ctx.font='900 '+(ch*.19)+'px Georgia';ctx.textAlign='center';ctx.fillText(TILE_SHORT[c.tile],px+cw*.50,py+ch*.55);ctx.textAlign='left';}\n if(c.union!==null){ctx.fillStyle='rgba(255,250,210,.92)';drawRoundRect(ctx,px+cw*.18,py+ch*.33,cw*.64,ch*.28,6);ctx.fill();ctx.strokeStyle='#5f3b16';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#4a2b10';ctx.font='900 '+(ch*.105)+'px Georgia';ctx.textAlign='center';ctx.fillText('UNIFY',px+cw*.50,py+ch*.51);ctx.textAlign='left';}\n if(c.monumentColors){ctx.fillStyle=HEX[c.monumentColors[0]];drawRoundRect(ctx,px+cw*.16,py+ch*.14,cw*.32,ch*.72,7);ctx.fill();ctx.fillStyle=HEX[c.monumentColors[1]];drawRoundRect(ctx,px+cw*.50,py+ch*.14,cw*.32,ch*.72,7);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(px+cw*.16,py+ch*.14,cw*.66,ch*.72);}\n if(c.building!==null){ctx.fillStyle='#fffbe8';drawRoundRect(ctx,px+cw*.55,py+ch*.07,cw*.40,ch*.22,5);ctx.fill();ctx.strokeStyle='#5c4322';ctx.stroke();ctx.fillStyle='#2b2117';ctx.font='900 '+(ch*.12)+'px Georgia';ctx.fillText(BUILDING[c.building].split(' ')[0],px+cw*.58,py+ch*.23);}\n if(c.shedu||c.treasure&&!c.shedu)drawTreasureStateMarker(ctx,c,px,py,cw,ch);\n if(c.leader){drawLeader(ctx,c.leader,px,py,cw,ch);}\n}\nfunction drawLeader(ctx,l,px,py,cw,ch){\n let r=Math.min(cw,ch)*.25, cx=px+cw*.50, cy=py+ch*.48;\n let ord=playerTurnOffset(l.p), playerBand=PLAYER_BAND[ord]||'#ffffff', owner=playerSigil(l.p), role=LEADER_SHORT[l.color].toUpperCase();\n ctx.save();ctx.translate(cx,cy);\n ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(0,ch*.14,r+16,r*.36,0,0,7);ctx.fill();\n ctx.fillStyle=playerBand;ctx.strokeStyle='#fff7d3';ctx.lineWidth=3.5;\n if(ord===0){ctx.beginPath();ctx.arc(0,0,r+14,0,7);ctx.fill();ctx.stroke();}\n else if(ord===1){drawRoundRect(ctx,-(r+14),-(r+14),(r+14)*2,(r+14)*2,10);ctx.fill();ctx.stroke();}\n else if(ord===2){ctx.beginPath();ctx.moveTo(0,-(r+16));ctx.lineTo(r+16,0);ctx.lineTo(0,r+16);ctx.lineTo(-(r+16),0);ctx.closePath();ctx.fill();ctx.stroke();}\n else {ctx.beginPath();for(let i=0;i<6;i++){let a=-Math.PI/2+i*Math.PI/3,rr=r+15,x=Math.cos(a)*rr,y=Math.sin(a)*rr;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.closePath();ctx.fill();ctx.stroke();}\n ctx.fillStyle=HEX[l.color];ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.fill();ctx.strokeStyle='#ffffff';ctx.lineWidth=2.5;ctx.stroke();\n ctx.textAlign='center';\n ctx.fillStyle=MARK_FILL[ord]||'#fff';ctx.font='900 '+(ch*.16)+'px Georgia';ctx.fillText(playerMark(l.p),0,-ch*.045);\n ctx.font='900 '+(ch*.095)+'px Georgia';ctx.fillText(LEADER_SHORT[l.color].slice(0,2).toUpperCase(),0,ch*.105);\n ctx.fillStyle='#fff7d1';drawRoundRect(ctx,-r*1.18,-r*1.34,r*2.36,ch*.16,5);ctx.fill();ctx.strokeStyle='rgba(60,35,12,.70)';ctx.lineWidth=1;ctx.stroke();\n ctx.fillStyle='#3a240f';ctx.font='900 '+(ch*.070)+'px Georgia';ctx.fillText(owner,0,-r*1.20+ch*.10);\n ctx.fillStyle='#fff7d1';drawRoundRect(ctx,-r*1.28,r*1.07,r*2.56,ch*.17,5);ctx.fill();ctx.stroke();\n ctx.fillStyle='#3a240f';ctx.font='900 '+(ch*.070)+'px Georgia';ctx.fillText(role,0,r*1.20+ch*.045);\n ctx.restore();ctx.textAlign='left';\n}\n          function statusHTML(){let p=G.players[G.turn]; let phase=G.players[G.turn].ai?'AI':'Turn'; return '<div class=\"tickerMain\"><b>'+playerMark(G.turn)+' '+esc(p.name)+'</b> \xB7 '+phase+' \xB7 A '+(3-G.actions)+'/2 \xB7 Selected '+coord(selected.x,selected.y)+'</div><div class=\"tickerSub\"><span class=\"seg\"><b>Hand</b> '+handText(0)+'</span><span class=\"seg\"><b>VP</b> '+vpText(0)+'</span><span class=\"seg\"><b>Treasure</b> '+G.players[0].treasures+'</span><span class=\"seg\"><b>Off board</b> '+yourOffBoardLeaders()+'</span></div>'; }\n\nfunction canDoSelectedAction(){if(!G||G.over||G.players[G.turn].ai||pendingSupport||pendingWarOrder)return false; let a=document.getElementById('action').value, color=+document.getElementById('color').value, x=selected.x,y=selected.y; if(a==='tile')return legalTile(G.turn,color,x,y); if(a==='leader')return legalLeader(G.turn,color,x,y); if(a==='withdraw'){let c=inside(x,y)&&cell(x,y);return !!(c&&c.leader&&c.leader.p===G.turn);} if(a==='cat'){return eligibilityReason(a,color,x,y).startsWith('Eligible');} if(a==='replaceAll')return G.players[G.turn].hand.reduce((s,n)=>s+n,0)>0; if(a==='recycleCustom'){let counts=getRecycleCounts(); return counts.reduce((s,n)=>s+n,0)>0 && counts.every((n,i)=>n<=G.players[G.turn].hand[i]);} return false;}\nfunction updateDoActionButton(){let b=document.getElementById('doActionBtn'); if(!b)return; let ok=canDoSelectedAction(); b.disabled=!ok; b.classList.toggle('disabled',!ok); b.textContent=ok?'Do selected action':'Choose valid action';}\nfunction statusHTML(){let p=G.players[G.turn]; let phase=G.players[G.turn].ai?'AI':'Turn'; return '<div class=\"tickerMain\"><b>'+playerMark(G.turn)+' '+esc(p.name)+'</b> \xB7 '+phase+' \xB7 A '+(3-G.actions)+'/2 \xB7 '+coord(selected.x,selected.y)+' \xB7 You: '+playerSymbolName(0)+'</div><div class=\"tickerSub\"><span class=\"seg\"><b>Hand</b> '+handText(0)+'</span><span class=\"seg\"><b>VP</b> '+vpText(0)+'</span><span class=\"seg\"><b>Tr</b> '+G.players[0].treasures+'</span><span class=\"seg\"><b>Off</b> '+yourOffBoardLeaders()+'</span></div>'; }\nfunction resizeCanvas(){let can=board, wrap=canvasWrap; if(!wrap||!can)return; let zoom=(G&&G.boardZoom)||1, horiz=document.body.classList.contains('horiz'); let safety=horiz?8:0; let availW=Math.max(180,wrap.clientWidth-safety), availH=Math.max(130,wrap.clientHeight-safety); let fit=Math.min(availW/W,availH/H); let cellSize=Math.max(8,Math.floor(fit)); let w=W*cellSize, h=H*cellSize; can.style.width=Math.max(1,Math.floor(w*zoom))+'px'; can.style.height=Math.max(1,Math.floor(h*zoom))+'px'; wrap.classList.toggle('zoomed',zoom>1.01); if(zoom<=1.01){wrap.scrollLeft=0;wrap.scrollTop=0;} else {setTimeout(()=>{wrap.scrollLeft=Math.max(0,(can.clientWidth-wrap.clientWidth)/2);wrap.scrollTop=Math.max(0,(can.clientHeight-wrap.clientHeight)/2);},0);}}\nwindow.addEventListener('load',populateSaveSelect);\n\n\n// v34 final UI/interaction overrides\nfunction setInitialScreenState(){\n  if(!G){document.body.classList.remove('playing','horiz'); let setup=document.getElementById('setup'), game=document.getElementById('game'); if(setup)setup.style.display='block'; if(game)game.style.display='none';}\n}\nsetInitialScreenState();\nfunction playerTurnOffset(p){if(!G||!G.players)return p; let st=Number.isFinite(G.startTurn)?G.startTurn:0; return (p-st+G.players.length)%G.players.length;}\nfunction playerMark(p){return MARK[playerTurnOffset(p)]||String(playerTurnOffset(p)+1);}\nfunction statusHTML(){\n  let p=G.players[G.turn], phase=G.players[G.turn].ai?'AI':'Turn', you=G.players[0];\n  return '<div class=\"tickerMain\"><b>'+playerMark(G.turn)+' '+esc(p.name)+'</b> \xB7 '+phase+' \xB7 A '+(3-G.actions)+'/2 \xB7 Selected '+coord(selected.x,selected.y)+' \xB7 You: '+playerMark(0)+' '+playerSymbolName(0)+'</div>'+\n    '<div class=\"tickerSub\"><span class=\"seg\"><b>Hand</b> '+handText(0)+'</span><span class=\"seg\"><b>VP</b> '+vpText(0)+'</span><span class=\"seg\"><b>Treasures</b> '+you.treasures+'</span><span class=\"seg\"><b>Off board</b> '+yourOffBoardLeaders()+'</span></div>';\n}\nfunction syncRecycleInputs(){\n  if(!G||!document.getElementById('rec0'))return;\n  let panel=document.getElementById('recyclePanel'), actionEl=document.getElementById('action');\n  if(panel)panel.classList.toggle('active', actionEl && actionEl.value==='recycleCustom');\n  for(let i=0;i<4;i++){\n    let el=document.getElementById('rec'+i); if(!el)continue;\n    let max=G.players[G.turn].hand[i]; el.max=max; el.disabled=max<=0;\n    if(+el.value>max)el.value=max; if(max<=0)el.value=0;\n    let slot=el.closest('.recSlot'); if(slot)slot.classList.toggle('empty', max<=0 && actionEl && actionEl.value==='recycleCustom');\n  }\n}\nfunction renderChoiceChips(){\n  let aSel=document.getElementById('action'), cSel=document.getElementById('color');\n  let aBox=document.getElementById('actionChips'), cBox=document.getElementById('colorChips');\n  if(aBox&&aSel){let opts=[['tile','Tile'],['leader','Leader'],['withdraw','Withdraw'],['cat','Catastrophe'],['recycleCustom','Recycle mix'],['replaceAll','Recycle all']]; aBox.innerHTML=opts.map(o=>'<button class=\"chipBtn '+(aSel.value===o[0]?'active':'')+'\" onclick=\"setActionChoice(\\''+o[0]+'\\');refreshEligibilityMessage();updateDoActionButton()\">'+o[1]+'</button>').join('');}\n  if(cBox&&cSel){cBox.innerHTML=CNAME.map((n,i)=>'<button class=\"chipBtn c'+i+' '+(+cSel.value===i?'active':'')+'\" onclick=\"setColorChoice('+i+');refreshEligibilityMessage();updateDoActionButton()\">'+SHORT[i]+'</button>').join('');}\n  syncRecycleInputs(); updateDoActionButton();\n}\nfunction updateDoActionButton(){let b=document.getElementById('doActionBtn'); if(!b)return; let ok=canDoSelectedAction(); b.disabled=!ok; b.classList.toggle('disabled',!ok); b.textContent=ok?'Do selected action':'Choose valid action';}\nfunction resizeCanvas(){\n  let can=board, wrap=canvasWrap; if(!wrap||!can)return;\n  let zoom=(G&&G.boardZoom)||1, horiz=document.body.classList.contains('horiz');\n  let availW=Math.max(180,wrap.clientWidth-(horiz?2:0)), availH=Math.max(130,wrap.clientHeight-(horiz?2:0));\n  // default fit should use almost the full viewport while preserving all 16x11 cells\n  let fit=Math.min(availW/W,availH/H);\n  let cellSize=Math.max(10,Math.floor(fit));\n  let w=W*cellSize, h=H*cellSize;\n  can.style.width=Math.max(1,Math.floor(w*zoom))+'px'; can.style.height=Math.max(1,Math.floor(h*zoom))+'px';\n  wrap.classList.toggle('zoomed',zoom>1.01);\n  if(zoom<=1.01){wrap.scrollLeft=0;wrap.scrollTop=0;} else {setTimeout(()=>{wrap.scrollLeft=Math.max(0,(can.clientWidth-wrap.clientWidth)/2);wrap.scrollTop=Math.max(0,(can.clientHeight-wrap.clientHeight)/2);},0);}\n}\nfunction centerBoard(){['controls','legend','log','menuPanel'].forEach(pid=>{let el=document.getElementById(pid); if(el)el.classList.add('collapsed');}); activePanel='board'; updateActivePanelButtons(); resetBoardZoom(); flash('Board centred.');}\nwindow.addEventListener('load',()=>{setInitialScreenState(); populateSaveSelect();});\n\n\n\n// v35 actual requested polish: guarded undo, disabled-action reasons, conflict review, AI intent, save deletion, help, themes\n(function(){\n  let undoLockReason='';\n  function ensureConflictReview(){\n    let el=document.getElementById('conflictReview');\n    if(el)return el;\n    el=document.createElement('div'); el.id='conflictReview';\n    el.innerHTML='<div class=\"reviewCard\"><h2 id=\"conflictReviewTitle\">Conflict resolved</h2><div id=\"conflictReviewBody\" class=\"reviewBody\"></div><div class=\"reviewFooter\"><button onclick=\"closeConflictReview()\">Continue</button></div></div>';\n    document.body.appendChild(el); return el;\n  }\n  window.closeConflictReview=function(){let el=document.getElementById('conflictReview'); if(el)el.style.display='none';};\n  window.showConflictResult=function(kind,humanInvolved,lines){\n    let el=ensureConflictReview();\n    document.getElementById('conflictReviewTitle').textContent=kind+' resolved';\n    document.getElementById('conflictReviewBody').innerHTML=(lines||[]).map(s=>'<div class=\"line\">'+colorizeText(esc(s))+'</div>').join('') || '<div class=\"line\">Conflict resolved.</div>';\n    el.style.display='flex';\n    flash((lines&&lines[0])?lines[0]:kind+' resolved.');\n  };\n  function wouldStartRevolt(p,color,x,y){\n    if(!inside(x,y)||!legalLeader(p,color,x,y))return false;\n    let c=cell(x,y), old=c.leader; c.leader={p,color};\n    let co=compAt(x,y), yes=!!(co&&co.leaders.filter(l=>l.color===color).length>1);\n    c.leader=old; return yes;\n  }\n  function irreversibleReason(a,color,x,y){\n    if(a==='recycleCustom'||a==='replaceAll')return 'Undo unavailable after recycling because hidden tiles are drawn/removed.';\n    if(a==='cat')return 'Undo unavailable after a catastrophe because it permanently changes the board.';\n    if(a==='tile'&&inside(x,y)&&legalTile(G.turn,color,x,y)&&neighborKingdomCount(x,y)===2)return 'Undo unavailable after a unification/war check begins.';\n    if(a==='leader'&&wouldStartRevolt(G.turn,color,x,y))return 'Undo unavailable after a revolt begins.';\n    return '';\n  }\n  window.undoLastAction=function(){\n    if(undoLockReason){flash(undoLockReason); return;}\n    if(!preActionSnapshot){flash('Nothing safe to undo from the current turn.');return;}\n    if(pendingSupport||pendingWarOrder||G.players[G.turn].ai){flash('Cannot undo during conflict resolution or an AI turn.');return;}\n    if(!confirm('Undo your last reversible action?'))return;\n    G=JSON.parse(preActionSnapshot); preActionSnapshot=null; normalizeSettings(); applyTheme(); flash('Last reversible action undone.'); render(); autoSave('undo');\n  };\n  const baseEndTurn=endTurn;\n  window.endTurn=function(){preActionSnapshot=null; undoLockReason='Undo unavailable after end-turn scoring/refill.'; baseEndTurn();};\n  window.doHumanAction=async function(){\n    if(G.over||G.players[G.turn].ai||pendingSupport||pendingWarOrder)return;\n    let p=G.turn, a=document.getElementById('action').value, color=+document.getElementById('color').value, x=selected.x, y=selected.y;\n    if(!canDoSelectedAction()){flash('Cannot do that yet: '+eligibilityReason(a,color,x,y)); refreshEligibilityMessage(); return;}\n    let irreversible=irreversibleReason(a,color,x,y);\n    preActionSnapshot=irreversible?'':JSON.stringify(G);\n    undoLockReason='';\n    let imp=impactfulMoveText(a,color,x,y);\n    if(G.settings.confirmImpact&&imp&&!confirm('Confirm impactful move:\\n\\n'+imp+'\\n\\nContinue?')){flash('Move cancelled.');preActionSnapshot=null;return;}\n    let err=null;\n    if(a==='tile')err=await placeTile(p,color,x,y);\n    else if(a==='leader')err=await placeLeader(p,color,x,y);\n    else if(a==='withdraw'){let c=cell(x,y); if(c.leader&&c.leader.p===p){removeLeader(x,y); log('You withdrew a leader.'); spendAction();} else err='Select one of your leaders.';}\n    else if(a==='cat')err=playCat(p,x,y);\n    else if(a==='recycleCustom')err=replaceCustom(p,getRecycleCounts());\n    else if(a==='replaceAll')err=replaceTiles(p,color,true);\n    if(err){preActionSnapshot=null; undoLockReason=''; flash(err+' '+eligibilityText());}\n    else if(irreversible){preActionSnapshot=null; undoLockReason=irreversible;}\n    render(); autoSave('after action');\n  };\n  const baseUpdateDoActionButton=updateDoActionButton;\n  window.updateDoActionButton=function(){\n    baseUpdateDoActionButton();\n    let box=document.getElementById('actionContext'); if(!box||!G)return;\n    let a=document.getElementById('action').value, color=+document.getElementById('color').value, reason=eligibilityReason(a,color,selected.x,selected.y);\n    let ok=canDoSelectedAction();\n    if(!ok&&!G.players[G.turn].ai&&!pendingSupport&&!pendingWarOrder){\n      let why=document.getElementById('whyDisabled');\n      if(!why){why=document.createElement('div');why.id='whyDisabled';why.className='whyBox';box.parentNode.insertBefore(why,box.nextSibling);}\n      why.innerHTML='<b>Why unavailable:</b> '+colorizeText(esc(reason)); why.style.display='block';\n    } else {let why=document.getElementById('whyDisabled'); if(why)why.style.display='none';}\n  };\n  window.refreshEligibilityMessage=function(){let p=document.getElementById('previewBox'); if(p)p.innerHTML=actionPreviewHTML(); let c=document.getElementById('actionContext'); if(c)c.innerHTML=actionContextHTML(); renderChoiceChips(); updateDoActionButton();};\n  function aiIntent(m,p){\n    let lvl=G.aiLevel||'regular';\n    if(!m)return G.players[p].name+' plans to recycle because no stronger move is apparent.';\n    let prefix='AI intent ('+lvl+'): '+G.players[p].name+' ';\n    if(m.t==='tile')return prefix+(lvl==='hard'?'presses the strongest board/scoring opportunity':'looks for balanced scoring')+' with '+CNAME[m.c]+' '+TILE[m.c]+' at '+coord(m.x,m.y)+'.';\n    if(m.t==='leader')return prefix+(lvl==='easy'?'develops a leader position':'improves leader presence and scoring access')+' with '+CNAME[m.c]+' '+LEADER[m.c]+' at '+coord(m.x,m.y)+'.';\n    if(m.t==='cat')return prefix+'uses a catastrophe to disrupt a threat at '+coord(m.x,m.y)+'.';\n    if(m.t==='recycle')return prefix+'recycles weak hand colours to improve future options.';\n    return prefix+'chooses a move.';\n  }\n  window.runAiStep=function(p,step){\n    if(G.over||G.turn!==p){aiBusy=false; return;}\n    if(step>=2){flash(G.players[p].name+' ends the turn.'); aiBusy=false; setTimeout(()=>endTurn(),AI_PACE.end); return;}\n    let move=chooseAiMove(p); if(!move){move={t:'recycle',counts:recyclePlan(p).counts,v:0};}\n    if(move.x!==undefined)selected={x:move.x,y:move.y};\n    try{render();}catch(e){console.error('render before AI step failed',e);}\n    log(aiIntent(move,p));\n    let dest=(move.x