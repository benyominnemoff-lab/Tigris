dvh!important;margin:0!important;border-radius:18px 18px 0 0!important;padding:14px 16px!important;box-sizing:border-box!important;}\n  #tutorialBox h2{font-size:20px!important;margin:0 0 8px!important;}\n  #tutorialBox h3{font-size:14px!important;margin:10px 0 3px!important;}\n  #tutorialBox p{font-size:12.5px!important;line-height:1.22!important;margin:0 0 5px!important;}\n  #tutorialBox button{width:auto!important;min-width:120px!important;min-height:36px!important;padding:7px 13px!important;}\n  body.horiz #tutorialBox .tutorialCard{width:min(900px,62vw)!important;max-height:64dvh!important;}\n  body.horiz #tutorialBox .reminderGrid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:6px 16px!important;}\n  body.horiz #tutorialBox .reminderGrid h3{margin-top:5px!important;}\n  #v38SaveDangerRow{display:grid!important;grid-template-columns:1fr 1fr!important;gap:10px!important;margin-top:12px!important;align-items:stretch!important;}\n  #v38SaveDangerRow button{width:100%!important;max-width:none!important;margin:0!important;min-height:42px!important;font-size:13px!important;}\n  #saveDeleteBtn{width:100%!important;max-width:none!important;margin:0!important;}\n  #v35ThemeButtons{display:grid!important;grid-template-columns:1fr 1fr 1fr!important;gap:10px!important;margin:10px 0!important;}\n  #v35ThemeButtons button{width:100%!important;min-height:38px!important;max-width:none!important;font-size:12px!important;}\n  #v35ThemeButtons button:nth-child(1){background:linear-gradient(180deg,#a66b2c,#7d4617)!important;color:#fff!important;}\n  #v35ThemeButtons button:nth-child(2){background:linear-gradient(180deg,#8b7c5f,#5e5039)!important;color:#fff!important;}\n  #v35ThemeButtons button:nth-child(3){background:linear-gradient(180deg,#191919,#000)!important;color:#fff!important;border-color:#ffd84d!important;}\n  #menuPanel .helpLink{width:auto!important;max-width:52%!important;min-height:38px!important;font-size:12px!important;display:inline-block!important;}\n  #canvasWrap.zoomed{overflow:auto!important;-webkit-overflow-scrolling:touch!important;touch-action:none!important;padding:28vh 28vw!important;box-sizing:border-box!important;align-items:flex-start!important;justify-content:flex-start!important;}\n  #canvasWrap.zoomed canvas{flex:0 0 auto!important;}\n  body.horiz #canvasWrap.zoomed{padding:28vh 22vw!important;}\n  .ownerChip,.pill.ownerChip{border:2px solid rgba(40,20,4,.42)!important;}\n  #v38Modal{position:fixed;inset:0;z-index:5200;display:none;align-items:flex-end;justify-content:center;background:rgba(30,18,8,.42);padding:0 12px max(12px,env(safe-area-inset-bottom));box-sizing:border-box;}\n  #v38Modal .modalCard{width:min(720px,96vw);max-height:56dvh;overflow:auto;border-radius:18px 18px 0 0;background:linear-gradient(180deg,#fff8e6,#efd494);border:2px solid #8a5a22;box-shadow:0 -12px 32px #0007;color:#2d1c0d;padding:14px;box-sizing:border-box;font-family:var(--head);}\n  #v38Modal h2{font-size:19px;margin:0 0 8px;font-family:var(--display);}\n  #v38Modal .modalBody{font-size:14px;line-height:1.32;white-space:pre-wrap;}\n  #v38Modal input{width:100%;box-sizing:border-box;padding:10px;border:1px solid #b78a3d;border-radius:10px;font-size:16px;margin:8px 0;background:#fffdf4;color:#23170d;}\n  #v38Modal .modalBtns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}\n  #v38Modal .modalBtns button{min-width:105px;min-height:38px;width:auto!important;}\n\n\n  /* v39 rule reminder library */\n  .setupActionRow{display:grid!important;grid-template-columns:1fr 1fr!important;gap:10px!important;align-items:stretch!important;}\n  .setupActionRow button{width:100%!important;}\n  #tutorialBox{z-index:5300!important;background:rgba(31,18,7,.42)!important;box-sizing:border-box!important;}\n  body:not(.playing) #tutorialBox{align-items:center!important;justify-content:center!important;padding:calc(16px + env(safe-area-inset-top,0px)) 12px calc(16px + env(safe-area-inset-bottom,0px))!important;}\n  body.playing #tutorialBox{align-items:flex-end!important;justify-content:center!important;padding:0 12px max(10px,env(safe-area-inset-bottom))!important;}\n  #tutorialBox .tutorialCard.ruleLibrary{display:flex!important;flex-direction:column!important;box-sizing:border-box!important;background:linear-gradient(180deg,#fff8e6,#efd696)!important;border:2px solid #8a5a22!important;box-shadow:0 -12px 32px #0008!important;color:#2d1c0d!important;overflow:hidden!important;}\n  body:not(.playing) #tutorialBox .tutorialCard.ruleLibrary{width:min(860px,96vw)!important;height:min(92dvh,880px)!important;max-height:92dvh!important;border-radius:20px!important;margin:0!important;}\n  body.playing:not(.horiz) #tutorialBox .tutorialCard.ruleLibrary{width:min(820px,96vw)!important;max-height:66dvh!important;border-radius:20px 20px 0 0!important;margin:0!important;}\n  body.horiz #tutorialBox .tutorialCard.ruleLibrary{width:min(980px,68vw)!important;max-height:70dvh!important;border-radius:18px 18px 0 0!important;margin:0!important;}\n  .ruleLibHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px 8px;border-bottom:1px solid rgba(139,90,34,.35);background:linear-gradient(180deg,#fff7dd,#f5dda2);}\n  .ruleLibHead h2{margin:0!important;font-size:18px!important;line-height:1.1!important;font-family:var(--display)!important;}\n  .ruleLibHead button{width:auto!important;min-width:82px!important;min-height:32px!important;font-size:11px!important;padding:5px 10px!important;margin:0!important;}\n  .ruleTabs{display:flex;gap:6px;overflow-x:auto;white-space:nowrap;padding:8px 12px;border-bottom:1px solid rgba(139,90,34,.25);background:#fff1c6;scrollbar-width:thin;}\n  .ruleTabs button{width:auto!important;min-width:auto!important;min-height:30px!important;margin:0!important;padding:5px 9px!important;border-radius:999px!important;font-size:10.5px!important;background:#fff8e8!important;color:#3b2411!important;border:1px solid #ba8a36!important;box-shadow:none!important;}\n  .ruleTabs button.active{background:linear-gradient(180deg,#9a642b,#744315)!important;color:#fff!important;border-color:#56300f!important;}\n  .ruleContent{overflow:auto!important;-webkit-overflow-scrolling:touch!important;padding:10px 14px 14px!important;flex:1!important;}\n  .ruleSection{padding:2px 0 14px;margin:0 0 10px;border-bottom:1px solid rgba(139,90,34,.22);scroll-margin-top:8px;}\n  .ruleSection h3{font-size:16px!important;margin:0 0 8px!important;color:#4b2b10!important;line-height:1.1!important;font-family:var(--display)!important;}\n  .ruleColumns{display:grid;grid-template-columns:1fr;gap:8px;}\n  body.horiz .ruleColumns{grid-template-columns:1fr 1fr!important;gap:12px!important;}\n  body:not(.playing) .ruleColumns{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))!important;gap:12px!important;}\n  .ruleBox{background:rgba(255,250,235,.72);border:1px solid rgba(190,145,70,.45);border-radius:13px;padding:9px 10px;}\n  .ruleBox b{display:block;font-size:12.5px;margin:0 0 5px;color:#5d3511;}\n  .ruleBox ul{margin:0;padding-left:17px;}\n  .ruleBox li{font-size:12.4px!important;line-height:1.25!important;margin:0 0 4px!important;}\n  body.horiz .ruleBox li{font-size:11.8px!important;line-height:1.18!important;}\n  .ruleHint{font-size:11px;color:#67451d;margin:4px 0 0;opacity:.86;}\n</style>\n</resources>\nEOF\ncat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'\n<vector xmlns:android=\"http://schemas.android.com/apk/res/android\" android:width=\"108dp\" android:height=\"108dp\" android:viewportWidth=\"108\" android:viewportHeight=\"108\">\n    <path android:fillColor=\"#3f2917\" android:pathData=\"M8,8h92a8,8 0,0 1,8 8v76a8,8 0,0 1,-8 8H8a8,8 0,0 1,-8 -8V16a8,8 0,0 1,8 -8z\"/>\n    <path android:strokeColor=\"#d7b354\" android:strokeWidth=\"4\" android:fillColor=\"#00000000\" android:pathData=\"M10,10h88a6,6 0,0 1,6 6v76a6,6 0,0 1,-6 6H10a6,6 0,0 1,-6 -6V16a6,6 0,0 1,6 -6z\"/>\n    <path android:strokeColor=\"#67a9d9\" android:strokeWidth=\"10\" android:strokeLineCap=\"round\" android:fillColor=\"#00000000\" android:pathData=\"M25,14 C35,24 24,36 35,49 C45,61 31,73 43,91\"/>\n    <path android:strokeColor=\"#67a9d9\" android:strokeWidth=\"10\" android:strokeLineCap=\"round\" android:fillColor=\"#00000000\" android:pathData=\"M83,14 C72,29 88,41 74,55 C61,68 82,78 69,94\"/>\n    <path android:fillColor=\"#d7b354\" android:pathData=\"M30,72h48v12h-48z M36,58h36v14h-36z M43,45h22v13h-22z M54,27l14,18h-28z\"/>\n    <path android:strokeColor=\"#5b3a17\" android:strokeWidth=\"2\" android:fillColor=\"#00000000\" android:pathData=\"M30,72h48v12h-48z M36,58h36v14h-36z M43,45h22v13h-22z M54,27l14,18h-28z\"/>\n</vector>\nEOF\ncat > app/src/main/java/com/auroranem/kings/MainActivity.java <<'EOF'\npackage com.auroranem.kings;\n\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.content.pm.ActivityInfo;\nimport android.graphics.Color;\nimport android.webkit.JavascriptInterface;\nimport android.webkit.WebChromeClient;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;\nimport android.webkit.WebViewClient;\n\npublic class MainActivity extends Activity {\n    private WebView webView;\n    @Override public void onCreate(Bundle b) {\n        super.onCreate(b);\n        getWindow().setStatusBarColor(Color.rgb(63,41,23));\n        getWindow().setNavigationBarColor(Color.rgb(63,41,23));\n        webView = new WebView(this);\n        WebSettings s = webView.getSettings();\n        s.setJavaScriptEnabled(true);\n        s.setDomStorageEnabled(true);\n        s.setBuiltInZoomControls(false);\n        s.setDisplayZoomControls(false);\n        webView.setWebChromeClient(new WebChromeClient());\n        webView.setWebViewClient(new WebViewClient());\n        webView.addJavascriptInterface(new AndroidBridge(), \"AndroidBridge\");\n        setContentView(webView);\n        webView.loadUrl(\"file:///android_asset/index.html\");\n    }\n    public class AndroidBridge {\n        @JavascriptInterface public void setOrientation(final String mode) {\n            runOnUiThread(new Runnable() {\n                @Override public void run() {\n                    if (\"landscape\".equals(mode) || \"sensorLandscape\".equals(mode)) {\n                        // Force an immediate landscape rotation, then allow either landscape direction.\n                        setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);\n                        webView.postDelayed(new Runnable() { @Override public void run() {\n                            setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);\n                        }}, 650);\n                    } else if (\"portrait\".equals(mode) || \"sensorPortrait\".equals(mode)) {\n                        // Force an immediate portrait return, then allow either portrait direction.\n                        setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);\n                        webView.postDelayed(new Runnable() { @Override public void run() {\n                            setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_PORTRAIT);\n                        }}, 650);\n                    } else {\n                        setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_UNSPECIFIED);\n                    }\n                }\n            });\n        }\n    }\n    @Override public void onBackPressed() {\n        if (webView != null && webView.canGoBack()) webView.goBack();\n        else super.onBackPressed();\n    }\n}\n\nEOF\ncat > app/src/main/assets/index.html <<'EOF'\n<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\" />\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no\" />\n<title>Kings of the Two Rivers</title>\n<style>\n  :root{--bg:#efe1bc;--ink:#21160e;--panel:#fff6df;--line:#8d6d3e;--accent:#765126;--gold:#d7b354;--display:'Papyrus','Herculanum','Copperplate','Cinzel Decorative','Trajan