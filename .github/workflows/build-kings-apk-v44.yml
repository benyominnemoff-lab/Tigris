tAiIfNeeded(120);\n    }\n  }\n  window.showTurnOrderPopup=v41ShowOrder;\n  try{showTurnOrderPopup=window.showTurnOrderPopup;}catch(e){}\n\n  const v41PreviousStart=window.startGame||startGame;\n  window.startGame=function(){\n    let callbacks=[];\n    let suppress=function(cb){\n      if(cb)callbacks.push(cb);\n      if(G){G.awaitingOrder=false; G.v40OrderDismissed=true; G.v41OrderDismissed=false;}\n    };\n    try{window.showTurnOrderPopup=suppress; showTurnOrderPopup=suppress;}catch(e){}\n    try{v41PreviousStart();}catch(e){console.error('startGame failed',e); throw e;}\n    try{window.showTurnOrderPopup=v41ShowOrder; showTurnOrderPopup=v41ShowOrder;}catch(e){}\n    if(!G||!G.players)return;\n    G.awaitingOrder=true; G.v40OrderDismissed=true; G.v41OrderDismissed=false;\n    // If any older wrapper left its order modal visible, hide it so only one reliable sheet is used.\n    try{let old=document.getElementById('turnOrderModal'); if(old)old.style.display='none';}catch(e){}\n    v41ShowOrder(function(){\n      if(callbacks.length){\n        callbacks.forEach(function(cb){try{cb();}catch(e){console.error(e);}});\n      }else{\n        try{flash('Game ready. Starting player: '+G.players[G.turn].name+' ('+playerMark(G.turn)+').'); autoSave('game start');}catch(e){}\n      }\n    });\n  };\n  try{startGame=window.startGame;}catch(e){}\n\n  const v41PreviousContinue=window.continueSavedMatch||continueSavedMatch;\n  window.continueSavedMatch=function(){\n    try{v41PreviousContinue();}catch(e){console.error('continueSavedMatch failed',e); throw e;}\n    if(G){G.awaitingOrder=false; G.v41OrderDismissed=true; G.v40OrderDismissed=true;}\n    v41StartAiIfNeeded(250);\n    v41StartAiIfNeeded(900);\n  };\n  try{continueSavedMatch=window.continueSavedMatch;}catch(e){}\n\n  // Avoid older delayed kickers being blocked forever by a stale order flag.\n  window.v41StartAiIfNeeded=v41StartAiIfNeeded;\n})();\n\n\n\n\n// v42: structural startup gate, reminder sheet fixes, info bubb