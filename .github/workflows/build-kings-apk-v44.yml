laced so they unite kingdoms.','Place, move, and withdraw a leader are all leader actions.'],b:'Temple dependence',r:['If a leader loses its last adjacent face-up temple, it withdraws immediately.','A single temple can support multiple leaders in a revolt.','Leader placement can cause revolts, but never wars.']},\n      {id:'tiles',t:'Tiles',a:'Placement rules',l:['Blue farms must be placed on river spaces.','Black settlements, red temples, and green markets must be placed on land.','A tile may be isolated, adjacent to a region, or added to a kingdom.','A tile cannot unite more than two kingdoms.'],b:'Linking tiles',r:['A tile that unites two kingdoms gets covered by the unification marker while wars are checked.','The linking tile never gives placement VP, even if no war happens.','Tile placement can cause wars, but never revolts.']},\n      {id:'scoring',t:'VP / scoring',a:'Tile scoring',l:['A placed tile scores if the kingdom contains a matching leader.','If no matching leader exists but a king is present, the king scores.','No VP is gained if the tile is outside a kingdom.','No VP is gained from a linking tile.'],b:'Income',r:['Buildings can increase matching tile-placement rewards only.','Monument income is paid at the end of the active player\u2019s turn.','A king scores from a black monument only, not from other monument colours.']},\n      {id:'revolts',t:'Revolts',a:'How they start',l:['A revolt happens when a leader is placed/moved into a kingdom with a like-coloured leader.','The newly placed/moved leader is the attacker.','The existing like-coloured leader is the defender.'],b:'Resolution',r:['Count face-up temples adjacent to each conflicting leader.','Attacker commits red temples first; defender commits second.','Defender wins ties.','Winner gains exactly 1 red VP/amulet.']},\n      {id:'wars',t:'Wars',a:'Conflict order',l:['Wars happen when a tile unites two kingdoms and the new kingdom has like-coloured leaders.','If several colours conflict, the active player chooses which colour resolves first.','After each war, re-check the current board; later conflicts may disappear.'],b:'Attacker and rewards',r:['If the active player is involved in the chosen war, they are attacker.','Otherwise, the next involved player clockwise is attacker.','Count connected same-colour supporters on each side of the unification tile.','Defender wins ties; loser removes leader and supporters.']},\n      {id:'treasures',t:'Treasures',a:'Collection',l:['If a kingdom has more than one treasure and a trader, that trader takes all but one.','Outlined Shedu treasures must be taken first.','If no trader is in the kingdom, treasures stay where they are.'],b:'Scoring and end game',r:['Treasures are wild VP only at final scoring.','Uncollected board treasures are not automatically awarded.','The game can end with one or two treasures still on the board.']},\n      {id:'catastrophes',t:'Catastrophes',a:'Placement',l:['A catastrophe may be placed on an empty space or on an existing tile.','It cannot be placed on a leader.','It cannot be placed on a treasure, monument/wonder, or building-protected tile.'],b:'Effects',r:['The space is permanently blocked.','It can split regions and kingdoms.','If it removes a temple, leaders with no remaining adjacent temple withdraw.']},\n      {id:'monuments',t:'Monuments',a:'Building',l:['A newly completed 2\xD72 square of one colour may be flipped to build a matching monument.','Building is optional.','It can only be built at the end of the action that completed the square.'],b:'After building',r:['Facedown base tiles still link regions and kingdoms.','Facedown bases do not count as conflict supporters.','Treasures on flipped temples remain on the facedown tile.','Leaders losing temple adjacency withdraw.']},\n      {id:'buildings',t:'Buildings',a:'Optional module',l:['A straight line of 3+ same-colour tiles can receive the matching building.','A building can move only to a longer eligible line.','Buildings must 