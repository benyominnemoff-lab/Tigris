;const river=new Set(def.river.map(p=>key(p[0],p[1]))),shedu=new Set(def.shedu.map(p=>key(p[0],p[1]))),special=new Set(def.special.map(p=>key(p[0],p[1])));for(let y=0;y<H;y++){G.board[y]=[];for(let x=0;x<W;x++)G.board[y][x]={river:river.has(key(x,y)),shedu:shedu.has(key(x,y)),special:special.has(key(x,y)),tile:null,face:false,wonder:false,cat:false,leader:null,treasure:false,mon:null,building:null,union:null}}for(const pt of def.shedu){let c=cell(pt[0],pt[1]);c.tile=RED;c.treasure=true;G.bag[RED]--}let symOrder=[chosenSymbol].concat(SYMBOL_OPTIONS.filter(s=>s!==chosenSymbol));for(let i=0;i<1+aiCount;i++){let sym=symOrder[i];G.players.push({name:i?'AI '+SYMBOL_NAMES[sym]:'You',ai:i>0,symbol:sym,symbolName:SYMBOL_NAMES[sym],vp:[0,0,0,0],treasures:0,hand:[0,0,0,0],cat:2,leaders:[null,null,null,null]})}for(let p=0;p<G.players.length;p++)drawTo(p,6);normalizeSettings();G.turn=Math.floor(Math.random()*G.players.length);G.startTurn=G.turn;G.actions=2;aiBusy=false}\nfunction orderPlayerAt(i){let st=Number.isFinite(G&&G.startTurn)?G.startTurn:(G?G.turn||0:0);return(st+i)%G.players.length}function orderRowsHtml(){let out='';for(let i=0;i<G.players.length;i++){let p=orderPlayerAt(i),pl=G.players[p],sym=playerSymbolName(p),shape=V44_SHAPES[i]||'frame';out+='<div class=\"v44OrderRow p'+i+'\"><span class=\"num\">'+(MARK[i]||i+1)+'</span><span><span class=\"main\">'+v44Esc(pl.ai?pl.name:'You')+'</span><span class=\"sub\">'+v44Esc(sym)+' \xB7 '+v44Esc(shape)+' outline</span></span></div>'}return out}\nfunction showTurnOrderV44(){G.startupPhase='turnOrder';G.awaitingOrder=true;aiBusy=false;let el=ensureSheet('v44OrderSheet');el.style.display='flex';el.innerHTML='<div class=\"v44Card\"><h2>Turn order</h2><div class=\"v44OrderRows\">'+orderRowsHtml()+'</div><div class=\"v44Btns\" style=\"grid-template-columns:1fr\"><button id=\"v44BeginBtn\">Begin match</button></div></div>';document.getElementById('v44BeginBtn').onclick=function(){closeSheet('v44OrderSheet');G.startupPhase=null;G.awaitingOrder=false;G.awaitingReview=false;aiBusy=false;flash('Starting player: '+G.players[G.turn].name+' ('+playerMark(G.turn)+').');log('MATCH BEGINS: '+G.players[G.turn].name+' starts.');autoSave('game start');render();maybeRunAiV44('begin',250,true)}}\nfunction startGameV44(){try{makeGameStateV44()}catch(e){console.error(e);return}document.body.classList.add('playing');document.body.classList.remove('boardFocus');let setup=document.getElementById('setup'),game=document.getElementById('game');if(setup)setup.style.display='none';if(game)game.style.display='flex';activePanel='controls';try{applyTheme()}catch(e){}try{applyGameLayout()}catch(e){}try{setActivePanel('controls')}catch(e){}try{resizeCanvas();log('Game started on '+(G.settings.advanced?'advanced':'standard')+' board.');log('Turn order:\\n'+turnOrderText());log('AI level: '+G.aiLevel+'. Enabled toggles: '+optionSummary()+'.');render()}catch(e){console.error(e)}setTimeout(showTurnOrderV44,80)}\nfunction continueSavedMatchV44(){let sel=document.getElementById('saveSelect');if(!sel||!sel.value){showSheet('v44Notice','No save selected','<p>Choose a saved match first.</p>','<button onclick=\"document.getElementById(\\'v44Notice\\').style.display=\\'none\\'\">OK</button>');return}let s=getSaves().find(x=>x.id===sel.value);if(!s){populateSaveSelect();return}try{G=typeof s.g==='string'?JSON.parse(s.g):s.g}catch(e){showSheet('v44Notice','Could not read save','<p>That saved match could not be loaded.</p>','<button onclick=\"document.getElementById(\\'v44Notice\\').style.display=\\'none\\'\">OK</button>');return}normalizeSettings();if(!Number.isFinite(G.startTurn))G.startTurn=G.turn||0;G.startupPhase=null;G.awaitingOrder=false;G.awaitingReview=false;aiBusy=false;document.body.classList.add('playing');document.body.classList.remove('boardFocus');let setup=document.getElementById('setup'),game=document.getElementById('game');if(setup)setup.style.display='none';if(game)game.style.display='flex';activePanel='controls';try{applyGameLayout();setActivePanel('controls');resizeCanvas();render()}catch(e){}flash('Loaded saved match.');log('CONTINUED SAVED MATCH: '+formatSaveTitle(s));maybeRunAiV44('continue',300,true)}\nfunction firstLegalAiMove(p){let best=null,bestV=-1e9;for(let c=0;c<4;c++)if(G.players[p].hand[c]>0){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalTile(p,c,x,y)){let v=0;try{v=evaluateTileMove(p,c,x,y)}catch(e){}if(v>bestV){bestV=v;best={t:'tile',c,x,y,v}}}}if(best)return best;for(let c=0;c<4;c++)for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(legalLeader(p,c,x,y))return{t:'leader',c,x,y,v:1};if(G.players[p].cat>0){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(!playCatCheck(p,x,y))return{t:'cat',x,y,v:.5}}let counts=G.players[p].hand.map(n=>n?1:0);if(counts.reduce((a,b)=>a+b,0)<=0)counts=G.players[p].hand.slice();return{t:'recycle',counts,v:0}}\nfunction validateAiMove(p,m){try{if(m&&m.t==='tile'&&legalTile(p,m.c,m.x,m.y))return m;if(m&&m.t==='leader'&&legalLeader(p,m.c,m.x,m.y))return m;if(m&&m.t==='cat'&&!playCatCheck(p,m.x,m.y))return m;if(m&&m.t==='recycle'&&m.counts&&m.counts.reduce((a,b)=>a+b,0)>0&&m.counts.every((n,i)=>n<=G.players[p].hand[i]))return m}catch(e){}return null}\nfunction maybeRunAiV44(src,delay,unstick){setTimeout(function(){try{if(!G||G.over||!G.players||!G.players[G.turn]||!G.players[G.turn].ai)return;if(G.startupPhase||G.awaitingOrder||G.awaitingReview||pendingSupport||pendingWarOrder)return;if(unstick)aiBusy=false;if(!aiBusy)aiTurnV44()}catch(e){console.error('v44 AI run failed',src,e)}},delay==null?120:delay)}function waitReviewThen(cb){if(G&&G.awaitingReview)setTimeout(()=>waitReviewThen(cb),200);else cb()}\nfunction aiTurnV44(){if(!G||G.over||!G.players[G.turn].ai||aiBusy)return;let p=G.turn;aiBusy=true;log('AI turn behaviour: '+G.players[p].name+' will take up to two actions, prioritising legal scoring, leader presence, disruption, then recycling.');flash(G.players[p].name+' is thinking.');aiStepV44(p,0)}\nfunction aiStepV44(p,step){if(!G||G.over||G.turn!==p){aiBusy=false;return}if(G.awaitingReview||G.awaitingOrder||pendingSupport||pendingWarOrder){setTimeout(()=>aiStepV44(p,step),250);return}if(step>=2){flash(G.players[p].name+' ends the turn.');aiBusy=false;setTimeout(()=>endTurn(),AI_PACE.end);return}let move=null;try{move=validateAiMove(p,chooseAiMove(p))}catch(e){move=null}if(!move)move=firstLegalAiMove(p);if(move.x!==undefined&&move.y!==undefined)selected={x:move.x,y:move.y};try{render()}catch(e){}try{log(aiIntent(move,p))}catch(e){}setTimeout(async function(){try{if(move.t==='tile')await placeTileAi(p,move.c,move.x,move.y);else if(move.t==='leader')await placeLeaderAi(p,move.c,move.x,move.y);else if(move.t==='cat')playCatAi(p,move.x,move.y);else if(move.t==='recycle')replaceCustomAi(p,move.counts)}catch(e){console.error('v44 AI step failed',e);log(G.players[p].name+' could not complete a planned move and recycles instead.');try{replaceCustomAi(p,G.players[p].hand.map(n=>n?1:0))}catch(_){}}try{render()}catch(e){}waitReviewThen(()=>setTimeout(()=>aiStepV44(p,step+1),AI_PACE.between))},AI_PACE.plan)}\nwindow.showConflictResult=function(kind,humanInvolved,lines){if(!G)return;G.awaitingReview=true;flash((lines&&lines[0])?lines[0]:kind+' resolved.');let el=document.getElementById('conflictReview');if(!el){el=document.createElement('div');el.id='conflictReview';document.body.appendChild(el)}el.style.display='flex';el.innerHTML='<div class=\"reviewCard\"><h2>'+v44Esc(kind||'Conflict')+' resolved</h2><div class=\"reviewBody\">'+((lines&&lines.length)?lines.map(s=>'<div class=\"line\">'+colorizeText(s)+'</div>').join(''):'<div class=\"line\">Conflict resolved.</div>')+'</div><div class=\"reviewFooter\"><button id=\"conflictContinueBtn\">Continue</button></div></div>';document.getElementById('conflictContinueBtn').onclick=function(){el.style.display='none';if(G)G.awaitingReview=false;maybeRunAiV44('after-review',250,false)}};try{showConflictResult=window.showConflictResult}catch(e){}\nwindow.closeConflictReview=function(){let el=document.getElementById('conflictReview');if(el)el.style.display='none';if(G)G.awaitingReview=false;maybeRunAiV44('after-review-close',250,false)};try{closeConflictReview=window.closeConflictReview}catch(e){}\nconst oldDoHuman=window.doHumanAction||doHumanAction;window.doHumanAction=function(){if(!G||G.over||G.players[G.turn].ai||pendingSupport||pendingWarOrder)return;let a=document.getElementById('action').value,color=+document.getElementById('color').value,x=selected.x,y=selected.y,imp='';try{imp=impactfulMoveText(a,color,x,y)}catch(e){}if(G.settings.confirmImpact&&imp){showSheet('v44Impact','Confirm impactful move','<p>'+v44Esc(imp)+'</p>','<button id=\"v44ImpactGo\">Continue</button><button class=\"secondary\" onclick=\"document.getElementById(\\'v44Impact\\').style.display=\\'none\\'\">Cancel</button>');document.getElementById('v44ImpactGo').onclick=function(){closeSheet('v44Impact');let old=G.settings.confirmImpact;G.settings.confirmImpact=false;Promise.resolve(oldDoHuman()).finally(()=>{if(G)G.settings.confirmImpact=old})};return}return oldDoHuman()};try{doHumanAction=window.doHumanAction}catch(e){}\nwindow.finishHumanTurn=function(){if(pendingSupport||pendingWarOrder){flash('Resolve the current war/support choice first.');return}if(!G.players[G.turn].ai&&G.actions>0){let recs=[];try{recs=hardRecommendations(G.turn,5)}catch(e){}let body='<p>You still have '+G.actions+' action'+(G.actions===1?'':'s')+' available.</p><p><b>Strong options:</b></p><div class=\"line\">'+(recs.length?recs.map(v44Esc).join('</div><div class=\"line\">'):'Recycle tiles or place a safe scoring tile if available.')+'</div>';showSheet('v44EarlyEnd','End turn early?',body,'<button id=\"v44EndAnyway\">End anyway</button><button class=\"secondary\" onclick=\"document.getElementById(\\'v44EarlyEnd\\').style.display=\\'none\\'\">Keep playing</button>');document.getElementById('v44EndAnyway').onclick=function(){closeSheet('v44EarlyEnd');log('You explicitly chose to end the turn with '+G.actions+' unused action'+(G.actions===1?'':'s')+'.');endTurn()};return}endTurn()};try{finishHumanTurn=window.finishHumanTurn}catch(e){}\nwindow.saveGame=function(){if(!G){showSheet('v44Notice','No match','<p>No match is currently running.</p>','<button onclick=\"document.getElementById(\\'v44Notice\\').style.display=\\'none\\'\">OK</button>');return}ensureGameId();showSheet('v44Save','Save position','<p>Optional label for this saved position:</p><input id=\"v44SaveLabel\" type=\"text\" placeholder=\"e.g. after first war\">','<button id=\"v44SaveGo\">Save</button><button class=\"secondary\" onclick=\"document.getElementById(\\'v44Save\\').style.display=\\'none\\'\">Cancel</button>');document.getElementById('v44SaveGo').onclick=function(){let name=(document.getElementById('v44SaveLabel').value||'').trim();let item={id:'manual_'+G.gameId,gameId:G.gameId,ts:new Date().toISOString(),name:name||'Manual save',summary:saveSummary(G),g:JSON.stringify(G)};let saves=getSaves().filter(s=>s.id!=='autosave_'+G.gameId&&s.id!==item.id);saves.unshift(item);setSaves(saves);populateSaveSelect();closeSheet('v44Save');flash('Saved position'+(name?': '+name:'.'));log('SAVED: '+(name||'Manual save'))}};try{saveGame=window.saveGame}catch(e){}\nwindow.deleteSelectedSave=function(){let sel=document.getElementById('saveSelect');if(!sel||!sel.value){showSheet('v44Notice','No save selected','<p>Choose a saved match first.</p>','<button onclick=\"document.getElementById(\\'v44Notice\\').style.display=\\'none\\'\">OK</button>');return}let saves=getSaves(),s=saves.find(x=>x.id===sel.value);if(!s)return;showSheet('v44Delete','Delete save','<p>'+v44Esc(formatSaveTitle(s))+'</p>','<button id=\"v44DeleteGo\" class=\"danger\">Delete</button><button class=\"secondary\" onclick=\"document.getElementById(\\'v44Delete\\').style.display=\\'none\\'\">Cancel</button>');document.getElementById('v44DeleteGo').onclick=function(){setSaves(saves.filter(x=>x.id!==sel.value));populateSaveSelect();closeSheet('v44Delete')}};\nwindow.clearAllSavedMatches=function(){let saves=getSaves();if(!saves.length){showSheet('v44Notice','No saves','<p>No saved matches to clear.</p>','<button onclick=\"document.getElementById(\\'v44Notice\\').style.display=\\'none\\'\">OK</button>');return}showSheet('v44Clear','Clear all saves','<p>Delete all saved match positions from this device?</p>','<button id=\"v44ClearGo\" class=\"danger\">Clear all</button><button class=\"secondary\" onclick=\"document.getElementById(\\'v44Clear\\').style.display=\\'none\\'\">Cancel</button>');document.getElementById('v44ClearGo').onclick=function(){localStorage.removeItem(SAVE_KEY);populateSaveSelect();closeSheet('v44Clear')}};\nfunction v44TurnBubbles(){if(!G||!G.players)return'';let html='<div class=\"v44DynGrid\">';for(let i=0;i<G.players.length;i++){let p=orderPlayerAt(i),pl=G.players[p];html+='<div class=\"v44DynBubble p'+i+'\"><span class=\"top\">'+(MARK[i]||i+1)+' \xB7 '+v44Esc(pl.ai?pl.name:'You')+'</span><span class=\"sub\">'+v44Esc(playerSymbolName(p))+' \xB7 '+v44Esc(V44_SHAPES[i]||'frame')+' outline</span></div>'}return html+'</div>'}\nwindow.legendHTML=function(){if(!G)return'';let parts=[];parts.push(selectedSpaceCardHTML());parts.push('<div class=\"infoBlock\"><b>Turn order / dynasties</b>'+v44TurnBubbles()+'<div class=\"tiny\">Background colour and outline shape show the player/order. Inner leader colour shows role.</div></div>');parts.push('<div class=\"infoBlock\"><b>Sphere colours</b><div class=\"legendRow\">'+CNAME.map((n,i)=>'<span class=\"pill c'+i+'\"><span class=\"sw\" style=\"background:'+HEX[i]+'\"></span>'+n+': '+TILE[i]+' / '+LEADER[i]+' / '+VP[i]+'</span>').join('')+'</div></div>');parts.push('<div class=\"infoBlock\"><b>Starting sites</b><div class=\"legendRow\"><span class=\"pill\">Gold ribbon = treasure still on site</span><span class=\"pill\">Grey ribbon = treasure taken</span></div></div>');if(G.settings.buildings)parts.push('<div class=\"infoBlock\"><b>Civilisation buildings</b><div class=\"legendRow\">Buildings protect their tile until flipped for a monument or wonder.</div></div>');return parts.join('')};try{legendHTML=window.legendHTML}catch(e){}\nwindow.historyHTML=function(){if(!G)return'';let chronological=G.log.slice().reverse(),groups=[],cur=null;for(const s of chronological){if(/^TURN START:|^Game started|^CONTINUED|^MATCH BEGINS|^SAVED|^GAME OVER/.test(s)){cur={head:s,lines:[]};groups.push(cur)}else{if(!cur){cur={head:'Earlier',lines:[]};groups.push(cur)}cur.lines.push(s)}}groups.reverse();return groups.map(g=>'<div class=\"turnGroup\"><b>'+colorizeText(g.head)+'</b>'+g.lines.map(l=>'<span class=\"turnLine\">'+colorizeText(l)+'</span>').join('')+'</div>').join('')};try{historyHTML=window.historyHTML}catch(e){}\nwindow.alert=function(msg){showSheet('v44Notice','Notice','<p>'+v44Esc(msg)+'</p>','<button onclick=\"document.getElementById(\\'v44Notice\\').style.display=\\'none\\'\">OK</button>')};\nwindow.startGameV44=startGameV44;window.startGame=startGameV44;window.startGameV43=startGameV44;window.startGameV42=startGameV44;window.continueSavedMatchV44=continueSavedMatchV44;window.continueSavedMatch=continueSavedMatchV44;window.continueSavedMatchV43=continueSavedMatchV44;window.continueSavedMatchV42=continueSavedMatchV44;window.aiTurn=aiTurnV44;window.runAiStep=aiStepV44;window.maybeRunAiV44=maybeRunAiV44;window.kickAiIfNeeded=function(){maybeRunAiV44('kick',0,true)};try{startGame=startGameV44;startGameV43=startGameV44;startGameV42=startGameV44;continueSavedMatch=continueSavedMatchV44;continueSavedMatchV43=continueSavedMatchV44;aiTurn=aiTurnV44;runAiStep=aiStepV44}catch(e){}\nif(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){v44Style();forceButtonHandlers();try{v43EnhanceSetup&&v43EnhanceSetup()}catch(e){}try{organizeSaveButtons&&organizeSaveButtons()}catch(e){}});else setTimeout(function(){v44Style();forceButtonHandlers();try{v43EnhanceSetup&&v43EnhanceSetup()}catch(e){}try{organizeSaveButtons&&organizeSaveButtons()}catch(e){}},30);\n})();\n\n</script>\n</body>\n</html>\n\nEOF\n"
    - name: Download Gradle
      run: 'curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip

        unzip -q gradle.zip

        '
    - name: Build debug APK
      run: ./gradle-8.7/bin/gradle --no-daemon assembleDebug
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kings-of-the-Two-Rivers-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
