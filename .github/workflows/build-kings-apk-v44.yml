with one or two treasures still on the board.']],\n    ['cat','Catastrophes','Placement',['May be placed on an empty space or existing tile.','Cannot be placed on leaders.','Cannot be placed on treasure, monument/wonder, or building-protected tile.'],'Effect',['Permanently blocks the space.','Can split regions and kingdoms.','Can remove a temple and force leaders to withdraw.']],\n    ['mon','Monuments','Build',['A newly completed 2\xD72 square of one colour may build a matching monument.','Building is optional.','It can only be built at the end of the action completing the square.'],'Afterward',['Facedown base tiles still link.','Facedown bases do not count as conflict supporters.','Treasures on flipped temples remain on the facedown tile.','Leaders losing temple adjacency withdraw.']],\n    ['bld','Buildings','Optional module',['Straight line of 3+ same-colour tiles can receive the matching building.','A building can move only to a longer eligible line.','Buildings are placed before monuments/wonder if both apply.'],'Effects',['Raises matching tile placement reward in that kingdom from 1 to 2 VP.','Does not affect conflict or monument rewards.','The tile under a building counts in conflicts and cannot be removed.','If flipped for monument/wonder, return building beside board.']],\n    ['wnd','Wonder','Optional module',['A five-tile cross of one colour may become the wonder.','The wonder replaces the five tiles and cannot be destroyed.','It links regions and kingdoms.'],'Scoring',['Wonder does not count as conflict supporters.','King in the wonder kingdom gains 1 VP of chosen colour at end of turn.','Only one wonder exists.','Treasures on used temples move onto the wonder and remain collectible.']],\n    ['end','End game','Triggers',['Game ends at end of turn if only one or two treasures remain on board.','Game also ends if a player tries to draw from an empty bag.'],'Winner',['Each treasure may be allocated to any VP colour.','Compare each player\u2019s lowest VP colour.','If tied, compare second-lowest, then third, then fourth.','If still tied, tied players share victory.']]\n  ];\n  function ruleBox(title,items){return '<div class=\"ruleBox\"><b>'+safeEsc(title)+'</b><ul>'+items.map(x=>'<li>'+safeEsc(x)+'</li>').join('')+'</ul></div>';}\n  function ruleSection(s){return '<section class=\"ruleSection\" id=\"v40Rule_'+s[0]+'\"><h3>'+safeEsc(s[1])+'</h3><div class=\"ruleGrid\">'+ruleBox(s[2],s[3])+ruleBox(s[4],s[5])+'</div></section>';}\n  window.showTutorial=function(){\n    let old=document.getElementById('tutorialBox'); if(old)old.style.display='none';\n    let el=document.getElementById('v40Rules'); if(!el){el=document.createElement('div'); el.id='v40Rules'; document.body.appendChild(el);} \n    let chips=ruleSectionsV40.map((s,i)=>'<button class=\"'+(i===0?'active':'')+'\" data-id=\"'+s[0]+'\">'+safeEsc(s[1])+'</button>').join('');\n    el.innerHTML='<div class=\"ruleCard\"><div class=\"ruleHead\"><h2>Rule reminders</h2><button id=\"v40RulesClose\">Close</button></div><div class=\"ruleTabs\">'+chips+'</div><div class=\"ruleBody\" id=\"v40RuleBody\">'+ruleSectionsV40.map(ruleSection).join('')+'</div></div>';\n    el.style.display='flex'; document.getElementById('v40RulesClose').onclick=()=>{el.style.display='none';};\n    el.querySelectorAll('.ruleTabs button').forEach(btn=>{btn.onclick=()=>{el.querySelectorAll('.ruleTabs button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); let target=document.getElementById('v40Rule_'+btn.dataset.id), body=document.getElementById('v40RuleBody'); if(target&&body)body.scrollTo({top:target.offsetTop-body.offsetTop,behavior:'smooth'});};});\n  };\n  window.closeTutorial=function(){let el=document.getElementById('v40Rules'); if(el)el.style.display='none'; let old=document.getElementById('tutorialBox'); if(old)old.style.display='none';};\n  try{showTutorial=window.showTutorial; closeTutorial=window.closeTutorial;}catch(e){}\n\n  const v40PrevResize=window.resizeCanvas||resizeCanvas;\n  window.resizeCanvas=function(){\n    let can=document.getElementById('board'), wrap=document.getElementById('canvasWrap'); if(!wrap||!can||!G){try{v40PrevResize();}catch(e){} return;}\n    let zoom=G.boardZoom||1, horiz=document.body.classList.contains('horiz');\n    let availW=Math.max(180,wrap.clientWidth-(horiz?4:0)), availH=Math.max(130,wrap.clientHeight-(horiz?4:0));\n    let fit=Math.min(availW/W,availH/H), cellSize=Math.max(10,Math.floor(fit));\n    let w=W*cellSize, h=H*cellSize;\n    can.style.width=Math.max(1,Math.floor(w*zoom))+'px'; can.style.height=Math.max(1,Math.floor(h*zoom))+'px';\n    can.style.margin=zoom>1.01?(horiz?'24vh 20vw':'30vh 30vw'):'0px';\n    wrap.classList.toggle('zoomed',zoom>1.01);\n    if(zoom<=1.01){wrap.scrollLeft=0; wrap.scrollTop=0;} else {setTimeout(()=>{wrap.scrollLeft=Math.max(0,(wrap.scrollWidth-wrap.clientWidth)/2); wrap.scrollTop=Math.max(0,(wrap.scrollHeight-wrap.clientHeight)/2);},0);}\n  };\n  try{resizeCanvas=window.resizeCanvas;}catch(e){}\n\n  const v40PrevRender=window.render||render;\n  window.render=function(){try{v40PrevRender();}catch(e){console.error(e);} try{arrangeMenuV40(); organizeSaveButtonsV40(); let b=document.getElementById('layoutBtn'); if(b)b.textContent=(G&&G.uiHorizontal)?'Portrait':'Landscape';}catch(e){} };\n  try{render=window.render;}catch(e){}\n  window.addEventListener('load',()=>{try{arrangeMenuV40(); populateSaveSelect(); organizeSaveButtonsV40();}catch(e){}});\n})();\n\n\n// v41: reliable match-start order sheet and first-player AI start.\n(function(){\n  function v41Esc(s){try{return esc(String(s));}catch(e){return String(s||'').replace(/[&<>\"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[ch];});}}\n  function v41EnsureOrderStyle(){\n    if(document.getElementById('v41OrderStyle'))return;\n    let st=document.createElement('style'); st.id='v41OrderStyle';\n    st.textContent=[\n      '#v41OrderSheet{position:fixed;inset:0;z-ind