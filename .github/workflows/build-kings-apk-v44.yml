    - name: Generate Android project
      run: "set -euxo pipefail\nmkdir -p app/src/main/java/com/auroranem/kings app/src/main/assets app/src/main/res/values app/src/main/res/drawable\ncat > settings.gradle <<'EOF'\npluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }\ndependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }\nrootProject.name='KingsOfTheTwoRivers'\ninclude ':app'\nEOF\ncat > build.gradle <<'EOF'\nplugins {\n    id 'com.android.application' version '8.6.1' apply false\n}\nEOF\ncat > app/build.gradle <<'EOF'\nplugins { id 'com.android.application' }\n\nandroid {\n    namespace 'com.auroranem.kings'\n    compileSdk 35\n    defaultConfig {\n        applicationId 'com.auroranem.kings'\n        minSdk 23\n        targetSdk 35\n        versionCode 43\n        versionName '4.4'\n    }\n}\nEOF\ncat > app/src/main/AndroidManifest.xml <<'EOF'\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n    <application android:theme=\"@style/AppTheme\" android:label=\"Kings of the Two Rivers\" android:icon=\"@drawable/ic_launcher\" android:allowBackup=\"false\" android:supportsRtl=\"true\">\n        <activity android:name=\".MainActivity\" android:configChanges=\"orientation|screenSize|keyboardHidden\" android:exported=\"true\">\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>\n\nEOF\ncat > app/src/main/res/values/styles.xml <<'EOF'\n<resources>\n    <style name=\"AppTheme\" parent=\"android:style/Theme.Material.Light.NoActionBar\">\n        <item name=\"android:windowNoTitle\">true</item>\n        <item name=\"android:windowActionBar\">false</item>\n        <item name=\"android:fontFamily\">serif</item>\n        <item name=\"android:colorAccent\">#7b4f25</item>\n        <item name=\"android:windowLightStatusBar\">false</item>\n        <item name=\"android:statusBarColor\">#3f2917</item>\n        <item name=\"android:navigationBarColor\">#3f2917</item>\n    \n\n\n\n  \n\n  /* v35 polish: save management, tutorials, themes, conflict cards */\n  #conflictReview{display:none;position:fixed;inset:0;z-index:90;background:rgba(24,15,7,.44);align-items:center;justify-content:center;padding:18px;box-sizing:border-box;}\n  #conflictReview .reviewCard{width:min(620px,94vw);max-height:min(78vh,640px);overflow:auto;background:linear-gradient(180deg,#fff8e6,#f2d99d);border:2px solid #7b4f25;border-radius:18px;box-shadow:0 16px 40px #0009;color:#2d1c0d;font-family:var(--head);animation:reviewPop .18s ease-out;}\n  #conflictReview h2{font-family:var(--display);font-size:24px;margin:0;padding:14px 16px 8px;border-bottom:1px solid #d4b36a;}\n  #conflictReview .reviewBody{padding:12px 16px;font-size:15px;line-height:1.35;}\n  #conflictReview .reviewBody .line{padding:7px 0;border-bottom:1px solid rgba(122,82,29,.22);}\n  #conflictReview .reviewFooter{display:flex;gap:8px;justify-content:flex-end;padding:10px 16px 14px;border-top:1px solid #d4b36a;}\n  @keyframes reviewPop{from{transform:scale(.96);opacity:.35}to{transform:scale(1);opacity:1}}\n  .whyBox{grid-column:1/-1;background:#fff5d6;border:1px solid #d2bb83;border-radius:12px;padding:7px 9px;font-size:12px;line-height:1.25;color:#4b301c;}\n  .themeButtons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%;grid-column:1/-1;}\n  .themeButtons button{min-height:32px!important;font-size:11px!important;padding:5px!important;}\n  .helpLink{grid-column:1/-1;}\n  body.theme-muted #canvasWrap{background:#b9a469!important;} body.theme-muted canvas{filter:saturate(.78) contrast(.92) sepia(.12);}\n  body.theme-muted #game{background:linear-gradient(#dfd0a9,#cbb681)!important;}\n  body.theme-contrast #canvasWrap{background:#fff0a6!important;} body.theme-contrast canvas{filter:saturate(1.45) contrast(1.35);}\n  body.theme-contrast #game{background:#f7df84!important;} body.theme-contrast .treasureRibbon{outline:2px solid #000;}\n  body.theme-classic canvas{filter:none;}\n  .playerChip.active{animation:activePulse 1.9s ease-in-out infinite;}\n  @keyframes activePulse{0%,100%{box-shadow:0 0 0 rgba(255,223,117,0)}50%{box-shadow:0 0 0 3px rgba(255,223,117,.45)}}\n  #tutorialBox{display:none;position:fixed;inset:0;z-index:92;background:rgba(24,15,7,.45);align-items:center;justify-content:center;padding:16px;}\n  #tutorialBox .tutorialCard{width:min(640px,94vw);max-height:82vh;overflow:auto;background:linear-gradient(180deg,#fff8e6,#f3dfad);border:2px solid #7b4f25;border-radius:18px;box-shadow:0 14px 36px #0008;padding:16px;color:#2d1c0d;}\n  #tutorialBox h2{font-family:var(--display);margin:0 0 8px;font-size:24px;} #tutorialBox h3{margin:14px 0 5px;font-size:17px;color:#6d3f14;} #tutorialBox p{margin:0 0 7px;line-height:1.35;}\n  #saveDeleteBtn{margin-top:6px;}\n\n  \n\n  /* v37 functional and UI fixes */\n  #turnOrderModal{display:none;position:fixed;inset:0;z-index:90;background:rgba(31,18,7,.58);align-items:center;justify-content:center;padding:18px;box-sizing:border-box;}\n  .orderCard{width:min(92vw,440px);background:linear-gradient(180deg,#fff9e8,#efd494);border:2px solid #8a5a22;border-radius:20px;padding:18px;box-shadow:0 14px 36px #0008;color:#2b1809;font-family:var(--head);}\n  .orderCard h2{margin:0 0 10px;font-family:var(--display);font-size:24px;letter-spacing:.06em;font-variant:small-caps;}\n  .orderRow{padding:7px 8px;margin:5px 0;border-radius:10px;background:#fff8e6;border:1px solid #dec17a;font-weight:900;}\n  .orderCard button{width:100%;margin-top:10px;}\n  body.playing:not(.horiz) #controls,body.playing:not(.horiz) #legend,body.playing:not(.horiz) #log,body.playing:not(.horiz) #menuPanel{max-height:31vh!important;min-height:26vh!important;}\n  body.playing:not(.horiz) #canvasWrap{min-height:50vh!important;}\n  body.horiz #layoutBtn, body.playing:not(.horiz) #layoutBtn{font-size:9.4px!important;letter-spacing:.01em!important;}\n  #menuPanel #v35ThemeButtons.themeButtons{grid-template-columns:1fr 1fr 1fr!important;gap:10px!important;margin:10px 0 4px!important;align-items:stretch;}\n  #v35ThemeButtons button{min-height:36px!important;font-size:10.5px!important;border-radius:12px!important;}\n  #v35ThemeButtons button:nth-child(1){background:linear-gradient(180deg,#9b682f,#6d4219)!important;}\n  #v35ThemeButtons button:nth-child(2){background:linear-gradient(180deg,#81745d,#5d5340)!important;}\n  #v35ThemeButtons button:nth-child(3){background:linear-gradient(180deg,#222,#000)!important;color:#fff36f!important;border-color:#ffe15f!important;}\n  #menuPanel .helpLink{grid-column:1/3!important;width:auto!important;min-height:38px!important;font-size:11px!important;margin-top:4px!important;}\n  #saveDeleteBtn{display:block!important;margin-top:18px!important;max-width:48%!important;min-height:36px!important;}\n  #setup .row .danger{margin-top:12px!important;}\n  #tutorialBox{padding:14px!important;box-sizing:border-box;align-items:center!important;justify-content:center!important;}\n  #tutorialBox .tutorialCard{width:min(94vw,650px)!important;max-height:88dvh!important;overflow:auto!important;margin:0!important;padding:18px 20px!important;border-radius:18px!important;box-sizing:border-box;background:linear-gradient(180deg,#fff9e8,#f1dca2)!important;border:2px solid #8a5a22!important;}\n  #tutorialBox h2{font-size:22px!important;margin:0 0 10px!important;line-height:1.1!important;}\n  #tutorialBox h3{font-size:15px!important;margin:12px 0 4px!important;line-height:1.15!important;color:#4b2b10!important;}\n  #tutorialBox p{font-size:13px!important;line-height:1.28!important;margin:0 0 6px!important;}\n  #tutorialBox button{margin-top:12px!important;min-height:38px!important;}\n  .playerColourKey{margin-top:8px;padding-top:7px;border-top:1px solid #dec17a;}\n  .playerColourKey .ownerChip{displa