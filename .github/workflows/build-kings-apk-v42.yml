          <style>
            :root{--bg:#efe1bc;--ink:#21160e;--panel:#fff6df;--line:#8d6d3e;--accent:#765126;--gold:#d7b354;--display:'Papyrus','Herculanum','Copperplate','Cinzel Decorative','Trajan Pro','Palatino Linotype','Book Antiqua','Georgia',serif;--head:'Copperplate','Cinzel','Cormorant Garamond','Palatino Linotype','Book Antiqua','Georgia',serif;--body:'Palatino Linotype','Book Antiqua','Georgia','Times New Roman',serif;}
            html,body{margin:0;height:100%;font-family:var(--body);background:radial-gradient(circle at 50% -20%,#fff4d4 0,#ead6a9 55%,#d6bc83 100%);color:var(--ink);letter-spacing:.01em}
            body{display:flex;flex-direction:column;overflow:hidden}
            header{padding:calc(5px + env(safe-area-inset-top,0px)) 10px 5px;background:linear-gradient(180deg,#604022,#3f2917);color:#fff;box-shadow:0 3px 8px #0006;border-bottom:2px solid #c9a75c;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
            header h1{font-size:19px;margin:0;font-family:var(--display);letter-spacing:.06em;font-weight:900;font-variant:small-caps;text-shadow:0 2px 0 #2a1608,0 3px 5px #000a;line-height:1.05} header .small{font-size:15px;opacity:.95;line-height:1;font-family:var(--display);letter-spacing:.08em;color:#f1d891;white-space:nowrap;text-shadow:0 1px 2px #000a}
            #setup{padding:12px;overflow:auto;flex:1}.card{background:linear-gradient(180deg,#fff9e8,#fff0cc);border:1px solid #d2bb83;border-radius:14px;padding:12px;margin:10px 0;box-shadow:0 2px 6px #0002}
            .card h2{font-size:18px;margin:0 0 8px;color:#4b301c;font-family:var(--display);letter-spacing:.05em;font-variant:small-caps;text-shadow:0 1px 0 #fff7}.card p{margin:4px 0 8px}.note{font-size:12px;line-height:1.45}.muted{opacity:.78}.tiny{font-size:11px;line-height:1.3}
            label{display:block;margin:9px 0 4px;font-weight:900;letter-spacing:.045em;font-family:var(--head);font-variant:small-caps} select,button,input{font-family:var(--body);font-size:16px} select{width:100%;padding:8px;border-radius:9px;border:1px solid #b69a62;background:#fffdf6;color:#22170e}
            button{border:1px solid #4e3218;border-radius:10px;padding:9px 12px;background:linear-gradient(180deg,#8a5c2d,#6b431f);color:#fff;font-family:var(--head);font-weight:900;font-variant:small-caps;box-shadow:0 2px 4px #0004;letter-spacing:.045em;text-shadow:0 1px 1px #0008}button.secondary{background:linear-gradient(180deg,#59627c,#3d455a)}button.danger{background:linear-gradient(180deg,#a24339,#7f2b27)}
            .check{display:grid;grid-template-columns:32px 1fr;gap:8px;align-items:start;margin:10px 0;padding:8px;border:1px solid #ead9aa;border-radius:10px;background:#fffdf4}.check input{width:24px;height:24px}.check b{display:block;font-family:var(--head);font-size:14px}.check span{font-size:12px;line-height:1.25;opacity:.84}
            .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.wide{grid-column:1/3}
            #game{display:none;flex:1;min-height:0;flex-direction:column}#topbar{padding:3px 7px;background:linear-gradient(180deg,#fff8e6,#f6e8c2);border-bottom:1px solid #d2bb83;font-family:var(--head);font-size:10.5px;line-height:1.16;max-height:42px;overflow:auto;font-variant:small-caps;letter-spacing:.018em}#hudButtons{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:3px 6px;background:#f6e8c2;border-bottom:1px solid #d2bb83}#hudButtons button{font-size:10.2px;padding:3px 4px;border-radius:8px;min-width:0}
            #canvasWrap{position:relative;flex:1;min-height:0;background:#d7c18a;display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{touch-action:manipulation;max-width:100%;max-height:100%}
            #legend{padding:3px 7px;background:#fdf2cf;border-top:1px solid #d2bb83;border-bottom:1px solid #d2bb83;font-family:var(--head);font-size:10.5px;line-height:1.18;max-height:48px;overflow:auto;font-variant:small-caps;letter-spacing:.018em}#legend.collapsed,#log.collapsed{display:none}#controls.collapsed{display:none}
            #eventBox{padding:4px 8px;background:linear-gradient(180deg,#fff2cb,#f8e2a7);border-bottom:1px solid #d2bb83;font-family:var(--head);font-size:11.5px;line-height:1.25;min-height:18px;color:#4a3018;font-weight:850;font-variant:small-caps;letter-spacing:.022em}
            .pill{display:inline-block;margin:2px 3px 2px 0;padding:2px 7px;border-radius:999px;border:1px solid #ad9358;background:#fffaf0;white-space:nowrap}.sw{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:-1px;margin-right:3px}.sig{font-weight:900;font-size:13px;margin-right:2px;font-family:var(--head)}.ownerShape{display:inline-block;width:15px;height:15px;line-height:15px;text-align:center;margin-right:4px;font-size:11px;font-weight:900;text-shadow:0 1px 0 #fff8}.leaderHint{font-family:var(--head);font-weight:800}
            #controls{background:linear-gradient(180deg,#fff8e6,#f7ebc7);border-top:1px solid #d2bb83;padding:4px 6px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px}#controls select{font-size:12px;padding:5px}#controls button{font-size:12.5px;padding:6px}
            #recyclePanel{display:none;grid-template-columns:repeat(4,1fr);gap:4px;align-items:end;background:#fffdf4;border:1px solid #ead9aa;border-radius:8px;padding:4px}.recSlot{display:flex;flex-direction:column;font-size:10px;font-weight:700}.recSlot input{width:100%;box-sizing:border-box;padding:4px;border-radius:7px;border:1px solid #b69a62;background:#fffaf0}#recyclePanel.active{display:grid}
            #supportDrawer{display:none;position:fixed;left:10px;right:10px;bottom:10px;z-index:40;background:linear-gradient(180deg,rgba(255,248,226,.98),rgba(247,225,174,.98));border:2px solid #7b4f25;border-radius:14px;padding:9px 10px;box-shadow:0 7px 22px #0008;font-family:var(--head);font-size:13px;max-height:34vh;overflow:auto}.supportBtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}#supportDrawer input[type=range]{width:100%;accent-color:#7b4f25}#supportText{font-weight:900;color:#4b301c;font-family:var(--display);font-variant:small-caps;letter-spacing:.04em}#supportHint,#supportValue{font-family:var(--head);font-variant:small-caps;letter-spacing:.025em}
            #warOrderDrawer{display:none;position:fixed;left:10px;right:10px;bottom:10px;z-index:39;background:linear-gradient(180deg,rgba(255,248,226,.98),rgba(244,217,154,.98));border:2px solid #7b4f25;border-radius:14px;padding:9px 10px;box-shadow:0 7px 22px #0008;font-family:var(--head);font-size:13px;max-height:34vh;overflow:auto}#warOrderText{font-weight:900;color:#4b301c;font-family:var(--display);font-variant:small-caps;letter-spacing:.04em;margin-bottom:6px}.warOrderBtns{display:grid;grid-template-columns:1fr;gap:6px}.warOrderBtns button{font-size:13px;padding:8px;text-align:left}
            #log{height:68px;overflow:auto;background:#21180f;color:#f8eac4;font:11px/1.25 'Georgia','Times New Roman',serif;padding:5px 7px;white-space:pre-wrap;letter-spacing:.012em;border-top:1px solid #6b512b}#log:before{content:'Recent actions';display:block;color:#d9bd74;font-family:var(--head);font-variant:small-caps;font-weight:900;margin-bottom:2px}

            /* v30 hard layout reset — removes accumulated old horizontal/panel behaviours */
            html,body{height:100dvh;max-height:100dvh;overflow:hidden;}
            body{background:#d9c18a;}
            body:not(.playing) header{display:none!important;}
            body.playing:not(.horiz) header{display:block!important;padding:calc(3px + env(safe-area-inset-top,0px)) 8px 3px!important;min-height:0!important;background:linear-gradient(180deg,#3b2312,#251408)!important;border-bottom:1px solid #c29a52!important;}
            body.playing:not(.horiz) header h1{font-size:15px!important;line-height:1!important;letter-spacing:.045em!important;}
            body.playing:not(.horiz) header .small{font-size:10px!important;line-height:1!important;}
            body.horiz header{display:none!important;}
            
            /* modern home/setup screen */
            #setup{height:100dvh;box-sizing:border-box;overflow:auto;padding:calc(14px + env(safe-area-inset-top,0px)) 14px calc(20px + env(safe-area-inset-bottom,0px))!important;background:radial-gradient(circle at 50% 0,#fff3c8 0 7%,transparent 32%),linear-gradient(160deg,#1f1007 0,#5a3214 22%,#c99b4d 48%,#f5e5bd 100%)!important;}
            #setup:before,#setup:after{content:none!important;display:none!important;}
            #homeHero{max-width:680px;margin:2px auto 14px;text-align:center;color:#fff1bf;}
            #homeHero .emblem{width:74px;height:74px;display:grid;place-items:center;margin:0 auto 10px;border-radius:24px;background:linear-gradient(145deg,#4f2b12,#180b04);color:#f4d27c;border:1px solid #e8c474;box-shadow:0 14px 34px #0006;font-size:38px;}
            #homeHero h1{margin:0;font-family:var(--display);font-size:clamp(27px,8vw,46px);line-height:.95;letter-spacing:.075em;font-variant:small-caps;text-shadow:0 3px 14px #000b;}
            #homeHero .flourish{font-family:var(--display);font-size:16px;letter-spacing:.45em;color:#f5d98b;margin-top:7px;text-shadow:0 2px 5px #0008;}
            #setup .card{max-width:680px!important;margin:10px auto!important;background:rgba(255,247,224,.95)!important;border:1px solid rgba(247,217,135,.82)!important;border-radius:22px!important;box-shadow:0 14px 38px rgba(36,18,6,.24)!important;backdrop-filter:blur(4px);padding:16px!important;}
            #setup .card h2{font-family:var(--display)!important;font-size:20px!important;line-height:1.05!important;margin:0 0 10px!important;color:#3d210c!important;letter-spacing:.05em;}
            #setup label{font-size:12px!important;letter-spacing:.07em!important;color:#5a3a18!important;margin-top:8px!important;}
            #setup select{min-height:42px!important;border:1px solid #bf9550!important;border-radius:15px!important;background:#fffaf0!important;padding:8px 10px!important;box-shadow:inset 0 1px 0 #fff;font-family:var(--head);}
            #setup .check{display:grid;grid-template-columns:30px 1fr;gap:10px;align-items:center;background:#fff9e9!important;border:1px solid #e7d0a0!important;border-radius:16px!important;padding:9px 10px!important;margin:7px 0!important;}
            #setup .check input{width:24px;height:24px;}
            #setup .check b{font-size:14px!important;color:#2d1a0c;}
            #setup .check span{font-size:11.5px!important;line-height:1.22!important;color:#5b4129;}
            #setup .row{display:grid;grid-template-columns:1fr 1fr;gap:9px!important;}
            #setup .row .danger{grid-column:1/2;}
            #setup .note.card{display:none!important;}
            #setup button{min-height:40px!important;border-radius:13px!important;}
            #saveDetails{margin:6px 0 9px;color:#4d3218;line-height:1.25;}
            
            /* common game shell */
            #game{height:100dvh;min-height:0;overflow:hidden;background:#d9c18a;}
            #topbar{background:linear-gradient(180deg,#fff6dc,#f6e4b7)!important;border-bottom:1px solid #cda95d!important;color:#2b1909!important;font-family:var(--head)!important;letter-spacing:.015em!important;overflow:visible!important;max-height:none!important;box-sizing:border-box;}
            .tickerMain{font-weight:900;font-variant:small-caps;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
            .tickerSub{display:flex;gap:6px;align-items:center;flex-wrap:wrap;line-height:1.18;}
            .tickerSub .seg{white-space:nowrap;}
            #eventBox{background:linear-gradient(180deg,#f9e6b4,#efd18a)!important;border-bottom:1px solid #c49b55!important;color:#3c230c!important;font-family:var(--head)!important;font-weight:900!important;font-variant:small-caps!important;letter-spacing:.02em!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;}
            #phaseBadge,#playerStrip,#previewBox{display:none!important;}
            #hudButtons{background:#f3dda6!important;border-bottom:1px solid #c59d55!important;display:grid!important;gap:4px!important;box-sizing:border-box;}
            #hudButtons button{min-width:0!important;border-radius:10px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;}
            #hudButtons button.activeTab{background:linear-gradient(180deg,#b98741,#704818)!important;box-shadow:0 0 0 2px rgba(255,226,151,.65) inset!important;}
            #canvasWrap{position:relative;box-sizing:border-box;background:#d2ba7d!important;display:flex!important;align-items:center!important;justify-content:center!important;overflow:hidden!important;min-width:0;min-height:0;touch-action:none;}
            #canvasWrap.zoomed{overflow:auto!important;align-items:flex-start!important;justify-content:flex-start!important;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;}
            #canvasWrap.zoomed canvas{max-width:none!important;max-height:none!important;touch-action:none;}
            canvas{display:block;max-width:none!important;max-height:none!important;image-rendering:auto;}
            
            #controls,#legend,#log,#menuPanel{box-sizing:border-box;background:linear-gradient(180deg,#fff7df,#f5e3b5)!important;border-top:1px solid #c59d55!important;overflow:auto!important;min-height:0!important;}
            #controls.collapsed,#legend.collapsed,#log.collapsed,#menuPanel.collapsed{display:none!important;}
            #controls{display:grid!important;grid-template-columns:1fr 1fr!important;gap:6px!important;padding:7px!important;}
            #controls select{display:none!important;}
            #controls .settingsMini,#controls .zoomBar{display:none!important;}
            #actionContext{grid-column:1/3;background:#fff8e6;border:1px solid #e4c984;border-radius:12px;padding:6px 8px;font-size:11px;line-height:1.22;}
            #quickActions{grid-column:1/3;display:grid;grid-template-columns:1fr 1fr;gap:5px;}
            #quickActions button,#controls button{font-size:12px!important;padding:7px 6px!important;min-height:34px!important;}
            .choiceChips{grid-column:1/3;display:grid;gap:5px;}
            #actionChips{grid-template-columns:repeat(2,minmax(0,1fr));}
            #colorChips{grid-template-columns:repeat(4,minmax(0,1fr));}
            .chipBtn{font-family:var(--head);font-size:11.5px!important;line-height:1.05;padding:6px 4px!important;border-radius:12px!important;background:#fffaf0!important;color:#2a190b!important;text-shadow:none!important;border:1px solid #c7a76a!important;box-shadow:none!important;}
            .chipBtn.active{background:linear-gradient(180deg,#8d5c27,#5f3716)!important;color:#fff!important;text-shadow:0 1px 1px #000!important;}
            .chipBtn.c0.active{background:#1f1f1f!important}.chipBtn.c1.active{background:#b74336!important}.chipBtn.c2.active{background:#2d88c4!important}.chipBtn.c3.active{background:#2e9655!important}
            #recyclePanel{grid-column:1/3;}
            #legend{padding:8px!important;font-size:12px!important;line-height:1.28!important;}
            .selectedCard{background:#fff9e8!important;border:1px solid #cda95d!important;border-radius:14px!important;padding:8px!important;margin-bottom:7px!important;box-shadow:none!important;}
            #log{background:#21170c!important;color:#f9edcc!important;font:12px/1.32 Georgia,serif!important;padding:8px!important;white-space:normal!important;}
            #log:before{content:'History';display:block;color:#f2d28a;font-family:var(--head);font-weight:900;font-variant:small-caps;margin-bottom:5px;}
            .turnGroup{margin:0 0 8px!important;padding:6px 8px!important;border-left:3px solid #d5b55e!important;background:rgba(255,246,214,.08)!important;color:#f9edcc!important;border-radius:0 9px 9px 0;}
            .turnGroup b{display:block;color:#ffe7a3!important;margin-bottom:4px;}
            .turnLine{display:block;margin:2px 0 2px 4px!important;color:#f9edcc!important;opacity:1!important;}
            #menuPanel{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:8px!important;font-family:var(--head);}
            #menuPanel .wide,#menuPanel .menuNote,#incomePreviewBox{grid-column:1/3!important;}
            #menuPanel button{font-size:12px!important;padding:8px 6px!important;min-height:36px!important;}
            .settingsMini{display:grid!important;grid-template-columns:1fr 1fr;gap:6px;background:#fff9e8;border:1px solid #e1c77f;border-radius:12px;padding:7px;}
            .settingsMini label{display:flex;gap:5px;align-items:center;margin:0;font-size:11px!important;font-family:var(--body)!important;letter-spacing:0!important;font-variant:normal!important;}
            .settingsMini input{width:16px;height:16px;}
            .menuNote,.panelIntro,.incomePreview{background:#fff8e6!important;border:1px solid #e0c582!important;border-radius:12px!important;padding:7px!important;line-height:1.26!important;}
            .colorChip,.inlineColor{display:inline-block;border-radius:999px;padding:0 5px;margin:0 1px;font-weight:900;border:1px solid rgba(0,0,0,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.25);vertical-align:baseline;white-space:nowrap;}
            .inlineColor{padding:0 4px;font-size:.92em;}
            .c0{background:#1f1f1f!important;color:#fff!important}.c1{background:#b74336!important;color:#fff!important}.c2{background:#2d88c4!important;color:#fff!important}.c3{background:#2e9655!important;color:#fff!important}
            .okChip{background:#e8f4dc;border:1px solid #8ab36b;color:#27541f;border-radius:999px;padding:0 6px;font-weight:900;white-space:nowrap;}
            
            /* portrait gameplay: compact ticker, board priority, one bottom panel */
            body:not(.horiz) #game{display:flex!important;flex-direction:column!important;}
            body:not(.horiz) #topbar{order:1;padding:4px 7px!important;font-size:10.2px!important;line-height:1.16!important;flex:0 0 auto;}
            body:not(.horiz) #eventBox{order:2;min-height:18px!important;max-height:24px!important;padding:3px 7px!important;font-size:10.7px!important;flex:0 0 auto;}
            body:not(.horiz) #canvasWrap{order:3;flex:1 1 auto!important;min-height:0!important;padding:4px!important;}
            body:not(.horiz) #hudButtons{order:4;grid-template-columns:repeat(6,1fr)!important;padding:4px 5px!important;flex:0 0 auto;}
            body:not(.horiz) #hudButtons button{font-size:9.5px!important;padding:5px 2px!important;min-height:30px!important;}
            body:not(.horiz) #controls,body:not(.horiz) #legend,body:not(.horiz) #log,body:not(.horiz) #menuPanel{order:5;flex:0 0 auto;max-height:31vh!important;}
            body:not(.horiz) #log{min-height:110px;}
            
            /* landscape gameplay: full board left, compact side drawer right */
            body.horiz #game{display:grid!important;grid-template-columns:minmax(0,1fr) clamp(250px,26vw,330px)!important;grid-template-rows:auto auto auto minmax(0,1fr)!important;height:100dvh!important;box-sizing:border-box;padding:calc(4px + env(safe-area-inset-top,0px)) calc(5px + env(safe-area-inset-right,0px)) calc(5px + env(safe-area-inset-bottom,0px)) calc(5px + env(safe-area-inset-left,0px))!important;overflow:hidden!important;gap:0!important;background:#d9c18a!important;}
            body.horiz #canvasWrap{grid-column:1;grid-row:1/5;align-self:stretch!important;justify-self:stretch!important;padding:5px!important;min-height:0!important;border-right:1px solid #bc9854;}
            body.horiz #topbar{grid-column:2;grid-row:1;padding:4px 6px!important;font-size:8.7px!important;line-height:1.08!important;max-height:none!important;overflow:visible!important;border-left:0!important;}
            body.horiz #topbar .tickerMain{font-size:9.1px!important;}
            body.horiz #topbar .tickerSub{gap:3px;}
            body.horiz #eventBox{grid-column:2;grid-row:2;padding:3px 6px!important;font-size:8.9px!important;line-height:1.1!important;min-height:17px!important;max-height:28px!important;}
            body.horiz #hudButtons{grid-column:2;grid-row:3;grid-template-columns:repeat(3,1fr)!important;padding:3px!important;gap:3px!important;}
            body.horiz #hudButtons button{font-size:8.4px!important;min-height:25px!important;padding:3px 1px!important;border-radius:7px!important;}
            body.horiz #controls,body.horiz #legend,body.horiz #log,body.horiz #menuPanel{grid-column:2;grid-row:4;max-height:none!important;height:auto!important;align-self:stretch!important;overflow:auto!important;border-top:0!important;border-left:0!important;}
            body.horiz #controls{grid-template-columns:1fr 1fr!important;gap:4px!important;padding:5px!important;}
            body.horiz #actionContext{font-size:9.6px!important;padding:5px!important;}
            body.horiz #quickActions{gap:3px!important;}
            body.horiz #quickActions button,body.horiz #controls button{font-size:8.8px!important;min-height:28px!important;padding:4px 2px!important;}
            body.horiz .choiceChips{gap:3px!important;}
            body.horiz .chipBtn{font-size:8.9px!important;min-height:26px!important;padding:4px 1px!important;border-radius:8px!important;}
            body.horiz #legend{font-size:10px!important;line-height:1.18!important;padding:6px!important;}
            body.horiz #log{font-size:10.2px!important;line-height:1.24!important;padding:6px!important;}
            body.horiz #menuPanel{gap:5px!important;padding:6px!important;}
            body.horiz #menuPanel button{font-size:9.4px!important;min-height:30px!important;padding:5px 2px!important;}
            body.horiz .settingsMini{grid-template-columns:1fr!important;font-size:9px!important;}
            
            /* choice drawers should not consume whole screen */
            #supportDrawer,#warOrderDrawer{left:50%!important;right:auto!important;bottom:calc(10px + env(safe-area-inset-bottom,0px))!important;transform:translateX(-50%);width:min(92vw,520px)!important;max-height:min(44vh,340px)!important;}
            body.horiz #supportDrawer,body.horiz #warOrderDrawer{width:min(56vw,560px)!important;left:42%!important;max-height:72vh!important;}

            /* v32 repaired shell: setup and game can never display together */
            body:not(.playing) header{display:none!important;}
            body:not(.playing) #setup{display:block!important;height:auto!important;min-height:100dvh!important;padding:calc(16px + env(safe-area-inset-top,0px)) 14px calc(22px + env(safe-area-inset-bottom,0px))!important;overflow:auto!important;}
            body:not(.playing) #game{display:none!important;visibility:hidden!important;height:0!important;min-height:0!important;overflow:hidden!important;}
            body.playing #setup{display:none!important;}
            body.playing header{display:none!important;}
            body.playing:not(.horiz) #game{display:flex!important;visibility:visible!important;height:100dvh!important;}
            body.playing.horiz #game{display:grid!important;visibility:visible!important;height:100dvh!important;}

            /* v32 opening page polish */
