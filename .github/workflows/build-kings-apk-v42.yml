              undoLockReason='';
              let imp=impactfulMoveText(a,color,x,y);
              if(G.settings.confirmImpact&&imp&&!confirm('Confirm impactful move:\n\n'+imp+'\n\nContinue?')){flash('Move cancelled.');preActionSnapshot=null;return;}
              let err=null;
              if(a==='tile')err=await placeTile(p,color,x,y);
              else if(a==='leader')err=await placeLeader(p,color,x,y);
