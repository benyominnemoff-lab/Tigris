name: Build Kings APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Generate Android project
        run: |
          set -euxo pipefail
          mkdir -p app/src/main/java/com/auroranem/kings app/src/main/assets app/src/main/res/values app/src/main/res/drawable
          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name='KingsOfTheTwoRivers'
          include ':app'
          EOF
          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF
          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.auroranem.kings'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.auroranem.kings'
                  minSdk 23
                  targetSdk 35
                  versionCode 42
                  versionName '4.4'
              }
          }
          EOF
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:theme="@style/AppTheme" android:label="Kings of the Two Rivers" android:icon="@drawable/ic_launcher" android:allowBackup="false" android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:configChanges="orientation|screenSize|keyboardHidden" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>

          EOF
          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:fontFamily">serif</item>
                  <item name="android:colorAccent">#7b4f25</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#3f2917</item>
                  <item name="android:navigationBarColor">#3f2917</item>
              



            

            /* v35 polish: save management, tutorials, themes, conflict cards */
            #conflictReview{display:none;position:fixed;inset:0;z-index:90;background:rgba(24,15,7,.44);align-items:center;justify-content:center;padding:18px;box-sizing:border-box;}
            #conflictReview .reviewCard{width:min(620px,94vw);max-height:min(78vh,640px);overflow:auto;background:linear-gradient(180deg,#fff8e6,#f2d99d);border:2px solid #7b4f25;border-radius:18px;box-shadow:0 16px 40px #0009;color:#2d1c0d;font-family:var(--head);animation:reviewPop .18s ease-out;}
            #conflictReview h2{font-family:var(--display);font-size:24px;margin:0;padding:14px 16px 8px;border-bottom:1px solid #d4b36a;}
            #conflictReview .reviewBody{padding:12px 16px;font-size:15px;line-height:1.35;}
            #conflictReview .reviewBody .line{padding:7px 0;border-bottom:1px solid rgba(122,82,29,.22);}
            #conflictReview .reviewFooter{display:flex;gap:8px;justify-content:flex-end;padding:10px 16px 14px;border-top:1px solid #d4b36a;}
            @keyframes reviewPop{from{transform:scale(.96);opacity:.35}to{transform:scale(1);opacity:1}}
            .whyBox{grid-column:1/-1;background:#fff5d6;border:1px solid #d2bb83;border-radius:12px;padding:7px 9px;font-size:12px;line-height:1.25;color:#4b301c;}
            .themeButtons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%;grid-column:1/-1;}
            .themeButtons button{min-height:32px!important;font-size:11px!important;padding:5px!important;}
            .helpLink{grid-column:1/-1;}
            body.theme-muted #canvasWrap{background:#b9a469!important;} body.theme-muted canvas{filter:saturate(.78) contrast(.92) sepia(.12);}
            body.theme-muted #game{background:linear-gradient(#dfd0a9,#cbb681)!important;}
            body.theme-contrast #canvasWrap{background:#fff0a6!important;} body.theme-contrast canvas{filter:saturate(1.45) contrast(1.35);}
            body.theme-contrast #game{background:#f7df84!important;} body.theme-contrast .treasureRibbon{outline:2px solid #000;}
            body.theme-classic canvas{filter:none;}
            .playerChip.active{animation:activePulse 1.9s ease-in-out infinite;}
            @keyframes activePulse{0%,100%{box-shadow:0 0 0 rgba(255,223,117,0)}50%{box-shadow:0 0 0 3px rgba(255,223,117,.45)}}
            #tutorialBox{display:none;position:fixed;inset:0;z-index:92;background:rgba(24,15,7,.45);align-items:center;justify-content:center;padding:16px;}
            #tutorialBox .tutorialCard{width:min(640px,94vw);max-height:82vh;overflow:auto;background:linear-gradient(180deg,#fff8e6,#f3dfad);border:2px solid #7b4f25;border-radius:18px;box-shadow:0 14px 36px #0008;padding:16px;color:#2d1c0d;}
            #tutorialBox h2{font-family:var(--display);margin:0 0 8px;font-size:24px;} #tutorialBox h3{margin:14px 0 5px;font-size:17px;color:#6d3f14;} #tutorialBox p{margin:0 0 7px;line-height:1.35;}
            #saveDeleteBtn{margin-top:6px;}

            

            /* v37 functional and UI fixes */
            #turnOrderModal{display:none;position:fixed;inset:0;z-index:90;background:rgba(31,18,7,.58);align-items:center;justify-content:center;padding:18px;box-sizing:border-box;}
            .orderCard{width:min(92vw,440px);background:linear-gradient(180deg,#fff9e8,#efd494);border:2px solid #8a5a22;border-radius:20px;padding:18px;box-shadow:0 14px 36px #0008;color:#2b1809;font-family:var(--head);}
            .orderCard h2{margin:0 0 10px;font-family:var(--display);font-size:24px;letter-spacing:.06em;font-variant:small-caps;}
            .orderRow{padding:7px 8px;margin:5px 0;border-radius:10px;background:#fff8e6;border:1px solid #dec17a;font-weight:900;}
            .orderCard button{width:100%;margin-top:10px;}
