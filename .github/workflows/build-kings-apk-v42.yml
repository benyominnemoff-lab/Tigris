              el.className=full?'full':'';
              let chips=ruleSectionsV42.map((s,i)=>'<button class="'+(i===0?'active':'')+'" data-rule="'+s[0]+'">'+v42Esc(s[1])+'</button>').join('');
              el.innerHTML='<div class="ruleCard"><div class="v42RuleHead"><h2>Rule reminders</h2><button id="v42RulesClose">Close</button></div><div class="v42RuleTabs">'+chips+'</div><div class="v42RuleBody" id="v42RuleBody">'+ruleSectionsV42.map(sectionV42).join('')+'</div></div>';
              el.style.display='flex';
              document.getElementById('v42RulesClose').onclick=function(){el.style.display='none';};
              el.querySelectorAll('.v42RuleTabs button').forEach(function(btn){btn.onclick=function(){el.querySelectorAll('.v42RuleTabs button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); let target=document.getElementById('v42Rule_'+btn.dataset.rule); if(target)target.scrollIntoView({block:'start',behavior:'smooth'});};});
            }
            window.showTutorial=showTutorialV42; window.closeTutorial=function(){let el=document.getElementById('v42RulesSheet'); if(el)el.style.display='none';};
            try{showTutorial=window.showTutorial; closeTutorial=window.closeTutorial;}catch(e){}

            function v42TurnOrderBubbles(){
              if(!G||!G.players)return '';
              let st=Number.isFinite(G.startTurn)?G.startTurn:0, out=[];
              for(let i=0;i<G.players.length;i++){
                let p=(st+i)%G.players.length, pl=G.players[p], mark=MARK[i]||String(i+1);
                out.push('<div class="v42DynBubble"><span class="num p'+i+'">'+v42Esc(mark)+'</span><span class="name">'+v42Esc(pl.ai?pl.name:'You')+'</span><span class="sym">'+v42Esc(playerSymbolName(p))+'</span></div>');
              }
              return '<div class="v42OrderBubbleRow">'+out.join('')+'</div>';
            }
            window.legendHTML=function(){
              if(!G)return '';
              let parts=[]; parts.push(selectedSpaceCardHTML());
              parts.push('<div class="infoBlock"><b>Turn order / dynasties</b>'+v42TurnOrderBubbles()+'<div class="tiny">Outer leader frames use these turn-order colours; inner colours show King/Priest/Farmer/Trader.</div></div>');
              parts.push('<div class="infoBlock"><b>Sphere colours</b><div class="legendRow">'+CNAME.map((n,i)=>'<span class="pill c'+i+'"><span class="sw" style="background:'+HEX[i]+'"></span>'+n+': '+TILE[i]+' / '+LEADER[i]+' / '+VP[i]+'</span>').join('')+'</div></div>');
              parts.push('<div class="infoBlock"><b>Starting sites</b><div class="legendRow"><span class="pill">Gold ribbon = treasure still on site</span><span class="pill">Grey ribbon = treasure taken</span></div></div>');
              if(G.settings.buildings)parts.push('<div class="infoBlock"><b>Civilisation buildings</b><div class="legendRow">Buildings protect their tile until flipped for a monument or wonder.</div></div>');
              return parts.join('');
            };
            try{legendHTML=window.legendHTML;}catch(e){}
            const oldSetPanelV42=window.setActivePanel||setActivePanel;
            window.setActivePanel=function(id){document.body.classList.remove('boardFocus'); try{return oldSetPanelV42(id);}catch(e){}}; try{setActivePanel=window.setActivePanel;}catch(e){}
            window.centerBoard=function(){['controls','legend','log','menuPanel'].forEach(pid=>{let el=document.getElementById(pid); if(el)el.classList.add('collapsed');}); activePanel='board'; updateActivePanelButtons(); if(document.body.classList.contains('horiz'))document.body.classList.add('boardFocus'); resizeCanvas(); flash('Board focus. Zoom level preserved.');};
            try{centerBoard=window.centerBoard;}catch(e){}
            const oldToggleV42=window.toggleGameLayout||toggleGameLayout;
            window.toggleGameLayout=function(){document.body.classList.remove('boardFocus'); try{return oldToggleV42();}catch(e){}}; try{toggleGameLayout=window.toggleGameLayout;}catch(e){}
            const oldCloseConflictV42=window.closeConflictReview||closeConflictReview;
            window.closeConflictReview=function(){try{oldCloseConflictV42();}catch(e){let el=document.getElementById('conflictReview'); if(el)el.style.display='none'; if(G)G.awaitingReview=false;} maybeRunAiV42('after-conflict-review',180);}; try{closeConflictReview=window.closeConflictReview;}catch(e){}
            window.addEventListener('load',function(){v42Style(); try{document.querySelectorAll('[onclick="startGame()"]').forEach(b=>b.setAttribute('onclick','startGameV42()')); document.querySelectorAll('[onclick="continueSavedMatch()"]').forEach(b=>b.setAttribute('onclick','continueSavedMatchV42()'));}catch(e){}});
          })();
          </script>
          </body>
          </html>

          EOF
      - name: Download Gradle
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip

      - name: Build debug APK
        run: ./gradle-8.7/bin/gradle --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kings-of-the-Two-Rivers-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
