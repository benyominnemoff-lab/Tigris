            body.horiz #tutorialBox .tutorialCard.ruleLibrary{width:min(980px,68vw)!important;max-height:70dvh!important;border-radius:18px 18px 0 0!important;margin:0!important;}
            .ruleLibHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px 8px;border-bottom:1px solid rgba(139,90,34,.35);background:linear-gradient(180deg,#fff7dd,#f5dda2);}
