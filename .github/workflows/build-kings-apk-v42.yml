            #tutorialBox{padding:14px!important;box-sizing:border-box;align-items:center!important;justify-content:center!important;}
            #tutorialBox .tutorialCard{width:min(94vw,650px)!important;max-height:88dvh!important;overflow:auto!important;margin:0!important;padding:18px 20px!important;border-radius:18px!important;box-sizing:border-box;background:linear-gradient(180deg,#fff9e8,#f1dca2)!important;border:2px solid #8a5a22!important;}
