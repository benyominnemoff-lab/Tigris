            let gained=1+removed;
            G.players[winner.p].vp[color]+=gained;
            let lines=[G.players[winner.p].name+' wins the '+CNAME[color]+' war '+aTotal+'–'+dTotal+'.','Loser withdraws '+G.players[loser.p].name+' '+LEADER[color]+' from '+coord(loser.x,loser.y)+'.','Removed '+removed+' defeated '+TILE[color]+' supporter tile'+(removed===1?'':'s')+'.',G.players[winner.p].name+' gains '+gained+' '+VP[color]+'.','Committed support tiles from both sides are removed from the game.'];
            log('War over '+CNAME[color]+': '+lines.join(' '));
            showConflictResult(CNAME[color]+' war', winner.p===0||loser.p===0, lines);
           }
