            #conflictReview{z-index:5100!important;position:fixed!important;inset:0!important;display:none;align-items:flex-end!important;justify-content:center!important;background:rgba(31,18,7,.42)!important;padding:0 12px max(12px,env(safe-area-inset-bottom))!important;box-sizing:border-box!important;}
            #conflictReview .reviewCard{width:min(760px,96vw)!important;max-height:54dvh!important;overflow:auto!important;border-radius:18px 18px 0 0!important;background:linear-gradient(180deg,#fff8e6,#efd494)!important;border:2px solid #8a5a22!important;box-shadow:0 -12px 32px #0007!important;color:#2d1c0d!important;}
