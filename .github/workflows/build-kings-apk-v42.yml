          function warForecast(p,c,x,y){let co=compAt(x,y); if(!co)return 0; let score=0, block=key(x,y), rival=mainRival(p); for(let col=0;col<4;col++){let ls=co.leaders.filter(l=>l.color===col); if(ls.length<2)continue; let own=ls.find(l=>l.p===p), enemies=ls.filter(l=>l.p!==p); if(!own){score-=2.8*enemies.length; continue;} let enemy=enemies.sort((a,b)=>(b.p===rival)-(a.p===rival))[0]; let ownStr=countSupport(own.x,own.y,col,block)+G.players[p].hand[col], enStr=countSupport(enemy.x,enemy.y,col,block)+G.players[enemy.p].hand[col]; let reward=expectedWarRewardForLoser(enemy,col,block)+colourNeed(p,col)*.4; if(ownStr>enStr)score+=4.5+reward*.7; else if(ownStr===enStr)score-=3.0; else score-=8.5+(enemy.p===rival?1.5:0); } return score;}
