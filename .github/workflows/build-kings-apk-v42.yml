            #tutorialBox p{font-size:13px!important;line-height:1.28!important;margin:0 0 6px!important;}
            #tutorialBox button{margin-top:12px!important;min-height:38px!important;}
            .playerColourKey{margin-top:8px;padding-top:7px;border-top:1px solid #dec17a;}
            .playerColourKey .ownerChip{display:inline-block;margin:3px;padding:4px 7px;border-radius:999px;font-weight:900;border:1px solid #6d4a22;}
            .ownerChip.p0{background:#f3c644;color:#1e1606}.ownerChip.p1{background:#8b5a2b;color:#fff}.ownerChip.p2{background:#d985ad;color:#2a0d19}.ownerChip.p3{background:#7d5fc0;color:#fff}
            .conflictReviewNativeHint{font-size:11px;opacity:.8;}

            
            /* v38: final UI and blocking-flow fixes */
            #turnOrderModal{z-index:5000!important;display:none;position:fixed!important;inset:0!important;align-items:flex-end!important;justify-content:center!important;background:rgba(31,18,7,.48)!important;padding:0 12px max(12px,env(safe-area-inset-bottom))!important;box-sizing:border-box!important;}
