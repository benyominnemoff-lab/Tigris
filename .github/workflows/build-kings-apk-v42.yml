          function lineCandidateGain(color,x,y){let best=0; for(const dir of [[1,0],[0,1]]){let n=1; for(const s of [-1,1]){let nx=x+dir[0]*s,ny=y+dir[1]*s; while(inside(nx,ny)&&cell(nx,ny).tile===color&&!cell(nx,ny).face&&!cell(nx,ny).wonder){n++; nx+=dir[0]*s; ny+=dir[1]*s;}} best=Math.max(best,n);} return best>=3?best:0;}
          function revoltForecast(p,c,x,y){let co=compAt(x,y); if(!co)return 0; let def=co.leaders.find(l=>l.color===c&&l.p!==p); if(!def)return 0; let aBase=neighbors(x,y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length, dBase=neighbors(def.x,def.y).filter(([nx,ny])=>faceTemple(cell(nx,ny))).length; let aMax=aBase+G.players[p].hand[RED], dMax=dBase+G.players[def.p].hand[RED], value=2+colourNeed(p,RED); if(aBase>dMax)return 5+value*.4; if(aMax<=dBase)return -13; let cost=Math.max(0,dBase+1-aBase); return aMax>dMax?(3.2+value*.25-cost*.35):(-3.2-cost*.3);}
